<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ShawnsPod Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A1628;--c1:rgba(255,255,255,0.05);--c1-solid:#0F1D32;--glass:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.12);--glass-blur:20px;--bdr:rgba(255,255,255,0.1);--tx:#EDF2F7;--sub:rgba(255,255,255,0.55);--amb:#38BDF8;--amb2:#67D4FF;--grn:#22C55E;--red:#EF4444;--blu:#3B82F6;--pur:#A855F7;--cyn:#06B6D4;--pnk:#EC4899;--rad:18px;--rads:12px}
html{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden;font-feature-settings:'cv02','cv03','cv04','cv11';letter-spacing:-0.01em}
body{max-width:540px;margin:0 auto;min-height:100dvh;background:radial-gradient(ellipse at 20% 0%,rgba(56,189,248,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(6,182,212,0.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(15,29,50,0.5) 0%,transparent 70%),var(--bg)}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:'Inter',sans-serif;cursor:pointer}.hide{display:none!important}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#0A1628 0%,#0F2847 50%,#0A1628 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}#splash .ic{font-size:56px;animation:pulse 1.2s infinite}
#splash .nm{font-family:'Archivo Black';font-size:20px;letter-spacing:.08em;margin-top:16px}#splash .nm span{color:var(--amb)}

/* ONBOARDING - reuse from v3 */
.ob-wrap{min-height:100dvh;padding:24px;display:flex;flex-direction:column}
.ob-logo{text-align:center;margin-bottom:20px}.ob-logo .ic{font-size:44px}
.ob-logo h1{font-family:'Archivo Black';font-size:20px;letter-spacing:.04em;margin-top:6px}.ob-logo h1 span{color:var(--amb)}
.ob-logo p{font-size:11px;color:var(--sub);margin-top:4px}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.1);transition:all .3s}.ob-dot.on{background:var(--amb);width:24px}
.ob-q{font-size:14px;font-weight:700;margin-bottom:8px}.ob-hint{font-size:11px;color:var(--sub);margin-bottom:12px}
.ob-grid{display:grid;gap:8px}.ob-grid.g2{grid-template-columns:1fr 1fr}.ob-grid.g3{grid-template-columns:1fr 1fr 1fr}
.ob-opt{padding:12px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid var(--glass-border);border-radius:12px;text-align:center;transition:all .2s;color:var(--tx);font-size:12px}
.ob-opt:active{transform:scale(.97)}.ob-opt.on{border-color:var(--amb);background:rgba(56,189,248,.1)}
.ob-opt .emoji{font-size:22px;display:block;margin-bottom:4px}.ob-opt .label{display:block;font-weight:600}.ob-opt .desc{font-size:9px;color:var(--sub);margin-top:2px;display:block}
.ob-inp-row{display:flex;gap:8px;margin-bottom:12px}.ob-inp-grp{flex:1}.ob-inp-grp label{font-size:10px;color:var(--sub);display:block;margin-bottom:4px}
.ob-inp{width:100%;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--tx);font-size:16px;outline:none;font-family:'Inter';text-align:center}.ob-inp:focus{border-color:var(--amb)}
.ob-name{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--tx);font-size:16px;outline:none;font-family:'Inter';margin-bottom:16px}
.ob-nav{display:flex;gap:10px;margin-top:16px}.ob-nav button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.ob-nav button:active{transform:scale(.98)}.ob-back{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--tx)}.ob-next{background:var(--amb);color:#000}.ob-next:disabled{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.av-btn{font-size:22px;background:rgba(255,255,255,.04);border:2px solid var(--bdr);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:all .2s}.av-btn.on{border-color:var(--amb);background:rgba(56,189,248,.12);transform:scale(1.05)}
.usr-card{width:100%;display:flex;align-items:center;gap:12px;padding:14px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;margin-bottom:8px;color:var(--tx);text-align:left;font-family:'Inter';transition:transform .15s}
.usr-card:active{transform:scale(.98)}
.link-btn{background:none;border:none;color:var(--amb);font-size:13px;font-weight:600}

/* APP SHELL */
#app{padding-bottom:80px}
.header{padding:env(safe-area-inset-top,16px) 18px 12px;background:linear-gradient(180deg,rgba(10,22,40,0.95),rgba(10,22,40,0.7));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(56,189,248,0.1)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.brand{font-family:'Archivo Black';font-size:17px;letter-spacing:.04em}.brand span{color:var(--amb)}
.usr-row{display:flex;align-items:center;gap:5px;margin-top:4px;cursor:pointer}.usr-av{font-size:15px}.usr-nm{font-size:11px;font-weight:600}.sw-h{font-size:8px;color:rgba(255,255,255,.3)}
.wk-ctrl{display:flex;align-items:center;gap:5px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;padding:4px 10px;border:1px solid var(--glass-border)}
.wk-ctrl button{background:none;border:none;color:var(--tx);font-size:13px;padding:2px 3px}
.wk-lbl{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--amb);letter-spacing:.1em}
.stats-bar{display:flex;gap:14px;flex-wrap:wrap}
.st-v{font-family:'JetBrains Mono';font-size:15px;font-weight:700}.st-l{font-size:8px;color:var(--sub);margin-left:2px}

/* NAV */
.nav{display:flex;background:rgba(10,22,40,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(56,189,248,0.08);border-bottom:1px solid rgba(56,189,248,0.08);position:sticky;top:0;z-index:50}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-size:15px;transition:all .25s}
.nav button.on{color:var(--amb);border-bottom-color:var(--amb)}.nav .nl{font-size:7px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}

/* SHARED */
.tab-c{padding:16px 18px;display:none}.tab-c.active{display:block}
.intro{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:14px}
.card{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);margin-bottom:12px;border:1px solid rgba(56,189,248,0.1);padding:16px;animation:fadeUp .3s ease both;box-shadow:0 4px 30px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.05)}
.card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}

/* (motivational section removed) */

/* RECOMMENDATION */
.rec-card{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.01));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(34,197,94,.15);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.rec-card .rt{font-size:12px;font-weight:700;color:var(--grn);margin-bottom:6px}.rec-card .rb{font-size:11px;color:var(--sub);line-height:1.5;margin-bottom:3px}

/* ANIMATED PROGRESS BAR */
.apb{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.apb .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.apb .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.apb .fill.amb{background:linear-gradient(90deg,var(--amb),var(--amb2))}
.apb .fill.grn{background:linear-gradient(90deg,var(--grn),#4ADE80)}
.apb .fill.red{background:linear-gradient(90deg,var(--red),#F87171)}
.apb .fill.blu{background:linear-gradient(90deg,var(--blu),#60A5FA)}
.apb .fill.pur{background:linear-gradient(90deg,var(--pur),#C084FC)}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--amb)}
.toggle .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on .knob{transform:translateX(20px)}
.toggle-label{font-size:12px;color:var(--sub)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:11px 11px 11px 36px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-size:13px;outline:none;font-family:'Inter';transition:border-color .2s}
.search-inp:focus{border-color:var(--amb)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--sub);transition:all .2s;flex-shrink:0}
.pill:active{transform:scale(.95)}
.pill.on{border-color:var(--amb);background:rgba(56,189,248,.12);color:var(--amb)}

/* EXERCISE CARD (library) */
.ex-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--glass-border);display:flex;gap:10px;align-items:flex-start;transition:all .2s;animation:fadeUp .25s ease both}
.ex-card:active{transform:scale(.99);border-color:rgba(255,255,255,.12)}
.ex-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ex-badge.chest{background:rgba(239,68,68,.12)}.ex-badge.back{background:rgba(59,130,246,.12)}
.ex-badge.shoulders{background:rgba(168,85,247,.12)}.ex-badge.arms{background:rgba(56,189,248,.12)}
.ex-badge.legs{background:rgba(34,197,94,.12)}.ex-badge.core{background:rgba(6,182,212,.12)}.ex-badge.glutes{background:rgba(244,114,182,.12)}
.ex-badge.cardio{background:rgba(236,72,153,.12)}.ex-badge.hiit{background:rgba(249,115,22,.12)}
.ex-badge.stretch{background:rgba(34,197,94,.12)}.ex-badge.plyo{background:rgba(139,92,246,.12)}
.ex-card .ex-info{flex:1}.ex-card .ex-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.ex-card .ex-meta{font-size:10px;color:var(--sub);margin-bottom:2px}.ex-card .ex-type{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.ex-card .ex-type.compound{background:rgba(56,189,248,.12);color:var(--amb)}.ex-card .ex-type.isolation{background:rgba(59,130,246,.12);color:var(--blu)}
.ex-card .ex-type.cardio{background:rgba(236,72,153,.12);color:var(--pnk)}.ex-card .ex-type.hiit{background:rgba(249,115,22,.12);color:#F97316}
.ex-card .ex-type.stretch{background:rgba(34,197,94,.12);color:var(--grn)}.ex-card .ex-type.plyo{background:rgba(139,92,246,.12);color:#8B5CF6}
.ex-add-btn{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:700;border:none;background:var(--amb);color:#000;flex-shrink:0;align-self:center;transition:transform .15s}
.ex-add-btn:active{transform:scale(.92)}

/* BODY COMP */
.bc-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:16px;margin-bottom:12px;border:1px solid var(--glass-border)}
.bc-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bc-row:last-child{border-bottom:none}
.bc-label{font-size:11px;color:var(--sub)}.bc-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono'}
.bc-bar-wrap{margin-top:6px}
.bc-bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--sub);margin-bottom:3px}
.bc-indicator{position:relative;height:10px;background:linear-gradient(90deg,var(--red),var(--amb),var(--grn),var(--amb),var(--red));border-radius:5px;margin-bottom:2px}
.bc-marker{position:absolute;top:-2px;width:4px;height:14px;background:#fff;border-radius:2px;box-shadow:0 0 4px rgba(0,0,0,.5);transition:left .6s cubic-bezier(.4,0,.2,1)}
.bc-status{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px}
.bc-status.good{background:rgba(34,197,94,.12);color:var(--grn)}
.bc-status.warn{background:rgba(56,189,248,.12);color:var(--amb)}
.bc-status.bad{background:rgba(239,68,68,.12);color:var(--red)}

/* DAY CARDS */
.day-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:-14px;padding:14px}
.day-t{font-weight:700;font-size:14px;margin-bottom:2px}.day-m{font-size:10px;color:var(--sub)}
.done-b{background:var(--grn);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chv{color:var(--sub);font-size:12px;transition:transform .25s}
.day-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}.card.open .day-body{display:block}.card.open .chv{transform:rotate(90deg)}
.ib{font-size:11px;color:var(--sub);padding:6px 0;line-height:1.5}.ib strong{color:var(--tx)}
.ex-r{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}.ex-r:last-of-type{border-bottom:none}
.ex-n{width:24px;height:24px;background:var(--amb);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;font-family:'JetBrains Mono'}
.ex-nm{font-size:13px;font-weight:600;margin-bottom:1px}.ex-d{font-size:11px;color:var(--amb);font-family:'JetBrains Mono';margin-bottom:2px}.ex-nt{font-size:10px;color:var(--sub);line-height:1.4}
.s-btn{width:100%;padding:12px;border-radius:var(--rads);font-size:13px;font-weight:700;margin-top:8px;border:none;transition:all .15s}.s-btn:active{transform:scale(.98)}
.s-btn.pri{background:var(--amb);color:#000}.s-btn.out{background:transparent;color:var(--amb);border:1px solid var(--amb)}.s-btn.grn{background:var(--grn);color:#000}.s-btn.red{background:transparent;color:var(--red);border:1px solid var(--red)}.s-btn.blu{background:var(--blu);color:#fff}

/* FOOD */
.mac-bar{display:flex;justify-content:space-around;margin-bottom:6px;padding:6px 0}.mac-i{text-align:center}.mac-l{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.meal-o{padding:10px;border-radius:var(--rads);margin-bottom:5px;border:1px solid var(--bdr);transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.meal-o.logged{border-color:var(--grn);background:rgba(34,197,94,.05)}
.meal-tx{font-size:12px;line-height:1.3;flex:1}.meal-mc{font-size:10px;color:var(--amb);font-weight:600;font-family:'JetBrains Mono';white-space:nowrap}
.log-btn{padding:5px 8px;border-radius:6px;font-size:9px;font-weight:700;border:none;white-space:nowrap;flex-shrink:0;transition:transform .15s}.log-btn:active{transform:scale(.9)}
.log-btn.add{background:var(--grn);color:#000}.log-btn.rem{background:rgba(239,68,68,.15);color:var(--red)}
.daily-log{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid rgba(34,197,94,.2)}
.dl-title{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--grn)}
.dl-item{font-size:10px;color:var(--sub);padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}.dl-item:last-child{border-bottom:none}
.dl-total{display:flex;justify-content:space-around;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.dl-tv{font-family:'JetBrains Mono';font-size:14px;font-weight:700}.dl-tl{font-size:8px;color:var(--sub)}

/* TRACKER */
.pb-out{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:5px}.pb-in{height:100%;background:linear-gradient(90deg,var(--amb),var(--amb2));border-radius:4px;transition:width .4s}
.pb-tx{font-size:11px;color:var(--sub);font-family:'JetBrains Mono'}
.s-hdr{display:grid;grid-template-columns:28px 1fr 1fr 40px 34px;gap:5px;font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:5px}
.s-row{display:grid;grid-template-columns:28px 1fr 1fr 40px 34px;gap:5px;align-items:center;margin-bottom:4px;transition:opacity .2s}.s-row.dn{opacity:.4}
.s-sn{text-align:center;font-size:12px;font-weight:600;color:var(--sub);font-family:'JetBrains Mono'}
.s-inp{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:6px;padding:8px 3px;color:var(--tx);font-size:13px;text-align:center;outline:none;width:100%;font-family:'JetBrains Mono';transition:border-color .2s}.s-inp:focus{border-color:var(--amb)}
.chk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;border:2px solid var(--bdr);background:none;color:var(--sub)}.chk.dn{background:var(--grn);border-color:var(--grn);color:#000;font-weight:700;animation:popIn .25s ease}
.r-btn{font-size:22px;background:none;border:2px solid var(--bdr);border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;transition:all .2s}.r-btn.on{border-color:var(--amb);background:rgba(56,189,248,.15);transform:scale(1.1)}
.fin-btn{width:100%;padding:13px;border-radius:var(--rads);font-size:14px;font-weight:700;border:none;transition:all .15s}.fin-btn:active{transform:scale(.98)}.fin-btn.ok{background:var(--grn);color:#000}.fin-btn.no{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}

/* STATS */
.p-cards{display:flex;gap:8px;margin-bottom:14px}.p-c{flex:1;background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:10px;text-align:center;border:1px solid var(--glass-border)}
.p-cn{font-family:'JetBrains Mono';font-size:18px;font-weight:700;color:var(--amb)}.p-cl{font-size:8px;color:var(--sub);margin-top:2px}
.log-t{font-size:13px;font-weight:700;margin-bottom:8px}
.log-c{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:10px;padding:12px;margin-bottom:6px;border:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center}
.fh-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid var(--glass-border)}
.fh-tots{display:flex;gap:10px;margin-top:4px;font-size:10px;font-family:'JetBrains Mono';color:var(--amb);font-weight:600}

/* SETTINGS */
.set-label{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--amb)}
.set-edit{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid var(--amb);background:transparent;color:var(--amb);transition:all .15s}
.set-edit:active{transform:scale(.95);background:rgba(56,189,248,.1)}

/* MISC */
.empty{text-align:center;padding:36px 16px}.empty-i{font-size:40px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;margin-bottom:3px}.empty-s{font-size:12px;color:var(--sub);line-height:1.5}
.rst-btn{display:block;margin:20px auto 0;padding:7px 14px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:var(--rads);font-size:10px;font-weight:600;opacity:.7}

/* ADMIN PANEL */
.admin-gate{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(168,85,247,.02));border:1px solid rgba(168,85,247,.2);border-radius:var(--rad);padding:20px;margin-bottom:14px;text-align:center}
.admin-gate .ag-title{font-size:13px;font-weight:700;color:var(--pur);margin-bottom:6px}
.admin-gate .ag-hint{font-size:10px;color:var(--sub);margin-bottom:12px}
.admin-pin-inp{width:160px;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.3);border-radius:8px;color:var(--tx);font-size:18px;outline:none;font-family:'JetBrains Mono';text-align:center;letter-spacing:.3em}
.admin-pin-inp:focus{border-color:var(--pur)}
.admin-btn{padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;border:none;background:var(--pur);color:#fff;margin-top:10px;transition:all .15s}
.admin-btn:active{transform:scale(.95)}
.admin-panel{background:linear-gradient(135deg,rgba(168,85,247,.06),rgba(168,85,247,.02));border:1px solid rgba(168,85,247,.15);border-radius:var(--rad);padding:16px;margin-bottom:14px}
.admin-panel .ap-title{font-size:13px;font-weight:700;color:var(--pur);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.admin-panel .ap-hint{font-size:10px;color:var(--sub);margin-bottom:12px}
.admin-user{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border:1px solid var(--glass-border);border-radius:10px;margin-bottom:6px}
.admin-user .au-info{flex:1;min-width:0}
.admin-user .au-name{font-size:12px;font-weight:700}
.admin-user .au-meta{font-size:9px;color:var(--sub);margin-top:2px}
.admin-del{padding:6px 12px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--red);background:transparent;color:var(--red);flex-shrink:0;transition:all .15s}
.admin-del:active{background:rgba(239,68,68,.15)}
.admin-del-all{width:100%;padding:10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--red);background:rgba(239,68,68,.08);color:var(--red);margin-top:8px}
.admin-logout{width:100%;padding:8px;border-radius:8px;font-size:10px;font-weight:600;border:1px solid var(--glass-border);background:transparent;color:var(--sub);margin-top:6px}

/* PLAN HERO */
.plan-hero{background:linear-gradient(135deg,rgba(56,189,248,0.1),rgba(6,182,212,0.05),rgba(168,85,247,0.05));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(56,189,248,0.15);border-radius:var(--rad);padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.plan-hero::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle at 70% 30%,rgba(56,189,248,0.08),transparent 50%);pointer-events:none}
.ph-greeting{font-size:11px;color:var(--sub);margin-bottom:4px}
.ph-name{font-family:'Archivo Black';font-size:22px;letter-spacing:.02em;margin-bottom:14px}
.ph-name span{color:var(--amb)}
.ph-rings{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.ph-ring{position:relative;width:80px;height:80px}
.ph-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.ph-ring .ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6}
.ph-ring .ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ph-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ph-ring-val{font-family:'JetBrains Mono';font-size:16px;font-weight:700}
.ph-ring-txt{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.ph-stats{display:flex;gap:8px}
.ph-stat{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:10px;text-align:center}
.ph-stat-val{font-family:'JetBrains Mono';font-size:14px;font-weight:700}
.ph-stat-lbl{font-size:8px;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

.tips-t{font-weight:700;font-size:12px;margin-bottom:6px;color:var(--amb)}.tip-r{display:flex;gap:6px;font-size:10px;color:var(--sub);line-height:1.5;margin-bottom:3px}
.cw-day-name{width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:14px;font-family:'Inter';outline:none;margin-bottom:10px}

/* CUSTOM MEAL */
.cm-form{background:linear-gradient(135deg,rgba(56,189,248,.06),rgba(56,189,248,.02));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(56,189,248,.18);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.cm-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:var(--amb)}
.cm-row{display:flex;gap:8px;margin-bottom:8px}
.cm-grp{flex:1}.cm-grp label{font-size:9px;color:var(--sub);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.cm-inp{width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:13px;outline:none;font-family:'Inter';transition:border-color .2s}.cm-inp:focus{border-color:var(--amb)}
.cm-inp.full{font-size:14px}
.cm-actions{display:flex;gap:6px;margin-top:10px}
.cm-actions button{flex:1}
.cm-saved{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:14px;margin-bottom:12px;border:1px solid var(--glass-border)}
.cm-saved-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:var(--amb)}
.cm-saved-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:var(--rads);margin-bottom:5px;border:1px solid var(--bdr);background:rgba(255,255,255,.02);gap:6px}
.cm-saved-item .meal-tx{font-size:12px;flex:1}
.cm-saved-btns{display:flex;gap:4px;flex-shrink:0}
.cal-summary{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.01));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(34,197,94,.15);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.cal-summary .cs-title{font-size:13px;font-weight:700;color:var(--grn);margin-bottom:8px}
.cal-summary .cs-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--bdr)}
.cal-summary .cs-row:last-child{border-bottom:none}
.cal-summary .cs-label{color:var(--sub)}.cal-summary .cs-val{font-weight:700;font-family:'JetBrains Mono'}
.diet-consist{background:linear-gradient(135deg,rgba(6,182,212,.04),rgba(6,182,212,.01));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(6,182,212,.15);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.diet-consist .dc-title{font-size:13px;font-weight:700;color:var(--cyn);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.diet-consist .dc-streak{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:10px}
.diet-consist .dc-streak-num{font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--cyn)}
.diet-consist .dc-streak-lbl{font-size:11px;color:var(--sub);line-height:1.4}
.diet-consist .dc-week{display:flex;gap:4px;margin-bottom:10px}
.diet-consist .dc-day{flex:1;text-align:center;padding:6px 2px;border-radius:8px;font-size:9px;border:1px solid var(--bdr);background:rgba(255,255,255,.02)}
.diet-consist .dc-day.logged{border-color:var(--grn);background:rgba(34,197,94,.1)}
.diet-consist .dc-day.over{border-color:var(--red);background:rgba(239,68,68,.1)}
.diet-consist .dc-day.today{border-color:var(--cyn);box-shadow:0 0 0 1px var(--cyn)}
.diet-consist .dc-day .dc-d-name{font-weight:600;color:var(--sub);margin-bottom:2px}
.diet-consist .dc-day .dc-d-cal{font-family:'JetBrains Mono';font-size:10px;font-weight:700}
.diet-consist .dc-day.logged .dc-d-cal{color:var(--grn)}
.diet-consist .dc-day.over .dc-d-cal{color:var(--red)}
.diet-consist .dc-stats{display:flex;gap:6px}
.diet-consist .dc-stat{flex:1;text-align:center;padding:8px 4px;background:rgba(255,255,255,.03);border-radius:8px}
.diet-consist .dc-stat-val{font-family:'JetBrains Mono';font-size:14px;font-weight:700}
.diet-consist .dc-stat-lbl{font-size:8px;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.ex-rm-btn{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:2px 6px;opacity:.5;transition:opacity .2s;flex-shrink:0}.ex-rm-btn:active{opacity:1}
.add-ex-sec{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.18);border-radius:10px;padding:12px;margin-top:10px}
.add-ex-list{max-height:250px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* NOTES TAB */
.notes-status{padding:10px 14px;border-radius:var(--rads);font-size:12px;margin-bottom:12px;font-weight:600}
.notes-status.success{background:rgba(34,197,94,.12);color:var(--grn)}.notes-status.error{background:rgba(239,68,68,.12);color:var(--red)}
.note-form{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--rad);padding:16px;margin-bottom:16px}
.note-form label{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.note-form input,.note-form textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.note-form input:focus,.note-form textarea:focus{border-color:var(--amb)}
.note-form textarea{resize:vertical;min-height:70px;line-height:1.5}
.mood-grid{display:flex;gap:6px;margin-bottom:12px}
.mood-btn{padding:6px 12px;border-radius:8px;font-size:12px;border:1px solid var(--glass-border);background:var(--glass);color:var(--sub);transition:all .2s;cursor:pointer}
.mood-btn:focus{outline:2px solid var(--amb);outline-offset:2px}
.mood-btn.on{border-color:var(--amb);background:rgba(56,189,248,.12);color:var(--amb)}
.note-actions{display:flex;gap:8px;margin-top:12px}
.note-actions button{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:700;border:none;transition:all .15s;cursor:pointer}
.note-actions button:focus{outline:2px solid var(--amb);outline-offset:2px}
.note-actions button:active{transform:scale(.98)}
.note-save{background:var(--amb);color:#000}.note-cancel{background:var(--glass);color:var(--tx);border:1px solid var(--glass-border)!important}
.note-item{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);margin-bottom:10px;border:1px solid rgba(56,189,248,0.1);padding:14px;animation:fadeUp .3s ease both}
.note-item-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.note-item-title{font-size:14px;font-weight:700;flex:1;margin-right:8px}
.note-item-mood{font-size:14px}
.note-item-body{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
.note-item-date{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace}
.note-item-btns{display:flex;gap:6px;margin-top:8px}
.note-item-btns button{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.note-item-btns button:focus{outline:2px solid var(--amb);outline-offset:2px}
.note-item-btns button:active{transform:scale(.95)}
.note-edit-btn{background:rgba(56,189,248,.12);color:var(--amb)}.note-del-btn{background:rgba(239,68,68,.12);color:var(--red)}
.note-add-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:2px dashed var(--glass-border);background:transparent;color:var(--amb);cursor:pointer;transition:all .2s;margin-bottom:16px}
.note-add-btn:focus{outline:2px solid var(--amb);outline-offset:2px}
.note-add-btn:hover,.note-add-btn:focus{border-color:var(--amb);background:rgba(56,189,248,.05)}
.note-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.note-confirm-box{background:var(--c1-solid);border:1px solid var(--glass-border);border-radius:var(--rad);padding:24px;max-width:320px;width:100%;text-align:center}
.note-confirm-box p{font-size:14px;margin-bottom:16px;line-height:1.5}
.note-confirm-box .note-actions{justify-content:center}

/* EQUIPMENT */
.eq-hero{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(6,182,212,.06));border:1px solid rgba(56,189,248,.15);border-radius:var(--rad);padding:16px;margin-bottom:14px;text-align:center}
.eq-hero .eq-h-title{font-family:'Archivo Black';font-size:16px;letter-spacing:.02em;margin-bottom:4px}.eq-hero .eq-h-title span{color:var(--amb)}
.eq-hero .eq-h-sub{font-size:11px;color:var(--sub);line-height:1.5}
.eq-gym-tags{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.eq-gym-tag{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);color:var(--amb)}
.eq-cat-hdr{font-size:13px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:6px;color:var(--tx)}
.eq-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--glass-border);animation:fadeUp .25s ease both}
.eq-card .eq-top{display:flex;gap:10px;align-items:flex-start}
.eq-card .eq-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.eq-card .eq-info{flex:1}
.eq-card .eq-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.eq-card .eq-desc{font-size:10px;color:var(--sub);line-height:1.4;margin-bottom:4px}
.eq-card .eq-muscles{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.eq-muscle{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(56,189,248,.1);color:var(--amb)}
.eq-card .eq-exercises{margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr)}
.eq-card .eq-ex-title{font-size:10px;font-weight:700;color:var(--grn);margin-bottom:4px}
.eq-ex-item{font-size:10px;color:var(--sub);padding:2px 0;display:flex;align-items:center;gap:4px}
.eq-ex-item::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--amb);flex-shrink:0}
.eq-toggle{background:none;border:none;color:var(--amb);font-size:10px;font-weight:600;padding:2px 0;cursor:pointer}
.eq-avail{display:flex;gap:4px;margin-top:4px}
.eq-avail-tag{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:600}
.eq-avail-tag.wf{background:rgba(168,85,247,.1);color:var(--pur)}
.eq-avail-tag.tgg{background:rgba(34,197,94,.1);color:var(--grn)}
/* PROGRESSION RECOMMENDATIONS */
.prog-section{margin-bottom:14px}
.prog-title{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.prog-hint{font-size:10px;color:var(--sub);margin-bottom:10px}
.prog-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--glass-border);animation:fadeUp .25s ease both}
.prog-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-icon{font-size:18px;flex-shrink:0}
.prog-info{flex:1;min-width:0}
.prog-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-detail{font-size:9px;color:var(--sub);font-family:'JetBrains Mono';margin-top:1px}
.prog-change{font-size:11px;font-weight:800;font-family:'JetBrains Mono';white-space:nowrap;flex-shrink:0}
.prog-msg{font-size:10px;color:var(--sub);line-height:1.5}

/* BODY GOAL GUIDANCE */
.bg-section{background:linear-gradient(135deg,rgba(56,189,248,.04),rgba(6,182,212,.02));border:1px solid rgba(56,189,248,.12);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.bg-title{font-size:13px;font-weight:700;margin-bottom:8px}
.bg-tip{font-size:11px;color:var(--sub);line-height:1.6;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,.02);border:1px solid var(--bdr)}
.bg-tip:last-child{margin-bottom:0}
.bg-tip.good{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04)}
.bg-tip.warn{border-color:rgba(56,189,248,.2);background:rgba(56,189,248,.04)}


.rest-timer{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--c1-solid);border:2px solid var(--amb);border-radius:16px;padding:16px 28px;z-index:999;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.rest-timer .rt-time{font-size:32px;font-weight:800;color:var(--amb);font-family:'JetBrains Mono'}
.rest-timer .rt-btns{display:flex;gap:8px;margin-top:8px;justify-content:center}
.rest-timer .rt-btn{padding:4px 12px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--tx);cursor:pointer;font-size:11px}
.rpe-sel{width:40px;padding:2px;border-radius:6px;border:1px solid var(--bdr);background:var(--c1-solid);color:var(--tx);font-size:11px;text-align:center}
.macro-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.macro-bar .mb-lbl{width:60px;font-size:11px;color:var(--sub)}
.macro-bar .mb-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.macro-bar .mb-fill{height:100%;border-radius:4px;transition:width .3s}
.macro-bar .mb-val{width:60px;font-size:10px;color:var(--sub);text-align:right;font-family:'JetBrains Mono'}

function mkSplit(a,d){

};
const template=tpl[d]||tpl[3];
const filtered=template.map(function(sp){

}).filter(function(sp){return sp.groups.length>0});

function calcNutri(p){const bmr=10*p.weight+6.25*p.height-5*p.age+(p.gender==="female"?-161:5);const am={1:1.3,2:1.4,3:1.45,4:1.55,5:1.65,6:1.75}[p.days]||1.5;const tdee=Math.round(bmr*am);const cal=tdee+(GM[p.goal]?.ca||0);const protein=Math.round(p.weight*(p.goal==="fat_loss"?2.2:p.goal==="muscle_gain"?2.0:1.8));const fat=Math.round(p.weight*1.0);const carbs=Math.max(Math.round((cal-protein*4-fat*9)/4),100);return{cal,protein,carbs,fat,tdee}}

// ═══════ BODY COMPOSITION ANALYSIS ═══════
function calcBodyComp(profile,nutri,flog){
  const{age,height,weight}=profile;const hm=height/100;
  const bmi=+(weight/(hm*hm)).toFixed(1);
  let bmiCat="Normal",bmiStatus="good";
  if(bmi<18.5){bmiCat="Underweight";bmiStatus="warn"}else if(bmi<25){bmiCat="Normal";bmiStatus="good"}else if(bmi<30){bmiCat="Overweight";bmiStatus="warn"}else{bmiCat="Obese";bmiStatus="bad"}
  // Rough body fat estimate (gender-aware)
  const isFemale=profile.gender==="female";
  const bfEst=isFemale?+(1.2*bmi+0.23*age-5.4).toFixed(1):+(1.2*bmi+0.23*age-16.2).toFixed(1);
  let bfCat="Athletic",bfStatus="good";
  if(isFemale){if(bfEst<12){bfCat="Essential only";bfStatus="bad"}else if(bfEst<21){bfCat="Athletic";bfStatus="good"}else if(bfEst<25){bfCat="Fit";bfStatus="good"}else if(bfEst<32){bfCat="Average";bfStatus="warn"}else{bfCat="Above average";bfStatus="bad"}}
  else{if(bfEst<6){bfCat="Essential only";bfStatus="bad"}else if(bfEst<14){bfCat="Athletic";bfStatus="good"}else if(bfEst<18){bfCat="Fit";bfStatus="good"}else if(bfEst<25){bfCat="Average";bfStatus="warn"}else{bfCat="Above average";bfStatus="bad"}}
  // FFMI (Fat-Free Mass Index)
  const lbm=weight*(1-bfEst/100);const ffmi=+(lbm/(hm*hm)).toFixed(1);
  let ffmiCat="Average",ffmiStatus="good";
  if(ffmi<18){ffmiCat="Below average";ffmiStatus="warn"}else if(ffmi<20){ffmiCat="Average";ffmiStatus="good"}else if(ffmi<22){ffmiCat="Above average";ffmiStatus="good"}else if(ffmi<25){ffmiCat="Excellent";ffmiStatus="good"}else{ffmiCat="Exceptional";ffmiStatus="good"}
  // Caloric status
  const today=new Date().toISOString().slice(0,10);const todayLog=flog[today]||[];
  const todayCal=todayLog.reduce((a,m)=>a+m.cal,0);const todayP=todayLog.reduce((a,m)=>a+m.p,0);
  const calDiff=todayCal-nutri.cal;
  let calStatus="On track",calClass="good";
  if(todayCal===0){calStatus="Not logged yet";calClass="warn"}
  else if(calDiff<-200){calStatus="In deficit ("+calDiff+" kcal)";calClass=profile.goal==="fat_loss"?"good":"warn"}
  else if(calDiff>200){calStatus="In surplus (+"+calDiff+" kcal)";calClass=profile.goal==="muscle_gain"?"good":"warn"}
  else{calStatus="Near target ("+calDiff+" kcal)";calClass="good"}
  // Weekly avg
  const last7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(flog[k])last7.push(flog[k].reduce((a,m)=>a+m.cal,0))}
  const weekAvgCal=last7.length?Math.round(last7.reduce((a,b)=>a+b,0)/last7.length):0;
  const proteinPct=todayCal?Math.round(todayP*4/todayCal*100):0;
  let proteinStatus="Good",proteinClass="good";
  if(todayP===0){proteinStatus="Not logged";proteinClass="warn"}
  else if(todayP<nutri.protein*0.8){proteinStatus="Below target";proteinClass="bad"}
  else if(todayP>nutri.protein*1.2){proteinStatus="Above target";proteinClass="good"}
  // Healthy weight range
  const hwLow=+(18.5*hm*hm).toFixed(1);const hwHigh=+(24.9*hm*hm).toFixed(1);
  let weightStatus="Healthy range",weightClass="good";
  if(weight<hwLow){weightStatus="Below healthy range";weightClass="warn"}
  else if(weight>hwHigh){weightStatus="Above healthy range";weightClass="warn"}
  return{bmi,bmiCat,bmiStatus,bfEst,bfCat,bfStatus,ffmi,ffmiCat,ffmiStatus,calDiff,calStatus,calClass,todayCal,todayP,weekAvgCal,proteinPct,proteinStatus,proteinClass,hwLow,hwHigh,weightStatus,weightClass,tdee:nutri.tdee||nutri.cal}
}

function renderWeeklyVolume(){

if(!entries.length)return;
const maxVol=Math.max(...entries.map(e=>e[1]));
let html='<div class="log-t" style="margin-top:16px">📊 Weekly Volume by Muscle Group</div><div class="card" style="margin-top:8px">';
entries.forEach(([group,sets])=>{
const pct=Math.round(sets/maxVol*100);
html+='<div class="vol-card"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;text-transform:capitalize">'+group+'</span><span style="font-size:11px;font-family:\'JetBrains Mono\';color:var(--amb)">'+sets+' sets</span></div><div class="vol-bar"><div class="vol-fill" style="width:'+pct+'%"></div></div></div>';

function calcDietConsistency(){const target=S.nutri.cal;const tolerance=0.15;const flog=S.flog;const today=new Date();today.setHours(0,0,0,0);
// Last 7 days
const weekData=[];const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const items=flog[k]||[];const cal=items.reduce((a,m)=>a+m.cal,0);const isToday=i===0;weekData.push({key:k,name:dayNames[d.getDay()],cal,logged:items.length>0,isToday,withinTarget:cal>0&&cal<=target*(1+tolerance),over:cal>target*(1+tolerance)})}
// Calculate streak (consecutive days within target calorie range)
let streak=0;const allDates=Object.keys(flog).sort().reverse();
for(const dk of allDates){const items=flog[dk]||[];const cal=items.reduce((a,m)=>a+m.cal,0);if(cal>0&&cal<=target*(1+tolerance)){streak++}else{break}}
// Last 30 days stats
let daysLogged=0,daysOnTarget=0,daysOver=0,totalCal=0;
for(let i=0;i<30;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const items=flog[k]||[];if(items.length>0){const cal=items.reduce((a,m)=>a+m.cal,0);daysLogged++;totalCal+=cal;if(cal<=target*(1+tolerance))daysOnTarget++;else daysOver++}}
const avgCal=daysLogged?Math.round(totalCal/daysLogged):0;
const consistencyPct=daysLogged?Math.round(daysOnTarget/daysLogged*100):0;
return{weekData,streak,daysLogged,daysOnTarget,daysOver,avgCal,consistencyPct,target}}
function renderDietConsistency(){const dc=calcDietConsistency();
return`<div class="diet-consist"><div class="dc-title">📅 Diet Consistency Tracker</div>`+
`<div class="dc-streak"><div class="dc-streak-num">${dc.streak}</div><div class="dc-streak-lbl"><strong>${dc.streak===1?'Day':'Days'}</strong> on target<br><span style="font-size:9px">Consecutive days within calorie goal</span></div></div>`+
`<div style="font-size:10px;color:var(--sub);margin-bottom:6px;font-weight:600">This Week</div><div class="dc-week">${dc.weekData.map(d=>`<div class="dc-day ${d.logged&&d.withinTarget?'logged':d.over?'over':''} ${d.isToday?'today':''}"><div class="dc-d-name">${d.name}</div><div class="dc-d-cal">${d.cal||'—'}</div>${d.logged?`<div style="font-size:10px;margin-top:1px">${d.withinTarget?'✓':'⚠'}</div>`:''}</div>`).join("")}</div>`+
`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:var(--sub)">Consistency score</span><span style="font-weight:700;color:${dc.consistencyPct>=80?'var(--grn)':dc.consistencyPct>=50?'var(--amb)':'var(--red)'}">${dc.consistencyPct}%</span></div><div class="apb"><div class="fill ${dc.consistencyPct>=80?'grn':dc.consistencyPct>=50?'amb':'red'}" style="width:${dc.consistencyPct}%"></div></div></div>`+
`<div class="dc-stats"><div class="dc-stat"><div class="dc-stat-val" style="color:var(--grn)">${dc.daysOnTarget}</div><div class="dc-stat-lbl">On Target</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--red)">${dc.daysOver}</div><div class="dc-stat-lbl">Over</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--amb)">${dc.avgCal}</div><div class="dc-stat-lbl">Avg kcal</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--cyn)">${dc.daysLogged}</div><div class="dc-stat-lbl">Days (30d)</div></div></div>`+
`<div style="font-size:9px;color:var(--sub);margin-top:8px;text-align:center;line-height:1.4">${dc.consistencyPct>=80?'🔥 Excellent consistency! Keep it up!':dc.consistencyPct>=50?'💪 Good progress! Stay on track.':'📝 Log your meals daily to build consistency.'} Target: ${dc.target} kcal/day (±15%)</div></div>`}

// ═══════ WEIGHT PROGRESSION & SMART RECOMMENDATIONS ═══════
function analyzeProgression(){
const logs=S.logs;const plan=S.plan;const profile=S.user?.profile;if(!profile||!plan.length)return[];
const goal=profile.goal||"general";const level=profile.level||"intermediate";
// Collect per-exercise weight history across all weeks
const exHistory={};
Object.entries(logs).forEach(([key,log])=>{
const wm=key.match(/^w(\d+)-d(\d+)$/);if(!wm)return;
const week=+wm[1];const dayIdx=+wm[2];const day=plan[dayIdx];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
const ex=day.exs[+ei];if(!ex)return;const name=ex.n;
if(!exHistory[name])exHistory[name]=[];
const weights=sets.filter(s=>s.done&&+s.weight>0).map(s=>+s.weight);
const reps=sets.filter(s=>s.done&&+s.reps>0).map(s=>+s.reps);
const completedSets=sets.filter(s=>s.done).length;const totalSets=sets.length;
if(weights.length)exHistory[name].push({week,date:log.date,avgWeight:+(weights.reduce((a,b)=>a+b,0)/weights.length).toFixed(1),maxWeight:Math.max(...weights),avgReps:reps.length?+(reps.reduce((a,b)=>a+b,0)/reps.length).toFixed(1):0,completedSets,totalSets})
})});
// Generate recommendations per exercise
const recs=[];
Object.entries(exHistory).forEach(([name,entries])=>{
if(entries.length<2){recs.push({name,status:"tracking",msg:"Keep logging — need at least 2 sessions to track progress.",icon:"📊",color:"var(--sub)"});return}
entries.sort((a,b)=>new Date(a.date)-new Date(b.date));
const recent=entries.slice(-2);const prev=recent[0];const curr=recent[1];
const weeksBetween=Math.max(1,curr.week-prev.week);
const weightChange=curr.avgWeight-prev.avgWeight;const repChange=curr.avgReps-prev.avgReps;
const completionRate=curr.completedSets/curr.totalSets;
// Determine increment based on exercise type and goal
const isCompound=["Bench Press","Squat","Deadlift","Row","Press","Thrust","Lunge"].some(w=>name.includes(w));
const increment=isCompound?2.5:1.25;
const goalMult=goal==="muscle_gain"?1:goal==="fat_loss"?0.5:0.75;
const recIncrement=+(increment*goalMult).toFixed(2);
if(completionRate>=0.9&&curr.avgReps>=10&&weightChange>=0){
recs.push({name,status:"increase",msg:`Great progress! Increase weight by ${recIncrement} kg next session. You've been hitting ${curr.avgReps} reps consistently at ${curr.avgWeight} kg.`,icon:"⬆️",color:"var(--grn)",change:`+${recIncrement} kg`,detail:`${prev.avgWeight} kg → ${curr.avgWeight} kg (${weightChange>=0?'+':''}${weightChange.toFixed(1)} kg over ${weeksBetween} wk${weeksBetween>1?'s':''})`})
}else if(completionRate>=0.8&&weightChange>0){
recs.push({name,status:"maintain",msg:`Good work! Maintain ${curr.avgWeight} kg and focus on hitting all reps cleanly before increasing.`,icon:"✊",color:"var(--amb)",change:"Maintain",detail:`${prev.avgWeight} kg → ${curr.avgWeight} kg · ${curr.avgReps} avg reps`})
}else if(completionRate<0.6||curr.avgReps<6){
const dropWeight=Math.max(0,+(curr.avgWeight-increment).toFixed(1));
recs.push({name,status:"reduce",msg:`Form check needed. Consider dropping to ${dropWeight} kg and building back up with solid form. You completed only ${Math.round(completionRate*100)}% of sets.`,icon:"⬇️",color:"var(--red)",change:`Drop to ${dropWeight} kg`,detail:`Completed ${curr.completedSets}/${curr.totalSets} sets · ${curr.avgReps} avg reps`})
}else if(weightChange===0&&repChange>0){
recs.push({name,status:"increase",msg:`Rep progress! You're getting stronger at ${curr.avgWeight} kg (${prev.avgReps} → ${curr.avgReps} reps). Ready to add ${recIncrement} kg.`,icon:"⬆️",color:"var(--grn)",change:`+${recIncrement} kg`,detail:`Same weight, more reps: ${prev.avgReps} → ${curr.avgReps}`})
}else if(weeksBetween>=2&&weightChange===0&&repChange<=0){
recs.push({name,status:"plateau",msg:`Plateau detected at ${curr.avgWeight} kg for ${weeksBetween} weeks. Try: change rep tempo, add a drop set, or switch to a variation.`,icon:"⚠️",color:"var(--amb)",change:"Change stimulus",detail:`Stuck at ${curr.avgWeight} kg for ${weeksBetween} weeks`})
}else{
recs.push({name,status:"maintain",msg:`Keep training at ${curr.avgWeight} kg. Focus on form and hitting your rep targets.`,icon:"✊",color:"var(--amb)",change:"Maintain",detail:`${curr.avgWeight} kg · ${curr.avgReps} reps · ${Math.round(completionRate*100)}% completion`})
}
});
return recs;
}

function getBodyGoalGuidance(){
const p=S.user?.profile;if(!p)return"";
const goal=p.goal||"general";const logs=S.logs;const totalSessions=Object.keys(logs).length;
const weeks=S.week;const sessionsPerWeek=weeks?+(totalSessions/weeks).toFixed(1):0;
const targetDays=p.days||4;const adherence=targetDays?Math.min(100,Math.round(sessionsPerWeek/targetDays*100)):0;
// Analyze weight trends
const recs=analyzeProgression();
const increasing=recs.filter(r=>r.status==="increase").length;
const plateaus=recs.filter(r=>r.status==="plateau").length;
const reducing=recs.filter(r=>r.status==="reduce").length;
const maintaining=recs.filter(r=>r.status==="maintain").length;
let guidance=[];
if(goal==="muscle_gain"){
guidance.push(`<div class="bg-section"><div class="bg-title">💪 Muscle Gain Progress Report</div>`);
if(totalSessions<4)guidance.push(`<div class="bg-tip">📅 Just getting started — focus on learning movements with good form. The first 2-3 weeks should be about technique, not max weights.</div>`);
else if(increasing>plateaus&&adherence>=70)guidance.push(`<div class="bg-tip good">🔥 Excellent! You're progressing on ${increasing} exercise${increasing>1?'s':''}. Keep your surplus at 200-400 kcal and sleep 7-9 hours for max recovery.</div>`);
else if(plateaus>1)guidance.push(`<div class="bg-tip warn">⚠️ Plateau on ${plateaus} exercise${plateaus>1?'s':''}. Try: deload for a week at 60% weight, increase calories by 100-200 kcal, or swap exercises for fresh stimulus.</div>`);
if(adherence<60)guidance.push(`<div class="bg-tip warn">📊 Training ${sessionsPerWeek} days/week vs your target of ${targetDays}. Consistency is the #1 driver of muscle growth — try to hit at least ${Math.ceil(targetDays*0.8)} sessions/week.</div>`);
else guidance.push(`<div class="bg-tip good">✅ Training adherence: ${adherence}% — great consistency!</div>`);
guidance.push(`<div class="bg-tip">📏 Aim to gain 0.25-0.5 kg bodyweight per week. If the scale isn't moving after 2 weeks, add 150-200 extra kcal per day.</div></div>`);
}else if(goal==="fat_loss"){
guidance.push(`<div class="bg-section"><div class="bg-title">🔥 Fat Loss Progress Report</div>`);
if(reducing>0)guidance.push(`<div class="bg-tip warn">⚠️ Strength dropping on ${reducing} exercise${reducing>1?'s':''}. In a deficit, maintaining weight on the bar is the goal. Don't cut calories too aggressively — max 500 kcal deficit.</div>`);
else if(maintaining+increasing>0)guidance.push(`<div class="bg-tip good">✅ Great — maintaining or increasing strength while in a deficit. You're preserving muscle effectively!</div>`);
if(adherence>=70)guidance.push(`<div class="bg-tip good">🏃 Good adherence (${adherence}%). Add 2-3 walks per week (20-30 min) for extra fat burning without affecting recovery.</div>`);
else guidance.push(`<div class="bg-tip warn">📊 Training ${sessionsPerWeek}x/week. Try to maintain ${targetDays}x to preserve muscle while cutting.</div>`);
guidance.push(`<div class="bg-tip">📏 Aim for 0.5-1% bodyweight loss per week (${(p.weight*0.005).toFixed(1)}-${(p.weight*0.01).toFixed(1)} kg/week). Faster = muscle loss risk.</div></div>`);
}else if(goal==="recomp"){
guidance.push(`<div class="bg-section"><div class="bg-title">⚡ Recomp Progress Report</div>`);
if(increasing>0)guidance.push(`<div class="bg-tip good">💪 Progressing on ${increasing} exercise${increasing>1?'s':''}! In a recomp, strength gains = muscle being built while fat comes off slowly.</div>`);
else if(totalSessions>6)guidance.push(`<div class="bg-tip warn">📊 No weight increases detected yet. Recomp is slow — be patient. Focus on getting stronger in the 8-12 rep range.</div>`);
guidance.push(`<div class="bg-tip">📏 Recomp success is measured by how clothes fit and strength gains, not the scale. Take progress photos monthly. Expect visible changes in 3-6 months.</div></div>`);
}else{
guidance.push(`<div class="bg-section"><div class="bg-title">🎯 Fitness Progress Report</div>`);
if(totalSessions>=4)guidance.push(`<div class="bg-tip good">✅ ${totalSessions} sessions completed. You're building a solid foundation!</div>`);
guidance.push(`<div class="bg-tip">📏 Focus on progressive overload — small, consistent weight increases over time. Even 1.25 kg more per week compounds over months.</div></div>`);
}
return guidance.join("");
}

function renderProgressionCards(){

const sorted=[...recs].sort((a,b)=>{const order={increase:0,plateau:1,reduce:2,maintain:3,tracking:4};return(order[a.status]||5)-(order[b.status]||5)});

}

supersetGroups[existing]=supersetGroups[existing].filter(i=>i!==ei);
if(supersetGroups[existing].length<2)supersetGroups.splice(existing,1);

}

function calcUserStats(userId){
const u=userId===S.user?.id?S.user:LS("sp-prof-"+userId);
if(!u)return null;
const logs=userId===S.user?.id?S.logs:(LS("sp-logs-"+userId)||{});
const sessions=Object.keys(logs).length;
const totalSets=Object.values(logs).reduce((a,l)=>a+Object.values(l.sets).reduce((b,s)=>b+s.filter(x=>x.done).length,0),0);
const rats=Object.values(logs).map(l=>l.rating).filter(Boolean);
const avgRating=rats.length?+(rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1):0;
const dates=Object.values(logs).map(l=>l.date).filter(Boolean).sort();
let streak=0;
if(dates.length){const logDates=new Set(dates.map(d=>new Date(d).toISOString().slice(0,10)));
const today=new Date();today.setHours(0,0,0,0);let checkDate=new Date(today);
for(let w=0;w<52;w++){const weekStart=new Date(checkDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay());
let hasWorkout=false;for(let d=0;d<7;d++){const day=new Date(weekStart);day.setDate(day.getDate()+d);if(logDates.has(day.toISOString().slice(0,10))){hasWorkout=true;break}}
if(hasWorkout){streak++}else if(w>0){break}checkDate.setDate(checkDate.getDate()-7)}}
const firstDate=dates[0]?new Date(dates[0]):null;
const weeksSinceStart=firstDate?Math.max(1,Math.ceil((Date.now()-firstDate.getTime())/(7*86400000))):1;
const consistency=sessions?+(sessions/weeksSinceStart).toFixed(1):0;
const targetDays=u.profile?.days||0;
const completionRate=targetDays?Math.min(100,Math.round(consistency/targetDays*100)):0;
const lastSession=Object.values(logs).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.date||null;
return{userId:u.id,name:u.name,avatar:u.avatar,sessions,streak,totalSets,avgRating,consistency,completionRate,targetDays,gender:u.profile?.gender||'',lastSession}}

function calcScoreLocal(s){
const sessionPts=(s.sessions||0)*10;const streakPts=(s.streak||0)*15;const setPts=(s.totalSets||0)*1;
const consistencyPts=Math.round(((s.completionRate||0)/100)*50);const raw=sessionPts+streakPts+setPts+consistencyPts;
const ratingMult=s.avgRating?Math.max(0.6,s.avgRating/5):0.8;return Math.round(raw*ratingMult)}

// ═══════ 1RM CALCULATOR ═══════
function calc1RM(w,r){if(!w||!r||r<1)return 0;if(r===1)return w;return Math.round(w*(1+r/30)*10)/10}
function get1RMTable(w,r){const orm=calc1RM(w,r);if(!orm)return[];return[1,2,3,4,5,6,8,10,12,15].map(rep=>({reps:rep,weight:rep===1?orm:Math.round(orm*(1-rep/30)*10)/10,pct:rep===1?100:Math.round((1-rep/30)*1000)/10}))}
function getBest1RM(exName){
let best={w:0,r:0,orm:0};
Object.values(S.logs).forEach(log=>{
Object.entries(log.sets).forEach(([ei,sets])=>{
const day=S.plan[log.dayIndex];
if(day&&day.exs[+ei]&&day.exs[+ei].n===exName){
sets.filter(s=>s.done&&+s.weight>0&&+s.reps>0).forEach(s=>{
const orm=calc1RM(+s.weight,+s.reps);
if(orm>best.orm){best={w:+s.weight,r:+s.reps,orm}}
})}
})});
return best.orm?best:null;
}

}}})});

}

// ═══════ WEEKLY VOLUME PER MUSCLE GROUP ═══════
function calcWeeklyVolume(){
const vol={};const weekKey='w'+S.week;
Object.entries(S.logs).forEach(([key,log])=>{
if(!key.startsWith(weekKey+'-'))return;
const day=S.plan[log.dayIndex];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
const ex=day.exs[+ei];if(!ex)return;
const doneSets=sets.filter(s=>s.done).length;
const groups=findMuscleGroups(ex.n);
groups.forEach(g=>{vol[g]=(vol[g]||0)+doneSets});
})});
return vol;
}
function findMuscleGroups(exName){
const groups=[];
const EX=typeof EX_DB!=='undefined'?EX_DB:{};
Object.entries(EX).forEach(([group,exs])=>{
if(exs.some(e=>e.n===exName))groups.push(group);
});
return groups.length?groups:['other'];
}

// ═══════ EXERCISE SUBSTITUTIONS ═══════
function getSubstitutes(exName){
const groups=findMuscleGroups(exName);
const subs=[];
const EX=typeof EX_DB!=='undefined'?EX_DB:{};
groups.forEach(g=>{
if(EX[g]){EX[g].forEach(e=>{if(e.n!==exName&&!subs.some(s=>s.n===e.n))subs.push(e)})}
});
return subs.slice(0,6);
}

// ═══════ PROGRESSIVE OVERLOAD ALERTS ═══════
function getOverloadAlerts(){
const alerts=[];
if(!S.plan||!S.plan.length)return alerts;
const allExNames=[...new Set(S.plan.flatMap(d=>d.exs.map(e=>e.n)))];
allExNames.forEach(exName=>{
const history=[];
Object.entries(S.logs).forEach(([key,log])=>{
const day=S.plan[log.dayIndex];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
if(day.exs[+ei]&&day.exs[+ei].n===exName){
const doneSets=sets.filter(s=>s.done&&+s.weight>0&&+s.reps>0);
if(doneSets.length){
const avgRPE=doneSets.filter(s=>+s.rpe>0).reduce((a,s,_,arr)=>a+(+s.rpe)/arr.length,0);
const maxW=Math.max(...doneSets.map(s=>+s.weight));
const allHitTarget=doneSets.every(s=>+s.reps>=doneSets[0].reps);
history.push({date:log.date,maxW,avgRPE,allHitTarget,reps:+doneSets[0].reps});
}}})});
history.sort((a,b)=>new Date(b.date)-new Date(a.date));
if(history.length>=2){
const recent=history.slice(0,2);
const readyToIncrease=recent.every(h=>h.allHitTarget&&(h.avgRPE>0?h.avgRPE<8:true));
if(readyToIncrease){
alerts.push({name:exName,currentW:recent[0].maxW,suggestedW:recent[0].maxW+2.5,reason:'Hit all reps at RPE<8 for 2 sessions'});
}}});
return alerts;
}

}})})});

function calcPlates(targetWeight,barWeight=20){
const perSide=(targetWeight-barWeight)/2;
if(perSide<=0)return{plates:[],perSide:0};
const available=[25,20,15,10,5,2.5,1.25];
let remaining=perSide;
const plates=[];
available.forEach(p=>{while(remaining>=p){plates.push(p);remaining=Math.round((remaining-p)*100)/100}});
return{plates,perSide};
}

return'<div class="plate-visual">'+plateHTML+'<div class="plate-bar"></div>'+plates.slice().reverse().map(p=>'<div class="plate" style="background:'+colors[p]+';height:'+heights[p]+'px;'+(p<=5?'color:#000;border:1px solid var(--bdr)':'')+';padding:0 3px">'+p+'</div>').join('')+'</div>';
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    setInterval(()=>reg.update(),60000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(nw)nw.addEventListener('statechange',()=>{
        if(nw.state==='activated')window.location.reload();
      });
    });
  }).catch(()=>{});
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload();}
  });
}
