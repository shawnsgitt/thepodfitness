<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Shwanspod Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A0A0A;--c1:#141414;--bdr:rgba(255,255,255,0.06);--tx:#EDEDED;--sub:rgba(255,255,255,0.42);--amb:#E8A838;--amb2:#F5C542;--grn:#22C55E;--red:#EF4444;--blu:#3B82F6;--pur:#A855F7;--cyn:#06B6D4;--pnk:#EC4899;--rad:14px;--rads:8px}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
body{max-width:540px;margin:0 auto;min-height:100dvh}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:'Outfit',sans-serif;cursor:pointer}.hide{display:none!important}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}#splash .ic{font-size:56px;animation:pulse 1.2s infinite}
#splash .nm{font-family:'Archivo Black';font-size:20px;letter-spacing:.08em;margin-top:16px}#splash .nm span{color:var(--amb)}

/* ONBOARDING - reuse from v3 */
.ob-wrap{min-height:100dvh;padding:24px;display:flex;flex-direction:column}
.ob-logo{text-align:center;margin-bottom:20px}.ob-logo .ic{font-size:44px}
.ob-logo h1{font-family:'Archivo Black';font-size:20px;letter-spacing:.04em;margin-top:6px}.ob-logo h1 span{color:var(--amb)}
.ob-logo p{font-size:11px;color:var(--sub);margin-top:4px}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.1);transition:all .3s}.ob-dot.on{background:var(--amb);width:24px}
.ob-q{font-size:14px;font-weight:700;margin-bottom:8px}.ob-hint{font-size:11px;color:var(--sub);margin-bottom:12px}
.ob-grid{display:grid;gap:8px}.ob-grid.g2{grid-template-columns:1fr 1fr}.ob-grid.g3{grid-template-columns:1fr 1fr 1fr}
.ob-opt{padding:12px;background:var(--c1);border:2px solid var(--bdr);border-radius:12px;text-align:center;transition:all .2s;color:var(--tx);font-size:12px}
.ob-opt:active{transform:scale(.97)}.ob-opt.on{border-color:var(--amb);background:rgba(232,168,56,.08)}
.ob-opt .emoji{font-size:22px;display:block;margin-bottom:4px}.ob-opt .label{display:block;font-weight:600}.ob-opt .desc{font-size:9px;color:var(--sub);margin-top:2px;display:block}
.ob-inp-row{display:flex;gap:8px;margin-bottom:12px}.ob-inp-grp{flex:1}.ob-inp-grp label{font-size:10px;color:var(--sub);display:block;margin-bottom:4px}
.ob-inp{width:100%;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--tx);font-size:16px;outline:none;font-family:'Outfit';text-align:center}.ob-inp:focus{border-color:var(--amb)}
.ob-name{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--tx);font-size:16px;outline:none;font-family:'Outfit';margin-bottom:16px}
.ob-nav{display:flex;gap:10px;margin-top:16px}.ob-nav button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.ob-nav button:active{transform:scale(.98)}.ob-back{background:var(--c1);color:var(--tx)}.ob-next{background:var(--amb);color:#000}.ob-next:disabled{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.av-btn{font-size:22px;background:rgba(255,255,255,.04);border:2px solid var(--bdr);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:all .2s}.av-btn.on{border-color:var(--amb);background:rgba(232,168,56,.1);transform:scale(1.05)}
.usr-card{width:100%;display:flex;align-items:center;gap:12px;padding:14px;background:var(--c1);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;color:var(--tx);text-align:left;font-family:'Outfit';transition:transform .15s}
.usr-card:active{transform:scale(.98)}
.link-btn{background:none;border:none;color:var(--amb);font-size:13px;font-weight:600}

/* APP SHELL */
#app{padding-bottom:80px}
.header{padding:env(safe-area-inset-top,16px) 18px 10px;background:linear-gradient(180deg,#111,var(--bg))}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.brand{font-family:'Archivo Black';font-size:17px;letter-spacing:.04em}.brand span{color:var(--amb)}
.usr-row{display:flex;align-items:center;gap:5px;margin-top:4px;cursor:pointer}.usr-av{font-size:15px}.usr-nm{font-size:11px;font-weight:600}.sw-h{font-size:8px;color:rgba(255,255,255,.3)}
.wk-ctrl{display:flex;align-items:center;gap:5px;background:var(--c1);border-radius:20px;padding:4px 10px;border:1px solid var(--bdr)}
.wk-ctrl button{background:none;border:none;color:var(--tx);font-size:13px;padding:2px 3px}
.wk-lbl{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--amb);letter-spacing:.1em}
.stats-bar{display:flex;gap:14px;flex-wrap:wrap}
.st-v{font-family:'JetBrains Mono';font-size:15px;font-weight:700}.st-l{font-size:8px;color:var(--sub);margin-left:2px}

/* NAV */
.nav{display:flex;background:var(--c1);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-size:15px;transition:all .25s}
.nav button.on{color:var(--amb);border-bottom-color:var(--amb)}.nav .nl{font-size:7px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}

/* SHARED */
.tab-c{padding:14px 16px;display:none}.tab-c.active{display:block}
.intro{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:12px}
.card{background:var(--c1);border-radius:var(--rad);margin-bottom:10px;border:1px solid var(--bdr);padding:14px;animation:fadeUp .3s ease both}
.card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}

/* MOTIVATIONAL */
.motiv{background:linear-gradient(135deg,rgba(232,168,56,.1),rgba(232,168,56,.02));border:1px solid rgba(232,168,56,.2);border-radius:var(--rad);padding:18px;margin-bottom:14px;text-align:center;animation:fadeUp .4s ease}
.motiv .mq{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:8px}.motiv .ma{font-size:11px;color:var(--amb);font-weight:600}
.motiv .mi{font-size:10px;color:var(--sub);margin-top:8px;line-height:1.5}

/* RECOMMENDATION */
.rec-card{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.02));border:1px solid rgba(34,197,94,.2);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.rec-card .rt{font-size:12px;font-weight:700;color:var(--grn);margin-bottom:6px}.rec-card .rb{font-size:11px;color:var(--sub);line-height:1.5;margin-bottom:3px}

/* ANIMATED PROGRESS BAR */
.apb{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.apb .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.apb .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.apb .fill.amb{background:linear-gradient(90deg,var(--amb),var(--amb2))}
.apb .fill.grn{background:linear-gradient(90deg,var(--grn),#4ADE80)}
.apb .fill.red{background:linear-gradient(90deg,var(--red),#F87171)}
.apb .fill.blu{background:linear-gradient(90deg,var(--blu),#60A5FA)}
.apb .fill.pur{background:linear-gradient(90deg,var(--pur),#C084FC)}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--amb)}
.toggle .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on .knob{transform:translateX(20px)}
.toggle-label{font-size:12px;color:var(--sub)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:11px 11px 11px 36px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-size:13px;outline:none;font-family:'Outfit';transition:border-color .2s}
.search-inp:focus{border-color:var(--amb)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--bdr);background:var(--c1);color:var(--sub);transition:all .2s;flex-shrink:0}
.pill:active{transform:scale(.95)}
.pill.on{border-color:var(--amb);background:rgba(232,168,56,.1);color:var(--amb)}

/* EXERCISE CARD (library) */
.ex-card{background:var(--c1);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--bdr);display:flex;gap:10px;align-items:flex-start;transition:all .2s;animation:fadeUp .25s ease both}
.ex-card:active{transform:scale(.99);border-color:rgba(255,255,255,.12)}
.ex-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ex-badge.chest{background:rgba(239,68,68,.12)}.ex-badge.back{background:rgba(59,130,246,.12)}
.ex-badge.shoulders{background:rgba(168,85,247,.12)}.ex-badge.arms{background:rgba(232,168,56,.12)}
.ex-badge.legs{background:rgba(34,197,94,.12)}.ex-badge.core{background:rgba(6,182,212,.12)}
.ex-badge.cardio{background:rgba(236,72,153,.12)}.ex-badge.hiit{background:rgba(249,115,22,.12)}
.ex-badge.stretch{background:rgba(34,197,94,.12)}.ex-badge.plyo{background:rgba(139,92,246,.12)}
.ex-card .ex-info{flex:1}.ex-card .ex-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.ex-card .ex-meta{font-size:10px;color:var(--sub);margin-bottom:2px}.ex-card .ex-type{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.ex-card .ex-type.compound{background:rgba(232,168,56,.12);color:var(--amb)}.ex-card .ex-type.isolation{background:rgba(59,130,246,.12);color:var(--blu)}
.ex-card .ex-type.cardio{background:rgba(236,72,153,.12);color:var(--pnk)}.ex-card .ex-type.hiit{background:rgba(249,115,22,.12);color:#F97316}
.ex-card .ex-type.stretch{background:rgba(34,197,94,.12);color:var(--grn)}.ex-card .ex-type.plyo{background:rgba(139,92,246,.12);color:#8B5CF6}
.ex-add-btn{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:700;border:none;background:var(--amb);color:#000;flex-shrink:0;align-self:center;transition:transform .15s}
.ex-add-btn:active{transform:scale(.92)}

/* BODY COMP */
.bc-card{background:var(--c1);border-radius:var(--rad);padding:16px;margin-bottom:12px;border:1px solid var(--bdr)}
.bc-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bc-row:last-child{border-bottom:none}
.bc-label{font-size:11px;color:var(--sub)}.bc-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono'}
.bc-bar-wrap{margin-top:6px}
.bc-bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--sub);margin-bottom:3px}
.bc-indicator{position:relative;height:10px;background:linear-gradient(90deg,var(--red),var(--amb),var(--grn),var(--amb),var(--red));border-radius:5px;margin-bottom:2px}
.bc-marker{position:absolute;top:-2px;width:4px;height:14px;background:#fff;border-radius:2px;box-shadow:0 0 4px rgba(0,0,0,.5);transition:left .6s cubic-bezier(.4,0,.2,1)}
.bc-status{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px}
.bc-status.good{background:rgba(34,197,94,.12);color:var(--grn)}
.bc-status.warn{background:rgba(232,168,56,.12);color:var(--amb)}
.bc-status.bad{background:rgba(239,68,68,.12);color:var(--red)}

/* DAY CARDS */
.day-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:-14px;padding:14px}
.day-t{font-weight:700;font-size:14px;margin-bottom:2px}.day-m{font-size:10px;color:var(--sub)}
.done-b{background:var(--grn);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chv{color:var(--sub);font-size:12px;transition:transform .25s}
.day-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}.card.open .day-body{display:block}.card.open .chv{transform:rotate(90deg)}
.ib{font-size:11px;color:var(--sub);padding:6px 0;line-height:1.5}.ib strong{color:var(--tx)}
.ex-r{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}.ex-r:last-of-type{border-bottom:none}
.ex-n{width:24px;height:24px;background:var(--amb);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;font-family:'JetBrains Mono'}
.ex-nm{font-size:13px;font-weight:600;margin-bottom:1px}.ex-d{font-size:11px;color:var(--amb);font-family:'JetBrains Mono';margin-bottom:2px}.ex-nt{font-size:10px;color:var(--sub);line-height:1.4}
.s-btn{width:100%;padding:12px;border-radius:var(--rads);font-size:13px;font-weight:700;margin-top:8px;border:none;transition:all .15s}.s-btn:active{transform:scale(.98)}
.s-btn.pri{background:var(--amb);color:#000}.s-btn.out{background:transparent;color:var(--amb);border:1px solid var(--amb)}.s-btn.grn{background:var(--grn);color:#000}.s-btn.red{background:transparent;color:var(--red);border:1px solid var(--red)}.s-btn.blu{background:var(--blu);color:#fff}

/* FOOD */
.mac-bar{display:flex;justify-content:space-around;margin-bottom:6px;padding:6px 0}.mac-i{text-align:center}.mac-l{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.meal-o{padding:10px;border-radius:var(--rads);margin-bottom:5px;border:1px solid var(--bdr);transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.meal-o.logged{border-color:var(--grn);background:rgba(34,197,94,.05)}
.meal-tx{font-size:12px;line-height:1.3;flex:1}.meal-mc{font-size:10px;color:var(--amb);font-weight:600;font-family:'JetBrains Mono';white-space:nowrap}
.log-btn{padding:5px 8px;border-radius:6px;font-size:9px;font-weight:700;border:none;white-space:nowrap;flex-shrink:0;transition:transform .15s}.log-btn:active{transform:scale(.9)}
.log-btn.add{background:var(--grn);color:#000}.log-btn.rem{background:rgba(239,68,68,.15);color:var(--red)}
.daily-log{background:var(--c1);border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid rgba(34,197,94,.2)}
.dl-title{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--grn)}
.dl-item{font-size:10px;color:var(--sub);padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}.dl-item:last-child{border-bottom:none}
.dl-total{display:flex;justify-content:space-around;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.dl-tv{font-family:'JetBrains Mono';font-size:14px;font-weight:700}.dl-tl{font-size:8px;color:var(--sub)}

/* TRACKER */
.pb-out{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:5px}.pb-in{height:100%;background:linear-gradient(90deg,var(--amb),var(--amb2));border-radius:4px;transition:width .4s}
.pb-tx{font-size:11px;color:var(--sub);font-family:'JetBrains Mono'}
.s-hdr{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:5px;font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:5px}
.s-row{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:4px;transition:opacity .2s}.s-row.dn{opacity:.4}
.s-sn{text-align:center;font-size:12px;font-weight:600;color:var(--sub);font-family:'JetBrains Mono'}
.s-inp{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:6px;padding:8px 3px;color:var(--tx);font-size:13px;text-align:center;outline:none;width:100%;font-family:'JetBrains Mono';transition:border-color .2s}.s-inp:focus{border-color:var(--amb)}
.chk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;border:2px solid var(--bdr);background:none;color:var(--sub)}.chk.dn{background:var(--grn);border-color:var(--grn);color:#000;font-weight:700;animation:popIn .25s ease}
.r-btn{font-size:22px;background:none;border:2px solid var(--bdr);border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;transition:all .2s}.r-btn.on{border-color:var(--amb);background:rgba(232,168,56,.12);transform:scale(1.1)}
.fin-btn{width:100%;padding:13px;border-radius:var(--rads);font-size:14px;font-weight:700;border:none;transition:all .15s}.fin-btn:active{transform:scale(.98)}.fin-btn.ok{background:var(--grn);color:#000}.fin-btn.no{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}

/* STATS */
.p-cards{display:flex;gap:8px;margin-bottom:14px}.p-c{flex:1;background:var(--c1);border-radius:var(--rad);padding:10px;text-align:center;border:1px solid var(--bdr)}
.p-cn{font-family:'JetBrains Mono';font-size:18px;font-weight:700;color:var(--amb)}.p-cl{font-size:8px;color:var(--sub);margin-top:2px}
.log-t{font-size:13px;font-weight:700;margin-bottom:8px}
.log-c{background:var(--c1);border-radius:10px;padding:12px;margin-bottom:6px;border:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.fh-card{background:var(--c1);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid var(--bdr)}
.fh-tots{display:flex;gap:10px;margin-top:4px;font-size:10px;font-family:'JetBrains Mono';color:var(--amb);font-weight:600}

/* SETTINGS */
.set-label{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--amb)}
.set-edit{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid var(--amb);background:transparent;color:var(--amb);transition:all .15s}
.set-edit:active{transform:scale(.95);background:rgba(232,168,56,.1)}

/* MISC */
.empty{text-align:center;padding:36px 16px}.empty-i{font-size:40px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;margin-bottom:3px}.empty-s{font-size:12px;color:var(--sub);line-height:1.5}
.rst-btn{display:block;margin:20px auto 0;padding:7px 14px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:var(--rads);font-size:10px;font-weight:600;opacity:.7}

function genPlan(p){const{goal,areas,days}=p;const g=GM[goal];const splits=mkSplit(areas,days);const dn=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];const sd={1:[0],2:[0,3],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,4,5],6:[0,1,2,3,4,5]}[days]||[0];

if(sp.groups.length<=2){cp.slice(0,2).forEach(e=>exs.push({...e,s:sp.primary===grp?4:3,r:g.rm,rest:g.rstm}));ip.slice(0,2).forEach(e=>exs.push({...e,s:3,r:g.ri,rest:g.rsti}))}
else{cp.slice(0,1).forEach(e=>exs.push({...e,s:sp.primary===grp?4:3,r:g.rm,rest:g.rstm}));ip.slice(0,1).forEach(e=>exs.push({...e,s:3,r:g.ri,rest:g.rsti}))}});
const fe=exs.slice(0,7);return{day:`Day ${i+1} — ${sp.name}`,sub:sp.groups.map(g=>CAT_META[g]?.l||AM[g]?.l||g).join(" · "),sched:dn[sd[i]]||`Day ${i+1}`,dur:`~${Math.round(fe.reduce((a,e)=>a+e.s*1.5+(parseFloat(e.rest)||1.5)*e.s/60,10))} min`,

function mkSplit(a,d){if(d===1)return[{name:"Full Body",groups:a.length?a:["chest","back","legs","shoulders"],primary:"chest"}];if(d===2)return[{name:"Upper",groups:["chest","back","shoulders","arms"],primary:"chest"},{name:"Lower",groups:["legs","core"],primary:"legs"}];if(d===3)return[{name:"Push",groups:["chest","shoulders","arms"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs",groups:["legs","core"],primary:"legs"}];if(d===4)return[{name:"Push",groups:["chest","shoulders","arms"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs",groups:["legs","core"],primary:"legs"},{name:"Upper",groups:["chest","back","shoulders","arms"],primary:"chest"}];if(d===5)return[{name:"Push",groups:["chest","shoulders"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs",groups:["legs","core"],primary:"legs"},{name:"Upper Hyper",groups:["chest","back","shoulders"],primary:"shoulders"},{name:"Arms & Core",groups:["arms","core"],primary:"arms"}];return[{name:"Push A",groups:["chest","shoulders"],primary:"chest"},{name:"Pull A",groups:["back","arms"],primary:"back"},{name:"Legs A",groups:["legs","core"],primary:"legs"},{name:"Push B",groups:["chest","shoulders","arms"],primary:"shoulders"},{name:"Pull B",groups:["back","arms"],primary:"back"},{name:"Legs B",groups:["legs","core"],primary:"legs"}];}
function calcNutri(p){const bmr=10*p.weight+6.25*p.height-5*p.age+5;const am={1:1.3,2:1.4,3:1.45,4:1.55,5:1.65,6:1.75}[p.days]||1.5;const tdee=Math.round(bmr*am);const cal=tdee+(GM[p.goal]?.ca||0);const protein=Math.round(p.weight*(p.goal==="fat_loss"?2.2:p.goal==="muscle_gain"?2.0:1.8));const fat=Math.round(p.weight*1.0);const carbs=Math.max(Math.round((cal-protein*4-fat*9)/4),100);return{cal,protein,carbs,fat,tdee}}

// ═══════ BODY COMPOSITION ANALYSIS ═══════
function calcBodyComp(profile,nutri,flog){
  const{age,height,weight}=profile;const hm=height/100;
  const bmi=+(weight/(hm*hm)).toFixed(1);
  let bmiCat="Normal",bmiStatus="good";
  if(bmi<18.5){bmiCat="Underweight";bmiStatus="warn"}else if(bmi<25){bmiCat="Normal";bmiStatus="good"}else if(bmi<30){bmiCat="Overweight";bmiStatus="warn"}else{bmiCat="Obese";bmiStatus="bad"}
  // Rough body fat estimate (Navy method approx for males without measurements)
  const bfEst=+(1.2*bmi+0.23*age-16.2).toFixed(1);
  let bfCat="Athletic",bfStatus="good";
  if(bfEst<6){bfCat="Essential only";bfStatus="bad"}else if(bfEst<14){bfCat="Athletic";bfStatus="good"}else if(bfEst<18){bfCat="Fit";bfStatus="good"}else if(bfEst<25){bfCat="Average";bfStatus="warn"}else{bfCat="Above average";bfStatus="bad"}
  // FFMI (Fat-Free Mass Index)
  const lbm=weight*(1-bfEst/100);const ffmi=+(lbm/(hm*hm)).toFixed(1);
  let ffmiCat="Average",ffmiStatus="good";
  if(ffmi<18){ffmiCat="Below average";ffmiStatus="warn"}else if(ffmi<20){ffmiCat="Average";ffmiStatus="good"}else if(ffmi<22){ffmiCat="Above average";ffmiStatus="good"}else if(ffmi<25){ffmiCat="Excellent";ffmiStatus="good"}else{ffmiCat="Exceptional";ffmiStatus="good"}
  // Caloric status
  const today=new Date().toISOString().slice(0,10);const todayLog=flog[today]||[];
  const todayCal=todayLog.reduce((a,m)=>a+m.cal,0);const todayP=todayLog.reduce((a,m)=>a+m.p,0);
  const calDiff=todayCal-nutri.cal;
  let calStatus="On track",calClass="good";
  if(todayCal===0){calStatus="Not logged yet";calClass="warn"}
  else if(calDiff<-200){calStatus="In deficit ("+calDiff+" kcal)";calClass=profile.goal==="fat_loss"?"good":"warn"}
  else if(calDiff>200){calStatus="In surplus (+"+calDiff+" kcal)";calClass=profile.goal==="muscle_gain"?"good":"warn"}
  else{calStatus="Near target ("+calDiff+" kcal)";calClass="good"}
  // Weekly avg
  const last7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(flog[k])last7.push(flog[k].reduce((a,m)=>a+m.cal,0))}
  const weekAvgCal=last7.length?Math.round(last7.reduce((a,b)=>a+b,0)/last7.length):0;
  const proteinPct=todayCal?Math.round(todayP*4/todayCal*100):0;
  let proteinStatus="Good",proteinClass="good";
  if(todayP===0){proteinStatus="Not logged";proteinClass="warn"}
  else if(todayP<nutri.protein*0.8){proteinStatus="Below target";proteinClass="bad"}
  else if(todayP>nutri.protein*1.2){proteinStatus="Above target";proteinClass="good"}
  // Healthy weight range
  const hwLow=+(18.5*hm*hm).toFixed(1);const hwHigh=+(24.9*hm*hm).toFixed(1);
  let weightStatus="Healthy range",weightClass="good";
  if(weight<hwLow){weightStatus="Below healthy range";weightClass="warn"}
  else if(weight>hwHigh){weightStatus="Above healthy range";weightClass="warn"}
  return{bmi,bmiCat,bmiStatus,bfEst,bfCat,bfStatus,ffmi,ffmiCat,ffmiStatus,calDiff,calStatus,calClass,todayCal,todayP,weekAvgCal,proteinPct,proteinStatus,proteinClass,hwLow,hwHigh,weightStatus,weightClass,tdee:nutri.tdee||nutri.cal}
}

else if(s===2){h+=`<div class="ob-q">Focus areas?</div><div class="ob-hint">Select all that apply.</div><div class="ob-grid g3">${Object.entries(AM).map(([k,v])=>`<button class="ob-opt ${OB.areas.includes(k)?'on':''}" onclick="togA('${k}')"><span class="emoji">${v.e}</span><span class="label">${v.l}</span></button>`).join("")}</div><button class="ob-opt ${OB.areas.length===6?'on':''}" onclick="OB.areas=['chest','back','shoulders','arms','legs','core'];rOB()" style="margin-top:8px"><span class="emoji">🏋️</span><span class="label">Full Body</span></button>`}

`<div class="rec-card"><div class="rt">💡 ${recs.t}</div>${recs.tips.map(t=>`<div class="rb">• ${t}</div>`).join("")}</div>`+
`<p class="intro">${GM[gk]?.l||""} · ${S.plan.length} day${S.plan.length>1?'s':''}/week</p>`+

// ═══════ EXERCISE LIBRARY ═══════
function rLib(){const el=document.getElementById("tab-library");
const allExs=Object.entries(EX_DB).flatMap(([cat,exs])=>exs.map((e,i)=>({...e,cat,idx:i})));
const filtered=allExs.filter(e=>{
  if(S.libFilter!=="all"&&e.cat!==S.libFilter)return false;
  if(S.libSearch&&!e.n.toLowerCase().includes(S.libSearch.toLowerCase()))return false;
  return true;
});
el.innerHTML=`<div class="search-wrap"><span class="search-ico">🔍</span><input class="search-inp" placeholder="Search exercises..." value="${esc(S.libSearch)}" oninput="S.libSearch=this.value;rLib()"></div>`+
`<div class="pills"><button class="pill ${S.libFilter==='all'?'on':''}" onclick="S.libFilter='all';rLib()">All (${allExs.length})</button>${Object.entries(CAT_META).map(([k,v])=>{const cnt=EX_DB[k]?.length||0;return`<button class="pill ${S.libFilter===k?'on':''}" onclick="S.libFilter='${k}';rLib()">${v.e} ${v.l} (${cnt})</button>`}).join("")}</div>`+
`<div style="font-size:11px;color:var(--sub);margin-bottom:10px">${filtered.length} exercise${filtered.length!==1?'s':''} found</div>`+
filtered.map(e=>{const cm=CAT_META[e.cat]||{l:e.cat,e:"🏋️"};const typeClass=e.t==="compound"?"compound":e.t==="isolation"?"isolation":e.t;
return`<div class="ex-card"><div class="ex-badge ${e.cat}">${cm.e}</div><div class="ex-info"><div class="ex-nm">${e.n}</div><div class="ex-meta">${cm.l} · ${e.diff==="beg"?"Beginner":e.diff==="adv"?"Advanced":"Intermediate"}</div><span class="ex-type ${typeClass}">${e.t}</span><div style="font-size:9px;color:var(--sub);margin-top:3px">${e.nt}</div></div><button class="ex-add-btn" onclick="addLibEx('${e.cat}',${e.idx})">+ Add</button></div>`}).join("")+
(filtered.length===0?`<div class="empty"><div class="empty-i">🔍</div><p class="empty-t">No exercises found</p><p class="empty-s">Try a different search or filter.</p></div>`:'')+
`<div style="margin-top:16px"><div class="log-t">📋 Quick Custom Workout</div><p class="intro">Add exercises above to build a custom workout day, then save it.</p><div id="libCart"></div></div>`;
rLibCart();}

el.innerHTML=libCart.length?libCart.map((e,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:4px;border:1px solid var(--bdr);animation:slideIn .2s ease"><div style="flex:1"><div style="font-size:12px;font-weight:600">${e.n}</div><div style="font-size:10px;color:var(--sub)">${e.s} × ${e.r} · ${e.rest}</div></div><button style="padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--red);background:transparent;color:var(--red)" onclick="rmLibEx(${i})">✕</button></div>`).join("")+
`<input class="cw-day-name" id="libWOName" placeholder="Workout name..." style="margin-top:8px"><button class="s-btn grn" onclick="saveLibWO()">💾 Save as Custom Workout</button>`
:`<div style="font-size:11px;color:var(--sub);text-align:center;padding:16px">Tap <b>+ Add</b> on exercises above to build a workout.</div>`;}
function saveLibWO(){const nm=(document.getElementById("libWOName")?.value||"").trim();if(!nm||!libCart.length)return;const wo={day:nm,sub:nm,sched:"Flexible",dur:`~${Math.round(libCart.reduce((a,e)=>a+(e.s||1)*2,10))} min`,warm:"5 min cardio · dynamic stretches",exs:libCart.map(e=>({n:e.n,s:e.s,r:e.r,rest:e.rest,note:e.note})),cool:"Full stretch · 5 min",prog:"Progressive overload.",custom:true};S.customPlans.push(wo);savCustom();S.plan.push({...wo,day:`Day ${S.plan.length+1} — ${wo.day}`});savPlan();updHdr();libCart=[];rLib();alert("Workout saved and added to your plan!")}

// ═══════ FOOD TAB ═══════
function rFood(){const el=document.getElementById("tab-food");const tk=tdk();const dl=S.flog[tk]||[];const tl=dl.reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f}),{cal:0,p:0,c:0,f:0});const t=S.nutri;

MEALS.map((m,mi)=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700;font-size:12px">${m.nm}</span><span style="font-size:10px;color:var(--sub)">${m.tm}</span></div>${m.opts.map((o,oi)=>{const lg=dl.some(l=>l.mi===mi&&l.oi===oi);return`<div class="meal-o ${lg?'logged':''}"><div><div class="meal-tx">${o.ml}</div><div class="meal-mc">${o.cal} kcal · ${o.p}P · ${o.c}C · ${o.f}F</div></div><button class="log-btn ${lg?'rem':'add'}" onclick="${lg?`ulMeal(${mi},${oi})`:`lMeal(${mi},${oi})`}">${lg?'✕':'+ Log'}</button></div>`}).join("")}</div>`).join("")+rFH()}
function lMeal(mi,oi){const tk=tdk();if(!S.flog[tk])S.flog[tk]=[];const m=MEALS[mi].opts[oi];S.flog[tk].push({meal:MEALS[mi].nm,ml:m.ml,cal:m.cal,p:m.p,c:m.c,f:m.f,mi,oi});savFlog();updHdr();rFood()}
function ulMeal(mi,oi){const tk=tdk();if(!S.flog[tk])return;const idx=S.flog[tk].findIndex(l=>l.mi===mi&&l.oi===oi);if(idx>=0)S.flog[tk].splice(idx,1);savFlog();updHdr();rFood()}
function rmLog(i){const tk=tdk();if(S.flog[tk])S.flog[tk].splice(i,1);savFlog();updHdr();rFood()}
function rFH(){const days=Object.keys(S.flog).filter(k=>k!==tdk()).sort().reverse().slice(0,5);if(!days.length)return'';return`<div style="margin-top:10px"><div class="log-t">Recent Food Log</div>`+days.map(dk=>{const items=S.flog[dk]||[];const tot=items.reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p}),{cal:0,p:0});return`<div class="fh-card"><div style="font-size:11px;font-weight:600;margin-bottom:3px">${new Date(dk+'T12:00:00').toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</div><div style="font-size:10px;color:var(--sub)">${items.map(m=>m.meal).join(" · ")}</div><div class="fh-tots"><span>${tot.cal} kcal</span><span>${tot.p}g protein</span></div></div>`}).join("")+`</div>`}
function ring(v,mx,col,lbl,u){const p=Math.min(100,Math.round(v/mx*100)),r=22,ci=2*Math.PI*r,off=ci-(p/100)*ci;return`<div class="mac-i"><svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3.5"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="${col}" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="${ci}" stroke-dashoffset="${off}" transform="rotate(-90 26 26)" style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/><text x="26" y="24" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="JetBrains Mono">${v}</text><text x="26" y="34" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="7">${u}</text></svg><div class="mac-l">${lbl}</div></div>`}

const bc=calcBodyComp(p,S.nutri,S.flog);
el.innerHTML=`<div class="log-t">📐 Body Composition Analysis</div><p class="intro">Based on your stats: ${p.age}yrs · ${p.height}cm · ${p.weight}kg</p>`+
// BMI
`<div class="bc-card"><div class="bc-title">⚖️ BMI (Body Mass Index)</div><div class="bc-row"><div class="bc-label">Your BMI</div><div class="bc-val" style="color:${bc.bmiStatus==='good'?'var(--grn)':bc.bmiStatus==='warn'?'var(--amb)':'var(--red)'}">${bc.bmi}</div></div><div class="bc-bar-wrap"><div class="bc-bar-label"><span>Underweight</span><span>Normal</span><span>Overweight</span><span>Obese</span></div><div class="bc-indicator"><div class="bc-marker" style="left:${Math.min(95,Math.max(2,(bc.bmi-15)/(40-15)*100))}%"></div></div></div><span class="bc-status ${bc.bmiStatus}">${bc.bmiCat}</span><div style="font-size:10px;color:var(--sub);margin-top:6px">Healthy weight range for your height: <b style="color:var(--tx)">${bc.hwLow} – ${bc.hwHigh} kg</b></div></div>`+
// Body Fat Estimate
`<div class="bc-card"><div class="bc-title">🔬 Body Fat Estimate</div><div class="bc-row"><div class="bc-label">Estimated body fat</div><div class="bc-val" style="color:${bc.bfStatus==='good'?'var(--grn)':bc.bfStatus==='warn'?'var(--amb)':'var(--red)'}">${bc.bfEst}%</div></div><div class="bc-bar-wrap"><div class="bc-bar-label"><span>Essential</span><span>Athletic</span><span>Fit</span><span>Average</span><span>High</span></div><div class="bc-indicator"><div class="bc-marker" style="left:${Math.min(95,Math.max(2,(bc.bfEst-3)/(35-3)*100))}%"></div></div></div><span class="bc-status ${bc.bfStatus}">${bc.bfCat}</span><div style="font-size:9px;color:var(--sub);margin-top:6px;font-style:italic">Estimate based on BMI and age. For accuracy, use callipers or a DEXA scan.</div></div>`+
// FFMI
`<div class="bc-card"><div class="bc-title">💪 FFMI (Fat-Free Mass Index)</div><div class="bc-row"><div class="bc-label">Your FFMI</div><div class="bc-val" style="color:${bc.ffmiStatus==='good'?'var(--grn)':'var(--amb)'}">${bc.ffmi}</div></div><div class="bc-bar-wrap"><div class="bc-bar-label"><span>Below avg</span><span>Average</span><span>Above avg</span><span>Excellent</span></div><div class="bc-indicator" style="background:linear-gradient(90deg,var(--red),var(--amb),var(--grn),var(--blu))"><div class="bc-marker" style="left:${Math.min(95,Math.max(2,(bc.ffmi-16)/(26-16)*100))}%"></div></div></div><span class="bc-status ${bc.ffmiStatus}">${bc.ffmiCat}</span><div style="font-size:9px;color:var(--sub);margin-top:6px">FFMI measures muscularity independent of fat. Natural range: 18–25.</div></div>`+
// Caloric Status
`<div class="bc-card"><div class="bc-title">🔥 Today's Caloric Status</div><div class="bc-row"><div class="bc-label">Consumed today</div><div class="bc-val">${bc.todayCal} kcal</div></div><div class="bc-row"><div class="bc-label">Target</div><div class="bc-val">${S.nutri.cal} kcal</div></div><div class="bc-row"><div class="bc-label">TDEE (maintenance)</div><div class="bc-val">${bc.tdee} kcal</div></div><div style="margin-top:8px"><div style="font-size:11px;margin-bottom:4px">Calorie progress</div><div class="apb"><div class="fill ${bc.calClass==='good'?'grn':bc.calClass==='warn'?'amb':'red'}" style="width:${Math.min(100,Math.round(bc.todayCal/S.nutri.cal*100))}%"></div></div></div><span class="bc-status ${bc.calClass}" style="margin-top:8px">${bc.calStatus}</span></div>`+
// Protein
`<div class="bc-card"><div class="bc-title">🥩 Protein Status</div><div class="bc-row"><div class="bc-label">Consumed</div><div class="bc-val">${bc.todayP}g</div></div><div class="bc-row"><div class="bc-label">Target</div><div class="bc-val">${S.nutri.protein}g</div></div><div style="margin-top:8px"><div class="apb"><div class="fill ${bc.proteinClass==='good'?'grn':bc.proteinClass==='warn'?'amb':'red'}" style="width:${Math.min(100,Math.round(bc.todayP/S.nutri.protein*100))}%"></div></div></div><span class="bc-status ${bc.proteinClass}" style="margin-top:6px">${bc.proteinStatus}</span></div>`+
// 7-day avg
`<div class="bc-card"><div class="bc-title">📊 7-Day Average</div><div class="bc-row"><div class="bc-label">Avg daily intake</div><div class="bc-val">${bc.weekAvgCal||'—'} kcal</div></div><div class="bc-row"><div class="bc-label">Goal alignment</div><div class="bc-val" style="color:${S.user.profile.goal==='fat_loss'?(bc.weekAvgCal<S.nutri.cal?'var(--grn)':'var(--red)'):(bc.weekAvgCal>S.nutri.cal*0.9?'var(--grn)':'var(--amb)')}">${bc.weekAvgCal?((bc.weekAvgCal<S.nutri.cal?'Deficit':'Surplus')+' avg'):'No data'}</div></div></div>`;
}

// ═══════ TRACKER ═══════
function startWO(i){S.aw=i;S.rat=null;S.cs={};S.plan[i].exs.forEach((e,ei)=>{S.cs[ei]=Array.from({length:e.s},()=>({w:"",r:"",d:false}))});swTab("track")}
function rTrack(){const el=document.getElementById("tab-track");if(S.aw===null){el.innerHTML=`<div class="empty"><div class="empty-i">📋</div><p class="empty-t">No active session</p><p class="empty-s">Go to Plan → Start Session.</p></div>`;return}
const w=S.plan[S.aw];if(!w){el.innerHTML=`<div class="empty"><p class="empty-t">Plan not found</p></div>`;return}const ts=Object.values(S.cs).reduce((a,s)=>a+s.length,0),ds=Object.values(S.cs).reduce((a,s)=>a+s.filter(x=>x.d).length,0),pct=ts?Math.round(ds/ts*100):0;
el.innerHTML=`<div style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;margin-bottom:5px">${w.day}</div><div class="apb"><div class="fill amb" style="width:${pct}%"></div></div><div class="pb-tx" style="margin-top:4px">${ds}/${ts} sets (${pct}%)</div></div>`+
w.exs.map((e,ei)=>`<div class="card"><div style="font-weight:700;font-size:12px;margin-bottom:1px">${e.n}</div><div style="font-size:10px;color:var(--sub);margin-bottom:6px;font-family:'JetBrains Mono'">Target: ${e.s} × ${e.r}</div><div class="s-hdr"><span>Set</span><span>kg</span><span>Reps</span><span>✓</span></div>${S.cs[ei].map((s,si)=>`<div class="s-row ${s.d?'dn':''}"><span class="s-sn">${si+1}</span><input class="s-inp" type="number" inputmode="decimal" placeholder="0" value="${s.w}" onchange="updS(${ei},${si},'w',this.value)"><input class="s-inp" type="number" inputmode="numeric" placeholder="0" value="${s.r}" onchange="updS(${ei},${si},'r',this.value)"><button class="chk ${s.d?'dn':''}" onclick="togS(${ei},${si})">${s.d?'✓':'○'}</button></div>`).join("")}</div>`).join("")+
`<div style="margin-top:16px;text-align:center"><div style="font-size:12px;font-weight:600;margin-bottom:8px">How did this session feel?</div><div style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">${[1,2,3,4,5].map(r=>`<button class="r-btn ${S.rat===r?'on':''}" onclick="setRat(${r})">${EMO[r]}</button>`).join("")}</div><button class="fin-btn ${S.rat?'ok':'no'}" ${S.rat?'onclick="finWO()"':'disabled'}>Save & Finish Session</button></div>`}
function updS(ei,si,f,v){S.cs[ei][si][f]=v}function togS(ei,si){S.cs[ei][si].d=!S.cs[ei][si].d;rTrack()}function setRat(r){S.rat=r;rTrack()}
function finWO(){const key="w"+S.week+"-d"+S.aw;const mapped={};Object.entries(S.cs).forEach(([ei,sets])=>{mapped[ei]=sets.map(s=>({weight:s.w,reps:s.r,done:s.d}))});S.logs[key]={sets:mapped,rating:S.rat,date:new Date().toISOString(),dayIndex:S.aw};savLogs();S.aw=null;S.cs={};S.rat=null;updHdr();swTab("plan")}

// ═══════ SETTINGS TAB ═══════
function rSet(){const el=document.getElementById("tab-settings");const p=S.user.profile||{};
const ent=Object.entries(S.logs).sort((a,b)=>new Date(b[1].date)-new Date(a[1].date));const we=ent.filter(([k])=>k.startsWith("w"+S.week+"-"));const rats=ent.map(([,v])=>v.rating).filter(Boolean);const avg=rats.length?(rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1):"—";
el.innerHTML=`<div class="p-cards"><div class="p-c"><div class="p-cn">${ent.length}</div><div class="p-cl">Sessions</div></div><div class="p-c"><div class="p-cn">${we.length}/${S.plan.length}</div><div class="p-cl">This Wk</div></div><div class="p-c"><div class="p-cn">${avg}</div><div class="p-cl">Rating</div></div><div class="p-c"><div class="p-cn">${Object.keys(S.flog).length}</div><div class="p-cl">Days Fed</div></div></div>`+
// Session log
`<div class="log-t">Session Log</div>`+(ent.length===0?`<div class="empty"><p class="empty-t">No sessions yet</p></div>`:ent.slice(0,10).map(([key,log])=>{const d=S.plan[log.dayIndex];const cs=Object.values(log.sets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);const ts=Object.values(log.sets).reduce((a,s)=>a+s.length,0);return`<div class="log-c"><div><div style="font-size:11px;font-weight:600">${d?d.day:key}</div><div style="font-size:9px;color:var(--sub)">${new Date(log.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">${EMO[log.rating]||""}</span><span style="font-size:10px;color:var(--sub)">${cs}/${ts}</span></div></div>`}).join(""))+
// Profile settings
`<div class="log-t" style="margin-top:16px">⚙️ Profile</div><div class="card">`+
[{l:"Goal",v:`${GM[p.goal]?.e||""} ${GM[p.goal]?.l||"Not set"}`,k:"goal"},{l:"Focus Areas",v:(p.areas||[]).map(a=>AM[a]?.l).join(", ")||"Not set",k:"areas"},{l:"Body Stats",v:`Age ${p.age} · ${p.height}cm · ${p.weight}kg`,k:"body"},{l:"Training Days",v:`${p.days} day${p.days>1?'s':''}/week`,k:"days"},{l:"Calorie Target",v:`${S.nutri.cal} kcal · ${S.nutri.protein}g P · ${S.nutri.carbs}g C · ${S.nutri.fat}g F`,k:"nutri"}].map(item=>`<div style="margin-bottom:12px"><div class="set-label">${item.l}</div><div style="font-size:11px;color:var(--sub);margin-bottom:6px">${item.v}</div>${item.k!=="nutri"?`<button class="set-edit" onclick="editProfField('${item.k}')">Change</button>`:''}</div>`).join("")+`</div>`+
// Plan management
`<div class="log-t">📋 Plan Management</div><button class="s-btn pri" onclick="if(confirm('Regenerate?')){S.plan=genPlan(S.user.profile);savPlan();updHdr();rSet()}">🔄 Regenerate Auto Plan</button><button class="s-btn grn" style="margin-top:6px" onclick="swTab('library')">📚 Build from Library</button>`+
(S.customPlans.length?`<div style="margin-top:10px">${S.customPlans.map((cp,ci)=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px"><div><div style="font-weight:700;font-size:12px">${cp.day} 🔧</div><div style="font-size:9px;color:var(--sub)">${cp.exs.length} exercises</div></div><div style="display:flex;gap:4px"><button class="set-edit" style="font-size:9px;padding:5px 8px" onclick="S.plan.push({...S.customPlans[${ci}],day:'Day '+(S.plan.length+1)+' — '+S.customPlans[${ci}].day});savPlan();updHdr();rSet()">Add</button><button style="padding:5px 8px;border-radius:6px;font-size:9px;font-weight:700;border:1px solid var(--red);background:transparent;color:var(--red)" onclick="S.customPlans.splice(${ci},1);savCustom();rSet()">✕</button></div></div>`).join("")}</div>`:'')+
// Data management
`<div class="log-t" style="margin-top:16px">🗑️ Data</div><button class="rst-btn" style="margin:0 0 8px" onclick="if(confirm('Reset logs?')){S.logs={};savLogs();updHdr();rSet()}">Reset Workout Logs</button><button class="rst-btn" style="margin:0 0 8px" onclick="if(confirm('Reset food?')){S.flog={};savFlog();updHdr();rSet()}">Reset Food Log</button><button class="rst-btn" style="margin:0" onclick="if(confirm('Delete profile?')){localStorage.removeItem('sp-me');const ids=LS('sp-user-ids')||[];SS('sp-user-ids',ids.filter(x=>x!==S.user.id));doLogout()}">Delete Profile</button>`}

function editProfField(k){
  const p=S.user.profile;
  if(k==="goal"){const opts=Object.entries(GM).map(([k,v])=>`${v.e} ${v.l}`).join("\n");const choice=prompt("Enter goal:\n1. Muscle Gain\n2. Fat Loss\n3. Recomp\n4. General Fitness","1");const map={1:"muscle_gain",2:"fat_loss",3:"recomp",4:"general"};if(map[choice]){p.goal=map[choice];updProfAndRegen()}}
  else if(k==="areas"){const a=prompt("Enter areas (comma-separated):\nchest, back, shoulders, arms, legs, core","chest,back,shoulders,arms,legs,core");if(a){p.areas=a.split(",").map(x=>x.trim()).filter(x=>AM[x]);updProfAndRegen()}}
  else if(k==="body"){const age=prompt("Age:",p.age);const h=prompt("Height (cm):",p.height);const w=prompt("Weight (kg):",p.weight);if(age&&h&&w){p.age=+age;p.height=+h;p.weight=+w;updProfAndRegen()}}
  else if(k==="days"){const d=prompt("Days per week (1-6):",p.days);if(d&&+d>=1&&+d<=6){p.days=+d;updProfAndRegen()}}
}
function updProfAndRegen(){SS("sp-me",S.user);savProf(S.user);S.nutri=calcNutri(S.user.profile);SS("sp-nutri-"+S.user.id,S.nutri);S.plan=genPlan(S.user.profile);savPlan();updHdr();rSet()}

// ═══════ UTILS ═══════
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
init();
</script></body></html>
