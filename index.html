<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ShawnsPod Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--card:#1A1A1A;--card-border:rgba(255,255,255,0.06);--c1:rgba(255,255,255,0.05);--c1-solid:#1A1A1A;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.06);--glass-blur:20px;--bdr:rgba(255,255,255,0.08);--tx:#FFFFFF;--sub:#8A8A8A;--amb:#BFFF00;--amb2:#D4FF4D;--grn:#34D399;--red:#EF4444;--blu:#3B82F6;--pur:#A855F7;--cyn:#06B6D4;--pnk:#EC4899;--input:#141414;--rad:16px;--rads:12px}
html{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden;font-feature-settings:'cv02','cv03','cv04','cv11';letter-spacing:-0.01em}
body{max-width:540px;margin:0 auto;min-height:100dvh;background:var(--bg);padding-bottom:90px}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:'Inter',sans-serif;cursor:pointer}.hide{display:none!important}

/* SPLASH */
#splash{position:fixed;inset:0;background:#0D0D0D;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}#splash .ic{font-size:56px;animation:pulse 1.2s infinite}
#splash .nm{font-family:'Archivo Black';font-size:20px;letter-spacing:.08em;margin-top:16px;color:#fff}#splash .nm span{color:var(--amb)}

/* ONBOARDING */
.ob-wrap{min-height:100dvh;padding:24px;display:flex;flex-direction:column;background:var(--bg)}
.ob-logo{text-align:center;margin-bottom:20px}.ob-logo .ic{font-size:44px}
.ob-logo h1{font-family:'Archivo Black';font-size:20px;letter-spacing:.04em;margin-top:6px}.ob-logo h1 span{color:var(--amb)}
.ob-logo p{font-size:11px;color:var(--sub);margin-top:4px}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .3s}.ob-dot.on{background:var(--amb);width:24px}
.ob-q{font-size:14px;font-weight:700;margin-bottom:8px}.ob-hint{font-size:11px;color:var(--sub);margin-bottom:12px}
.ob-grid{display:grid;gap:8px}.ob-grid.g2{grid-template-columns:1fr 1fr}.ob-grid.g3{grid-template-columns:1fr 1fr 1fr}
.ob-opt{padding:12px;background:var(--card);border:2px solid var(--card-border);border-radius:12px;text-align:center;transition:all .2s;color:var(--tx);font-size:12px}
.ob-opt:active{transform:scale(.97)}.ob-opt.on{border-color:var(--amb);background:rgba(191,255,0,.08)}
.ob-opt .emoji{font-size:22px;display:block;margin-bottom:4px}.ob-opt .label{display:block;font-weight:600}.ob-opt .desc{font-size:9px;color:var(--sub);margin-top:2px;display:block}
.ob-inp-row{display:flex;gap:8px;margin-bottom:12px}.ob-inp-grp{flex:1}.ob-inp-grp label{font-size:10px;color:var(--sub);display:block;margin-bottom:4px}
.ob-inp{width:100%;padding:12px;background:var(--input);border:1px solid rgba(255,255,255,.1);border-radius:var(--rads);color:var(--tx);font-size:16px;outline:none;font-family:'Inter';text-align:center}.ob-inp:focus{border-color:var(--amb)}
.ob-name{width:100%;padding:14px 16px;background:var(--input);border:1px solid rgba(255,255,255,.1);border-radius:var(--rads);color:var(--tx);font-size:16px;outline:none;font-family:'Inter';margin-bottom:16px}
.ob-nav{display:flex;gap:10px;margin-top:16px}.ob-nav button{flex:1;padding:13px;border-radius:100px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.ob-nav button:active{transform:scale(.98)}.ob-back{background:var(--card);color:var(--tx)}.ob-next{background:var(--amb);color:#0D0D0D}.ob-next:disabled{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.av-btn{font-size:22px;background:var(--card);border:2px solid var(--card-border);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:all .2s}.av-btn.on{border-color:var(--amb);background:rgba(191,255,0,.1);transform:scale(1.05)}
.usr-card{width:100%;display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);margin-bottom:8px;color:var(--tx);text-align:left;font-family:'Inter';transition:transform .15s}
.usr-card:active{transform:scale(.98)}
.link-btn{background:none;border:none;color:var(--amb);font-size:13px;font-weight:600}

/* APP SHELL */
#app{padding-bottom:0}
.header{padding:env(safe-area-inset-top,20px) 20px 14px;background:var(--bg);border-bottom:1px solid var(--card-border)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.brand{font-family:'Archivo Black';font-size:17px;letter-spacing:.04em}.brand span{color:var(--amb)}
.usr-row{display:flex;align-items:center;gap:5px;margin-top:4px;cursor:pointer}.usr-av{font-size:15px}.usr-nm{font-size:11px;font-weight:600}.sw-h{font-size:8px;color:rgba(255,255,255,.2)}
.wk-ctrl{display:flex;align-items:center;gap:5px;background:var(--card);border-radius:100px;padding:4px 12px;border:1px solid var(--card-border)}
.wk-ctrl button{background:none;border:none;color:var(--tx);font-size:13px;padding:2px 3px}
.wk-lbl{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--amb);letter-spacing:.1em}
.stats-bar{display:flex;gap:14px;flex-wrap:wrap}
.st-v{font-family:'JetBrains Mono';font-size:15px;font-weight:700}.st-l{font-size:8px;color:var(--sub);margin-left:2px}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;display:flex;background:rgba(13,13,13,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--card-border);z-index:100;padding:8px 0 env(safe-area-inset-bottom,8px)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;color:var(--sub);font-size:15px;transition:all .25s}
.nav button svg{width:22px;height:22px}
.nav button.on{color:var(--amb)}
.nav button.on svg{stroke:var(--amb)}
.nav .nl{font-size:9px;letter-spacing:.03em;font-weight:600}

/* SHARED */
.tab-c{padding:16px 20px 100px;display:none}.tab-c.active{display:block}
.intro{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:14px}
.card{background:var(--card);border-radius:var(--rad);margin-bottom:12px;border:1px solid var(--card-border);padding:16px;animation:fadeUp .3s ease both}
.card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}

/* RECOMMENDATION */

/* ANIMATED PROGRESS BAR */
.apb{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.apb .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.apb .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.apb .fill.amb{background:linear-gradient(90deg,var(--amb),var(--amb2))}
.apb .fill.grn{background:linear-gradient(90deg,var(--grn),#6EE7B7)}
.apb .fill.red{background:linear-gradient(90deg,var(--red),#F87171)}
.apb .fill.blu{background:linear-gradient(90deg,var(--blu),#60A5FA)}
.apb .fill.pur{background:linear-gradient(90deg,var(--pur),#C084FC)}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.08);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--amb)}
.toggle .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on .knob{transform:translateX(20px)}
.toggle-label{font-size:12px;color:var(--sub)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:11px 11px 11px 36px;background:var(--input);border:1px solid rgba(255,255,255,.1);border-radius:var(--rads);color:var(--tx);font-size:13px;outline:none;font-family:'Inter';transition:border-color .2s}
.search-inp:focus{border-color:var(--amb)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;border:none;background:rgba(255,255,255,0.06);color:var(--sub);transition:all .2s;flex-shrink:0}
.pill:active{transform:scale(.95)}
.pill.on{background:var(--amb);color:#0D0D0D}

/* EXERCISE LIST (library + plan) — screenshot-matching layout */
.ex-list-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--rads);margin-bottom:6px;cursor:pointer;transition:all .2s;animation:fadeUp .2s ease both}
.ex-list-item:active{transform:scale(.98);border-color:rgba(255,255,255,.12)}
.ex-thumb{width:64px;height:64px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;background-size:cover;background-position:center}
.ex-thumb img{width:100%;height:100%;object-fit:cover}
.ex-thumb .et-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px}
.ex-thumb.chest .et-fallback{background:linear-gradient(135deg,#1a0505,#331010)}.ex-thumb.back .et-fallback{background:linear-gradient(135deg,#050a1a,#101833)}
.ex-thumb.shoulders .et-fallback{background:linear-gradient(135deg,#14051a,#251033)}.ex-thumb.arms .et-fallback{background:linear-gradient(135deg,#0a1408,#1a2d10)}
.ex-thumb.legs .et-fallback{background:linear-gradient(135deg,#05140a,#0d2d15)}.ex-thumb.core .et-fallback{background:linear-gradient(135deg,#051214,#0d252d)}
.ex-thumb.glutes .et-fallback{background:linear-gradient(135deg,#140510,#2d0d22)}.ex-thumb.cardio .et-fallback{background:linear-gradient(135deg,#14050d,#2d0d1a)}
.ex-thumb.hiit .et-fallback{background:linear-gradient(135deg,#140a05,#2d150d)}.ex-thumb.stretch .et-fallback{background:linear-gradient(135deg,#081408,#152d15)}
.ex-thumb.plyo .et-fallback{background:linear-gradient(135deg,#0a0514,#150d2d)}.ex-thumb.calisthenics .et-fallback{background:linear-gradient(135deg,#14120a,#2d250d)}
.ex-list-info{flex:1;min-width:0}.ex-list-info .eli-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-list-info .eli-meta{font-size:10px;color:var(--sub)}
.ex-list-chv{color:rgba(255,255,255,.2);font-size:18px;flex-shrink:0;margin-left:auto}
.ex-add-btn{padding:6px 12px;border-radius:100px;font-size:10px;font-weight:700;border:none;background:var(--amb);color:#0D0D0D;flex-shrink:0;transition:transform .15s}
/* Filter chips row */
.filter-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.filter-chip{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:100px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--sub)}
.filter-chip.active{background:rgba(191,255,0,.1);border-color:rgba(191,255,0,.3);color:var(--amb)}
.filter-chip .fc-x{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;margin-left:2px}
.ex-add-btn:active{transform:scale(.92)}

/* BODY COMP */
.bc-card{background:var(--card);border-radius:var(--rad);padding:16px;margin-bottom:12px;border:1px solid var(--card-border)}
.bc-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bc-row:last-child{border-bottom:none}
.bc-label{font-size:11px;color:var(--sub)}.bc-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono'}
.bc-bar-wrap{margin-top:6px}
.bc-bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--sub);margin-bottom:3px}
.bc-indicator{position:relative;height:10px;background:linear-gradient(90deg,var(--red),var(--amb),var(--grn),var(--amb),var(--red));border-radius:5px;margin-bottom:2px}
.bc-marker{position:absolute;top:-2px;width:4px;height:14px;background:#fff;border-radius:2px;box-shadow:0 0 4px rgba(0,0,0,.5);transition:left .6s cubic-bezier(.4,0,.2,1)}
.bc-status{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px}
.bc-status.good{background:rgba(52,211,153,.12);color:var(--grn)}
.bc-status.warn{background:rgba(191,255,0,.12);color:var(--amb)}
.bc-status.bad{background:rgba(239,68,68,.12);color:var(--red)}

/* DAY CARDS */
.day-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:-14px;padding:14px}
.day-t{font-weight:700;font-size:14px;margin-bottom:2px}.day-m{font-size:10px;color:var(--sub)}
.done-b{background:var(--grn);color:#0D0D0D;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chv{color:var(--sub);font-size:12px;transition:transform .25s}
.day-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}.card.open .day-body{display:block}.card.open .chv{transform:rotate(90deg)}
.ib{font-size:11px;color:var(--sub);padding:6px 0;line-height:1.5}.ib strong{color:var(--tx)}
.ex-r{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s}.ex-r:last-of-type{border-bottom:none}.ex-r:active{background:rgba(255,255,255,.02);border-radius:8px}
.ex-n{display:none}
.ex-thumb.plan{width:48px;height:48px}.ex-thumb.plan .et-fallback{font-size:22px}
.ex-nm{font-size:14px;font-weight:600;margin-bottom:2px}.ex-d{font-size:11px;color:var(--amb);font-family:'JetBrains Mono';margin-bottom:2px}.ex-nt{font-size:10px;color:var(--sub);line-height:1.4}
.s-btn{width:100%;padding:12px;border-radius:100px;font-size:13px;font-weight:700;margin-top:8px;border:none;transition:all .15s}.s-btn:active{transform:scale(.98)}
.s-btn.pri{background:var(--amb);color:#0D0D0D}.s-btn.out{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.15)}.s-btn.grn{background:var(--grn);color:#0D0D0D}.s-btn.red{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.3)}.s-btn.blu{background:var(--blu);color:#fff}

/* FOOD */
.mac-bar{display:flex;justify-content:space-around;margin-bottom:6px;padding:6px 0}.mac-i{text-align:center}.mac-l{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.meal-o{padding:10px;border-radius:var(--rads);margin-bottom:5px;border:1px solid var(--card-border);background:var(--card);transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.meal-o.logged{border-color:var(--grn);background:rgba(52,211,153,.05)}
.meal-tx{font-size:12px;line-height:1.3;flex:1}.meal-mc{font-size:10px;color:var(--amb);font-weight:600;font-family:'JetBrains Mono';white-space:nowrap}
.log-btn{padding:5px 10px;border-radius:100px;font-size:9px;font-weight:700;border:none;white-space:nowrap;flex-shrink:0;transition:transform .15s}.log-btn:active{transform:scale(.9)}
.log-btn.add{background:var(--grn);color:#0D0D0D}.log-btn.rem{background:rgba(239,68,68,.12);color:var(--red)}
.daily-log{background:var(--card);border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid rgba(52,211,153,.2)}
.dl-title{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--grn)}
.dl-item{font-size:10px;color:var(--sub);padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}.dl-item:last-child{border-bottom:none}
.dl-total{display:flex;justify-content:space-around;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.dl-tv{font-family:'JetBrains Mono';font-size:14px;font-weight:700}.dl-tl{font-size:8px;color:var(--sub)}

/* TRACKER */
.pb-out{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:5px}.pb-in{height:100%;background:linear-gradient(90deg,var(--amb),var(--amb2));border-radius:4px;transition:width .4s}
.pb-tx{font-size:11px;color:var(--sub);font-family:'JetBrains Mono'}
.s-hdr{display:grid;grid-template-columns:28px 1fr 1fr 40px 34px;gap:5px;font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:5px}
.s-row{display:grid;grid-template-columns:28px 1fr 1fr 40px 34px;gap:5px;align-items:center;margin-bottom:4px;transition:opacity .2s}.s-row.dn{opacity:.4}
.s-sn{text-align:center;font-size:12px;font-weight:600;color:var(--sub);font-family:'JetBrains Mono'}
.s-inp{background:var(--input);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 3px;color:var(--tx);font-size:13px;text-align:center;outline:none;width:100%;font-family:'JetBrains Mono';transition:border-color .2s}.s-inp:focus{border-color:var(--amb)}
.chk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;border:2px solid var(--bdr);background:none;color:var(--sub)}.chk.dn{background:var(--grn);border-color:var(--grn);color:#0D0D0D;font-weight:700;animation:popIn .25s ease}
/* r-btn and fin-btn styles moved to Finish Panel section */

/* STATS */
.p-cards{display:flex;gap:8px;margin-bottom:14px}.p-c{flex:1;background:var(--card);border-radius:var(--rad);padding:10px;text-align:center;border:1px solid var(--card-border)}
.p-cn{font-family:'JetBrains Mono';font-size:18px;font-weight:700;color:var(--amb)}.p-cl{font-size:8px;color:var(--sub);margin-top:2px}
.log-t{font-family:'Archivo Black';font-size:14px;font-weight:400;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.log-c{background:var(--card);border-radius:var(--rads);padding:12px;margin-bottom:6px;border:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center}
.fh-card{background:var(--card);border-radius:var(--rads);padding:10px;margin-bottom:6px;border:1px solid var(--card-border)}
/* Nutrition Sub-Tabs */
.ntab-bar{display:flex;gap:4px;padding:4px;background:var(--card);border-radius:100px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ntab-bar::-webkit-scrollbar{display:none}
.ntab-btn{flex:0 0 auto;padding:8px 16px;border-radius:100px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--sub);white-space:nowrap;transition:all .2s;cursor:pointer}
.ntab-btn.on{background:var(--amb);color:#0D0D0D}
/* Meal Cards — image-heavy */
.meal-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);overflow:hidden;margin-bottom:10px;transition:all .2s;cursor:pointer;animation:fadeUp .25s ease both}
.meal-card:active{transform:scale(.98)}
.meal-card.logged{border-color:rgba(52,211,153,.3)}
.meal-card .mc-hero{width:100%;aspect-ratio:16/8;display:flex;align-items:center;justify-content:center;position:relative}
.meal-card .mc-hero .mc-emoji{font-size:48px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.meal-card .mc-hero .mc-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:700;background:rgba(0,0,0,.5);color:var(--grn);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(52,211,153,.2)}
.meal-card .mc-body{padding:12px 14px}
.meal-card .mc-title{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:6px}
.meal-card .mc-macros{display:flex;gap:6px;flex-wrap:wrap}
.meal-card .mc-macro{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;font-family:'JetBrains Mono';background:rgba(255,255,255,.04);border:1px solid var(--card-border)}
.meal-card .mc-macro.cal{color:var(--amb);border-color:rgba(191,255,0,.15)}.meal-card .mc-macro.pro{color:#EF4444;border-color:rgba(239,68,68,.15)}
.meal-card .mc-macro.carb{color:#3B82F6;border-color:rgba(59,130,246,.15)}.meal-card .mc-macro.fat{color:#A855F7;border-color:rgba(168,85,247,.15)}
.meal-card .mc-log-btn{margin-top:8px;width:100%;padding:8px;border-radius:100px;font-size:11px;font-weight:700;border:none;background:rgba(191,255,0,.1);color:var(--amb);cursor:pointer;transition:all .15s}
.meal-card .mc-log-btn:active{transform:scale(.97)}
.meal-card.logged .mc-log-btn{background:rgba(239,68,68,.1);color:var(--red)}
/* Meal Plan Cards */
.mp-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.mp-mpd{display:flex;align-items:center;gap:6px;flex:1}
.mp-mpd label{font-size:10px;color:var(--sub);white-space:nowrap}
.mp-mpd select{background:var(--card);border:1px solid var(--card-border);border-radius:8px;color:var(--tx);font-size:12px;padding:6px 10px;font-family:inherit}
.mp-refresh{padding:8px 14px;border-radius:100px;border:none;background:var(--amb);color:#0D0D0D;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.mp-refresh:active{transform:scale(.96)}
.mp-day{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);margin-bottom:10px;overflow:hidden;animation:fadeUp .25s ease both}
.mp-day-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer}
.mp-day-name{font-size:13px;font-weight:700}
.mp-day-badge{padding:3px 10px;border-radius:100px;font-size:9px;font-weight:700}
.mp-day-badge.train{background:rgba(191,255,0,.12);color:var(--amb)}
.mp-day-badge.rest{background:rgba(255,255,255,.05);color:var(--sub)}
.mp-day-body{padding:0 14px 14px}
.mp-meal-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--card-border)}
.mp-meal-row:last-child{border-bottom:none}
.mp-meal-emoji{font-size:28px;flex-shrink:0;width:40px;text-align:center}
.mp-meal-info{flex:1;min-width:0}
.mp-meal-type{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.mp-meal-name{font-size:12px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.mp-meal-macros{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.mp-meal-macros span{font-size:9px;font-family:'JetBrains Mono';font-weight:600}
.mp-meal-macros .cal{color:var(--amb)}.mp-meal-macros .pro{color:#EF4444}.mp-meal-macros .carb{color:#3B82F6}.mp-meal-macros .fat{color:#A855F7}
.mp-day-totals{display:flex;gap:8px;justify-content:center;padding:10px 0 4px;margin-top:6px;border-top:1px solid var(--card-border)}
.mp-day-totals div{text-align:center;padding:4px 10px;background:rgba(255,255,255,.03);border-radius:6px}
.mp-day-totals .tv{font-family:'JetBrains Mono';font-size:12px;font-weight:700}
.mp-day-totals .tl{font-size:8px;color:var(--sub);margin-top:1px}
.mp-legend{display:flex;gap:12px;justify-content:center;margin-bottom:12px;font-size:10px;color:var(--sub)}
.mp-legend span{display:flex;align-items:center;gap:4px}
.mp-legend .dot{width:8px;height:8px;border-radius:50%}
.mp-legend .dot.t{background:var(--amb)}.mp-legend .dot.r{background:rgba(255,255,255,.15)}
/* Grocery List */
.gl-overlay{position:fixed;inset:0;background:#0D0D0D;z-index:200;display:flex;flex-direction:column;animation:fadeUp .2s ease;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.gl-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--card-border);min-height:56px}
.gl-close{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.gl-header h2{font-size:16px;margin:0}
.gl-close{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;padding:4px 8px}
.gl-body{flex:1;overflow-y:auto;padding:16px 20px}
.gl-cat{margin-bottom:16px}
.gl-cat-title{font-size:12px;font-weight:700;color:var(--amb);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--card-border)}
.gl-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.gl-item-name{color:var(--tx)}.gl-item-qty{color:var(--sub);font-family:'JetBrains Mono';font-size:11px;white-space:nowrap}
.gl-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:100px;border:none;background:rgba(191,255,0,.1);color:var(--amb);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.gl-btn:active{transform:scale(.96)}
/* Recipe Detail Modal */
.recipe-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;flex-direction:column;animation:fadeUp .2s ease}
.recipe-panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:540px;width:100%;margin:0 auto}
.recipe-hero{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;position:relative}
.recipe-hero .rh-emoji{font-size:80px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.5))}
.recipe-hero .rh-close{position:absolute;top:calc(52px + env(safe-area-inset-top,0px));right:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.recipe-hero .rh-meal-type{position:absolute;top:calc(52px + env(safe-area-inset-top,0px));left:16px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;background:rgba(0,0,0,.5);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}
.recipe-body{padding:20px 16px 100px}
.recipe-body .rb-title{font-family:'Archivo Black';font-size:20px;letter-spacing:-.01em;margin-bottom:12px;line-height:1.3}
.rb-macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.rb-macro-box{text-align:center;padding:10px 6px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--rads)}
.rb-macro-box .rmb-val{font-family:'JetBrains Mono';font-size:16px;font-weight:700}.rb-macro-box .rmb-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.rb-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amb);margin-bottom:8px}
.rb-ingredient{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--rads);margin-bottom:6px}
.rb-ingredient .ri-dot{width:6px;height:6px;border-radius:50%;background:var(--amb);flex-shrink:0}
.rb-ingredient .ri-name{flex:1;font-size:12px}
.rb-ingredient .ri-qty{font-size:11px;color:var(--sub);font-family:'JetBrains Mono'}
.rb-steps{list-style:none;padding:0;counter-reset:step}.rb-steps li{counter-increment:step;display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--card-border)}.rb-steps li:last-child{border-bottom:none}
.rb-steps li::before{content:counter(step);width:24px;height:24px;border-radius:50%;background:var(--amb);color:#0D0D0D;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono'}
.rb-steps li span{font-size:12px;line-height:1.5;padding-top:3px}
.rb-log-action{margin-top:20px}
.rb-log-action button{width:100%;padding:14px;border-radius:100px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.rb-log-action button:active{transform:scale(.97)}
.fh-tots{display:flex;gap:10px;margin-top:4px;font-size:10px;font-family:'JetBrains Mono';color:var(--amb);font-weight:600}

/* SETTINGS */
.set-label{font-size:12px;font-weight:700;margin-bottom:4px;color:var(--amb)}
.set-edit{padding:8px 16px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;transition:all .15s}
.set-edit:active{transform:scale(.95);background:rgba(255,255,255,.05)}

/* MISC */
.empty{text-align:center;padding:36px 16px}.empty-i{font-size:40px;margin-bottom:8px}.empty-t{font-size:14px;font-weight:600;margin-bottom:3px}.empty-s{font-size:12px;color:var(--sub);line-height:1.5}
.rst-btn{display:block;margin:20px auto 0;padding:7px 14px;background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:100px;font-size:10px;font-weight:600;opacity:.7}

/* ADMIN PANEL */
.admin-gate{background:var(--card);border:1px solid rgba(168,85,247,.2);border-radius:var(--rad);padding:20px;margin-bottom:14px;text-align:center}
.admin-gate .ag-title{font-size:13px;font-weight:700;color:var(--pur);margin-bottom:6px}
.admin-gate .ag-hint{font-size:10px;color:var(--sub);margin-bottom:12px}
.admin-pin-inp{width:160px;padding:12px;background:var(--input);border:1px solid rgba(168,85,247,.3);border-radius:var(--rads);color:var(--tx);font-size:18px;outline:none;font-family:'JetBrains Mono';text-align:center;letter-spacing:.3em}
.admin-pin-inp:focus{border-color:var(--pur)}
.admin-btn{padding:10px 20px;border-radius:100px;font-size:12px;font-weight:700;border:none;background:var(--pur);color:#fff;margin-top:10px;transition:all .15s}
.admin-btn:active{transform:scale(.95)}
.admin-panel{background:var(--card);border:1px solid rgba(168,85,247,.15);border-radius:var(--rad);padding:16px;margin-bottom:14px}
.admin-panel .ap-title{font-size:13px;font-weight:700;color:var(--pur);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.admin-panel .ap-hint{font-size:10px;color:var(--sub);margin-bottom:12px}
.admin-user{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.02);border:1px solid var(--card-border);border-radius:var(--rads);margin-bottom:6px}
.admin-user .au-info{flex:1;min-width:0}
.admin-user .au-name{font-size:12px;font-weight:700}
.admin-user .au-meta{font-size:9px;color:var(--sub);margin-top:2px}
.admin-del{padding:6px 12px;border-radius:100px;font-size:10px;font-weight:700;border:1px solid rgba(239,68,68,.3);background:transparent;color:var(--red);flex-shrink:0;transition:all .15s}
.admin-del:active{background:rgba(239,68,68,.1)}
.admin-del-all{width:100%;padding:10px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);color:var(--red);margin-top:8px}
.admin-logout{width:100%;padding:8px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid var(--card-border);background:transparent;color:var(--sub);margin-top:6px}

/* Dashboard Greeting */
.dash-greeting{padding:24px 4px 0;margin-bottom:20px}
.dash-hello{font-size:14px;color:var(--sub);margin-bottom:2px}
.dash-name{font-family:'Archivo Black';font-size:32px;letter-spacing:-.01em;line-height:1.1}

/* Weekly Calendar Strip */
.cal-strip{display:flex;gap:4px;margin-bottom:20px;padding:0 4px}
.cal-day{flex:1;text-align:center;padding:10px 4px;border-radius:12px;background:var(--card);border:1px solid var(--card-border);cursor:default;transition:all .2s}
.cal-day-name{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cal-day-num{font-size:14px;font-weight:700}
.cal-day.today{background:var(--amb);color:#0D0D0D;border-color:var(--amb)}
.cal-day.today .cal-day-name{color:rgba(0,0,0,.5)}
.cal-day.done:not(.today){border-color:var(--grn)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--grn);margin:4px auto 0}
.cal-day.today .cal-dot{background:#0D0D0D}

/* Progress Summary */
.progress-bar-section{display:flex;gap:8px;margin-bottom:24px;padding:0 4px}
.prog-item{flex:1;background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:12px 8px;text-align:center}
.prog-ring{position:relative;width:40px;height:40px;margin:0 auto 6px}
.prog-ring svg{width:40px;height:40px}
.prog-ring span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.prog-num{font-size:18px;font-weight:800;color:var(--amb);margin-bottom:4px}
.prog-label{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em}

/* Section Titles */
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sub);padding:0 4px;margin-bottom:10px}

/* Week Navigation */
.wk-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.wk-nav button{background:none;border:1px solid var(--card-border);color:var(--tx);padding:6px 14px;border-radius:100px;font-size:11px;font-weight:600}
.wk-nav span{font-size:12px;font-weight:700;color:var(--sub)}

/* Nutrition Preview */
.nutri-preview{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:18px 20px;margin-bottom:16px;cursor:pointer}
.np-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.np-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--sub);width:56px;flex-shrink:0}
.np-bar{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.np-fill{height:100%;border-radius:3px;transition:width .6s ease}
.np-val{font-size:12px;font-weight:700;width:80px;text-align:right;font-family:'JetBrains Mono',monospace}.np-val span{color:var(--sub);font-weight:400}
.np-macros{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--card-border)}
.np-macro{flex:1;text-align:center}
.np-mv{font-size:14px;font-weight:700}
.np-ml{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.np-tap{font-size:10px;color:var(--amb);text-align:center;margin-top:12px;font-weight:600}

/* Habits Card */
.habits-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px 18px;margin-bottom:16px}
.habit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.habit-label{font-size:11px;font-weight:600;width:80px;flex-shrink:0}
.habit-dots{display:flex;gap:4px;flex:1}
.habit-dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--sub);font-weight:600}
.habit-dot.active{background:var(--amb);color:#0D0D0D;border-color:var(--amb)}
.habit-score{font-size:12px;font-weight:700;color:var(--amb);width:30px;text-align:right}
.habit-streak{text-align:center;font-size:11px;color:var(--sub);padding-top:8px;border-top:1px solid var(--card-border)}

/* Journey Card */
.journey-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px 18px;margin-bottom:16px}
.journey-milestone{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--card-border);opacity:.4}
.journey-milestone:last-child{border-bottom:none}
.journey-milestone.unlocked{opacity:1}
.jm-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border-radius:10px}
.journey-milestone.unlocked .jm-icon{background:rgba(191,255,0,.1)}
.jm-title{font-size:13px;font-weight:700}
.jm-desc{font-size:10px;color:var(--sub);margin-top:2px}

/* Stacked Workout Cards */
.wo-stack-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.wo-stack-card.current{border-color:var(--amb);box-shadow:0 0 0 1px var(--amb),0 4px 20px rgba(191,255,0,.08)}
.wo-stack-card.completed{opacity:.55}
.wo-stack-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.wo-stack-left{display:flex;align-items:center;gap:12px}
.wo-stack-indicator{width:4px;height:36px;border-radius:2px;background:rgba(255,255,255,.1);flex-shrink:0}
.wo-stack-card.current .wo-stack-indicator{background:var(--amb)}
.wo-stack-card.completed .wo-stack-indicator{background:var(--grn)}
.wo-stack-title{font-size:14px;font-weight:700}
.wo-stack-meta{font-size:10px;color:var(--sub);margin-top:2px}
.wo-status-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:.03em}
.wo-status-badge.done{background:rgba(52,211,153,.15);color:var(--grn)}
.wo-status-badge.current{background:rgba(191,255,0,.15);color:var(--amb)}
.wo-status-badge.upcoming{background:rgba(255,255,255,.04);color:var(--sub)}
.wo-stack-right{display:flex;align-items:center;gap:8px}
.wo-stack-card .day-body{display:none;padding:14px 16px;border-top:1px solid var(--card-border)}
.wo-stack-card.open .day-body{display:block}
.wo-stack-card.open .chv{transform:rotate(90deg)}

/* Finish Panel */
.finish-panel{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px;margin-top:16px}
.fp-title{font-size:16px;font-weight:800;margin-bottom:16px;text-align:center}
.fp-alerts{margin-bottom:16px}
.fp-section{margin-bottom:16px}
.fp-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sub);margin-bottom:8px}
.fp-emojis{display:flex;justify-content:center;gap:8px}
.r-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 14px;border-radius:12px;border:1px solid var(--card-border);background:rgba(255,255,255,.02);font-size:22px;cursor:pointer;transition:all .2s;color:var(--tx)}
.r-btn.on{border-color:var(--amb);background:rgba(191,255,0,.1);box-shadow:0 0 12px rgba(191,255,0,.15)}
.r-lbl{font-size:8px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.r-btn.on .r-lbl{color:var(--amb)}
.fp-slider-wrap{padding:0 4px}
.fp-slider{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
.fp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--amb);cursor:pointer;border:3px solid #0D0D0D;box-shadow:0 0 8px rgba(191,255,0,.3)}
.fp-slider-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-top:6px}
.fp-slider-labels #diffVal{color:var(--amb);font-weight:800;font-size:14px}
.fp-comment{width:100%;background:var(--input,#141414);border:1px solid var(--card-border);border-radius:12px;padding:12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;resize:vertical;min-height:60px}
.fp-comment::placeholder{color:var(--sub);opacity:.6}
.fin-btn{width:100%;padding:16px;border:none;border-radius:100px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:8px}

.note-edit-btn{background:rgba(191,255,0,.1);color:var(--amb)}.note-del-btn{background:rgba(239,68,68,.1);color:var(--red)}
.note-add-btn{width:100%;padding:12px;border-radius:var(--rad);font-size:13px;font-weight:700;border:2px dashed var(--card-border);background:transparent;color:var(--amb);cursor:pointer;transition:all .2s;margin-bottom:16px}
.note-add-btn:focus{outline:2px solid var(--amb);outline-offset:2px}
.note-add-btn:hover,.note-add-btn:focus{border-color:var(--amb);background:rgba(191,255,0,.03)}
.note-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.note-confirm-box{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);padding:24px;max-width:320px;width:100%;text-align:center}
.note-confirm-box p{font-size:14px;margin-bottom:16px;line-height:1.5}
.note-confirm-box .note-actions{justify-content:center}

/* EQUIPMENT */
.eq-hero{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);padding:16px;margin-bottom:14px;text-align:center}
.eq-hero .eq-h-title{font-family:'Archivo Black';font-size:16px;letter-spacing:.02em;margin-bottom:4px}.eq-hero .eq-h-title span{color:var(--amb)}
.eq-hero .eq-h-sub{font-size:11px;color:var(--sub);line-height:1.5}
.eq-gym-tags{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.eq-gym-tag{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:600;background:rgba(191,255,0,.08);border:1px solid rgba(191,255,0,.2);color:var(--amb)}
.eq-cat-hdr{font-size:13px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:6px;color:var(--tx)}
.eq-card{background:var(--card);border-radius:var(--rads);padding:12px;margin-bottom:8px;border:1px solid var(--card-border);animation:fadeUp .25s ease both}
.eq-card .eq-top{display:flex;gap:10px;align-items:flex-start}
.eq-card .eq-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.eq-card .eq-info{flex:1}
.eq-card .eq-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.eq-card .eq-desc{font-size:10px;color:var(--sub);line-height:1.4;margin-bottom:4px}
.eq-card .eq-muscles{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.eq-muscle{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(191,255,0,.08);color:var(--amb)}
.eq-card .eq-exercises{margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr)}
.eq-card .eq-ex-title{font-size:10px;font-weight:700;color:var(--grn);margin-bottom:4px}
.eq-ex-item{font-size:10px;color:var(--sub);padding:2px 0;display:flex;align-items:center;gap:4px}
.eq-ex-item::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--amb);flex-shrink:0}
.eq-toggle{background:none;border:none;color:var(--amb);font-size:10px;font-weight:600;padding:2px 0;cursor:pointer}

/* PROGRESSION RECOMMENDATIONS */
.prog-section{margin-bottom:14px}
.prog-title{font-size:13px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.prog-hint{font-size:10px;color:var(--sub);margin-bottom:10px}
.prog-card{background:var(--card);border-radius:var(--rads);padding:12px;margin-bottom:8px;border:1px solid var(--card-border);animation:fadeUp .25s ease both}
.prog-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-icon{font-size:18px;flex-shrink:0}
.prog-info{flex:1;min-width:0}
.prog-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-detail{font-size:9px;color:var(--sub);font-family:'JetBrains Mono';margin-top:1px}
.prog-change{font-size:11px;font-weight:800;font-family:'JetBrains Mono';white-space:nowrap;flex-shrink:0}
.prog-msg{font-size:10px;color:var(--sub);line-height:1.5}

/* BODY GOAL GUIDANCE */
.bg-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.bg-title{font-size:13px;font-weight:700;margin-bottom:8px}
.bg-tip{font-size:11px;color:var(--sub);line-height:1.6;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,.02);border:1px solid var(--bdr)}
.bg-tip:last-child{margin-bottom:0}
.bg-tip.good{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04)}
.bg-tip.warn{border-color:rgba(191,255,0,.2);background:rgba(191,255,0,.04)}

.rest-timer{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--card);border:2px solid var(--amb);border-radius:var(--rad);padding:16px 28px;z-index:999;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.rest-timer .rt-time{font-size:32px;font-weight:800;color:var(--amb);font-family:'JetBrains Mono'}
.rest-timer .rt-btns{display:flex;gap:8px;margin-top:8px;justify-content:center}
.rest-timer .rt-btn{padding:4px 12px;border-radius:100px;border:1px solid var(--card-border);background:var(--bg);color:var(--tx);cursor:pointer;font-size:11px}
.rpe-sel{width:40px;padding:2px;border-radius:6px;border:1px solid var(--bdr);background:var(--input);color:var(--tx);font-size:11px;text-align:center}
.macro-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.macro-bar .mb-lbl{width:60px;font-size:11px;color:var(--sub)}
.macro-bar .mb-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.macro-bar .mb-fill{height:100%;border-radius:4px;transition:width .3s}
.macro-bar .mb-val{width:60px;font-size:10px;color:var(--sub);text-align:right;font-family:'JetBrains Mono'}
.meas-row{display:grid;grid-template-columns:1fr 80px 60px;gap:8px;align-items:center;margin:4px 0}
.meas-inp{padding:4px 8px;border-radius:6px;border:1px solid var(--bdr);background:var(--input);color:var(--tx);font-size:12px;width:100%}
.vol-card{display:grid;grid-template-columns:1fr auto;gap:4px;padding:8px 12px;background:var(--bg);border-radius:8px;margin:4px 0}
.vol-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:2px}
.vol-fill{height:100%;background:var(--amb);border-radius:3px}
.sub-chip{display:inline-block;padding:2px 8px;margin:2px;border-radius:100px;background:var(--bg);border:1px solid var(--card-border);font-size:10px;color:var(--sub);cursor:pointer}
.sub-chip:hover{border-color:var(--amb);color:var(--amb)}
.onerm-card{background:var(--card);border-radius:var(--rads);padding:12px;margin:8px 0}
.onerm-val{font-size:24px;font-weight:800;color:var(--amb);font-family:'JetBrains Mono'}
.chart-wrap{background:var(--card);border-radius:var(--rads);padding:12px;margin:8px 0}

.wo-timer{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:11px;color:var(--sub)}
.wo-timer .wt-dot{width:6px;height:6px;border-radius:50%;background:#EF4444;animation:pulse-dot 1s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.pr-card{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(234,88,12,.03));border:1px solid rgba(245,158,11,.15);border-radius:var(--rads);padding:12px;margin:6px 0}
.pr-val{font-size:20px;font-weight:800;color:#F59E0B;font-family:'JetBrains Mono'}
.pr-badge{display:inline-block;padding:2px 6px;border-radius:6px;background:#F59E0B;color:#000;font-size:8px;font-weight:800;margin-left:4px}
.plate-visual{display:flex;align-items:center;justify-content:center;gap:2px;margin:8px 0;min-height:40px}
.plate{display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:8px;font-weight:700;color:#fff;min-width:16px}
.plate-bar{width:120px;height:8px;background:#666;border-radius:4px}
.preset-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rads);padding:12px;margin:6px 0;cursor:pointer;transition:border-color .2s}
.preset-card:hover{border-color:var(--amb)}
.overload-alert{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:var(--rads);padding:8px 12px;margin:4px 0;font-size:11px}
.theme-toggle{position:relative;width:44px;height:24px;border-radius:12px;background:var(--bdr);border:none;cursor:pointer;padding:0}
.theme-toggle .toggle-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--amb);transition:transform .2s}

/* MORE NAV GRID */
.more-nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.more-nav-item{background:var(--card);border:1px solid var(--card-border);border-radius:var(--rad);padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s}
.more-nav-item:active{transform:scale(.97);border-color:var(--amb)}
.more-nav-item span{font-size:28px;display:block;margin-bottom:6px}
.more-nav-item div{font-size:12px;font-weight:600;color:var(--sub)}

function dayAim(d){

  (d.exs||[]).forEach(function(e){const db=findExInDB(e.n);if(!db)return;mus[db.cat]=(mus[db.cat]||0)+1;if(db.t==="compound")comp++;else if(db.t==="isolation")iso++;else other++});
  const sorted=Object.entries(mus).sort(function(a,b){return b[1]-a[1]});
  const targets=sorted.slice(0,3).map(function(e){return(CAT_META[e[0]]||{l:e[0]}).l}).join(", ")||"mixed";
  const g=GM[S.user?.profile?.goal]||GM.general;
  return {targets:targets,comp:comp,iso:iso,other:other,goalDesc:g.d,repRange:g.rm,rest:g.rstm};
}

function planSummary(){
  if(!S.plan||!S.plan.length||!S.user)return "";
  const goal=S.user.profile?.goal||"general";
  const gm=GM[goal]||GM.general;
  const dayCount=S.plan.length;
  // Infer split from day names
  const names=S.plan.map(function(d){return(d.day||"").toLowerCase()}).join(" ");
  let split="custom";
  if(/push.*pull.*leg/.test(names)||/pull.*leg.*push/.test(names))split="Push / Pull / Legs";
  else if(/upper/.test(names)&&/lower/.test(names))split="Upper / Lower";
  else if(/full\s*body/.test(names))split="Full Body";
  else if(/chest|back|leg|arm|shoulder/.test(names))split="Body-part split";
  return `${dayCount}-day ${split} for <b>${gm.l}</b>. ${gm.d}. Target reps: <b>${gm.rm}</b>, rest: <b>${gm.rstm}</b>.`;
}

// Body composition / nutrition targets explained in coach speak. Reads the
// same numbers the app uses internally (Mifflin–St Jeor + activity multiplier)
// so the user can see why their calorie/protein targets are what they are.
function rBodyComp(){
  const p=S.user?.profile;const n=S.nutri;if(!p||!n)return "";
  const gm=GM[p.goal]||GM.general;
  const sex=p.gender==="female"?"female":"male";
  const am={1:1.3,2:1.4,3:1.45,4:1.55,5:1.65,6:1.75}[p.days]||1.5;
  const bmr=Math.round(10*p.weight+6.25*p.height-5*p.age+(p.gender==="female"?-161:5));
  const tdee=n.tdee||Math.round(bmr*am);
  const goalAdj=gm.ca||0;
  const proteinPerKg=p.goal==="fat_loss"?2.2:p.goal==="muscle_gain"?2.0:1.8;
  const minFloor=sex==="female"?1200:1500;
  const floorWarn=n.cal<minFloor;
  return `<div class="bodycomp"><div class="bodycomp-head">🧬 Your body composition & targets</div>`+
    `<div class="bodycomp-row"><span>BMR (Mifflin–St Jeor)</span><span>${bmr} kcal/day</span></div>`+
    `<div class="bodycomp-row"><span>Activity multiplier (${p.days} day${p.days!==1?"s":""}/wk)</span><span>×${am}</span></div>`+
    `<div class="bodycomp-row"><span>TDEE (maintenance)</span><span>${tdee} kcal/day</span></div>`+
    `<div class="bodycomp-row"><span>Goal adjustment (${gm.l})</span><span>${goalAdj>=0?"+":""}${goalAdj} kcal</span></div>`+
    `<div class="bodycomp-row"><span>Calorie target</span><span style="color:var(--amb)">${n.cal} kcal/day</span></div>`+
    `<div class="bodycomp-row"><span>Protein target (${proteinPerKg}g/kg)</span><span style="color:#EF4444">${n.protein}g</span></div>`+
    `<div class="bodycomp-row"><span>Carbs / Fat</span><span>${n.carbs}g / ${n.fat}g</span></div>`+
    (floorWarn?`<div class="bodycomp-note" style="color:var(--amb)">⚠️ Your target (${n.cal} kcal) is below the ${minFloor} kcal safety floor for ${sex} adults. Consider a smaller deficit, or consult a professional.</div>`:"")+
    `<div class="bodycomp-note">Protein comes first (${proteinPerKg}g per kg bodyweight to protect muscle while training). Calories are an estimate — watch your weight for 2–4 weeks and adjust by ±100–200 kcal if it isn't moving the direction you want.</div>`+
    `</div>`;
}
function rWeeklyVolume(){
  if(!S.plan||!S.plan.length)return "";
  const vol=weeklyVolume();
  const rec={chest:[10,20],back:[10,20],shoulders:[8,20],arms:[8,16],legs:[10,20],glutes:[8,16],core:[6,16]};
  const order=["chest","back","shoulders","arms","legs","glutes","core"];
  const rows=order.filter(function(k){return vol[k]!=null}).map(function(k){
    const sets=vol[k]||0;const r=rec[k]||[8,20];
    const status=sets<r[0]?"🟡 under":sets>r[1]?"🔴 over":"🟢 on target";
    const colour=sets<r[0]?"var(--amb)":sets>r[1]?"var(--red)":"var(--grn)";
    return `<div class="bodycomp-row"><span>${(CAT_META[k]||{l:k}).l}</span><span style="color:${colour}">${sets} sets · ${status}</span></div>`;

function coachTips(){
  const tips=[];
  if(!S.plan||!S.plan.length||!S.user)return tips;
  const goal=S.user.profile?.goal||"general";
  const level=S.user.profile?.level||"intermediate";
  // 1) Compound-first
  tips.push({i:"🏋️",t:"Open each session with your biggest compound lift while you're fresh — save isolation work for the end."});
  // 2) Progression from last session
  const logKeys=Object.keys(S.logs||{}).sort().reverse();
  if(logKeys.length){
    const last=S.logs[logKeys[0]];
    if(last&&last.sets&&last.dayIndex>=0&&S.plan[last.dayIndex]){
      const plan=S.plan[last.dayIndex];
      let sug=null;
      Object.entries(last.sets).some(function(e){
        const ei=e[0],sets=e[1];const ex=plan.exs[ei];if(!ex)return false;
        const db=findExInDB(ex.n);if(!db)return false;
        if(!sets.length||!sets.every(function(s){return s.done}))return false;
        const top=parseInt(((ex.r||"").split("-").pop()||"0"),10);if(!top)return false;
        const allHitTop=sets.every(function(s){return parseInt(s.reps,10)>=top});
        const weight=parseFloat(sets[sets.length-1].weight);
        if(allHitTop&&weight>0){
          const isLower=db.cat==="legs"||db.cat==="glutes";
          sug={name:ex.n,weight:weight,next:weight+(isLower?5:2.5)};
          return true;
        }
        return false;
      });
      if(sug)tips.push({i:"📈",t:`You hit every rep on <b>${sug.name}</b> at ${sug.weight}kg — try ${sug.next}kg next session.`});
      else tips.push({i:"🔁",t:`Stick with last session's weights until every prescribed rep feels clean, then add ${2.5}kg (upper) or 5kg (lower).`});
    }
  } else {
    tips.push({i:"🧭",t:"First week: pick a weight you can lift for every prescribed rep with 2 reps in reserve. Add small increments weekly."});
  }
  // 3) Goal-specific
  const goalTips={
    muscle_gain:{i:"🍗",t:"Hypertrophy rule: 10–20 hard sets per muscle per week, 8–12 reps, 1–2 reps shy of failure on compounds."},
    fat_loss:{i:"🔥",t:"Protect muscle during a deficit: keep weights heavy, reps 8–12, add cardio separately rather than rushing between sets."},
    strength:{i:"💪",t:"Strength block: 3–5 reps on primary lifts, 3–5 minutes rest, add a small load every session or every other session."},
    recomp:{i:"⚖️",t:"Recomp: prioritise protein (≈1.8g/kg), keep calories near maintenance, progress on compounds week-on-week."},
    general:{i:"🎯",t:"General fitness: alternate weeks — one focused on strength (4–6 reps), one on hypertrophy (8–12) — keeps you adaptable."}
  };
  tips.push(goalTips[goal]||goalTips.general);
  // 4) Level-specific
  if(level==="beginner")tips.push({i:"🌱",t:"Beginner: master form before load. Keep a 2-rep buffer, film working sets, add reps before weight."});
  else if(level==="veteran")tips.push({i:"🔄",t:"Veteran: rotate exercise variations every 4–6 weeks. Tap ⇄ on any lift to swap in a machine or cable alternative."});
  // 5) Frequency check (last 7 days)
  const now=Date.now();
  const last7=Object.values(S.logs||{}).filter(function(l){return l.date&&(now-new Date(l.date).getTime())<7*86400000});
  if(last7.length===0&&logKeys.length)tips.push({i:"⏰",t:"No sessions in the last 7 days — restart at 80–90% of your previous loads for one week."});
  else if(last7.length>=5)tips.push({i:"😴",t:"5+ sessions in 7 days — take a rest day. Recovery is where growth happens."});
  return tips.slice(0,4);
}

function fixDuplicates(di){
  const d=S.plan[di];if(!d)return;
  const seenPat={};const used=new Set(d.exs.map(function(e){return e.n}));
  let swaps=0;
  d.exs.forEach(function(e,idx){
    const p=getPat(e.n);if(!p)return;
    if(seenPat[p]===undefined){seenPat[p]=idx;return}
    // Duplicate — find a replacement with a different pat in the same category
    const db=findExInDB(e.n);const cat=db?db.cat:null;if(!cat)return;
    const pool=(EX_DB[cat]||[]).filter(function(x){
      if(used.has(x.n))return false;
      const xp=getPat(x.n);if(!xp||seenPat[xp]!==undefined)return false;
      return true;
    });
    if(!pool.length)return;
    const pick=pool[Math.floor(Math.random()*pool.length)];
    used.delete(e.n);used.add(pick.n);
    d.exs[idx]=Object.assign({},e,{n:pick.n,note:pick.nt||e.note});
    seenPat[getPat(pick.n)]=idx;
    swaps++;
  });
  if(!swaps){ftoast("No clean replacement patterns available in this category — try Shuffle Day");return}
  savPlan();rPlan();
  setTimeout(function(){document.getElementById("dc"+di)?.classList.add("open")},10);
  ftoast("✓ Swapped "+swaps+" duplicate"+(swaps!==1?"s":"")+" for fresh patterns");
}
function shuffleDay(di){
  const d=S.plan[di];if(!d||!d.exs||!d.exs.length)return;
  if(!confirm("Shuffle this day's workout?\n\nYou'll get a fresh set of exercises for the same muscle groups, difficulty and training style. Your other days stay the same."))return;
  // Count slots per (category, type) so we pick replacements bucket-by-bucket
  const buckets={};
  d.exs.forEach(function(e,idx){
    const db=findExInDB(e.n);
    const cat=db?db.cat:"legs";
    const typ=db?db.t:"compound";
    const key=cat+"|"+typ;
    if(!buckets[key])buckets[key]={cat:cat,typ:typ,slots:[]};
    buckets[key].slots.push(idx);
  });
  // Pick distinct replacements for each bucket, avoiding ALL current names + anything already chosen
  const chosen=new Set();const chosenPats=new Set();
  const currentNames=new Set(d.exs.map(function(e){return e.n}));
  const replacements={};
  function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
  function pickFromPool(pool,k){
    // Prefer a fresh movement pattern; fall back only if we run out
    const shuffled=pool.slice().sort(function(){return Math.random()-0.5});
    for(const c of shuffled){const p=getPat(c.n);if(p&&chosenPats.has(p))continue;if(!chosen.has(c.n))return c}
    return shuffled[k]||shuffled[0];
  }
  Object.values(buckets).forEach(function(b){
    b.slots.forEach(function(slotIdx,k){
      let pool=(EX_DB[b.cat]||[]).filter(function(x){return x.t===b.typ&&!currentNames.has(x.n)&&!chosen.has(x.n)});
      if(!pool.length)pool=(EX_DB[b.cat]||[]).filter(function(x){return !currentNames.has(x.n)&&!chosen.has(x.n)});
      if(!pool.length)pool=(EX_DB[b.cat]||[]).filter(function(x){return !chosen.has(x.n)});
      if(!pool.length){replacements[slotIdx]={n:d.exs[slotIdx].n,nt:""};return}
      const pick=pickFromPool(pool,k)||pool[0];
      chosen.add(pick.n);const pp=getPat(pick.n);if(pp)chosenPats.add(pp);
      replacements[slotIdx]=pick;
    });
  });
  // Apply replacements; keep set/rep scheme from the original slot
  d.exs=d.exs.map(function(e,idx){
    const pick=replacements[idx];if(!pick)return e;
    return Object.assign({},e,{n:pick.n,note:pick.nt||e.note});
  });
  savPlan();rPlan();
  setTimeout(function(){document.getElementById("dc"+di)?.classList.add("open")},10);
  if(typeof ftoast==="function")ftoast("🔄 Day shuffled — "+d.exs.length+" new exercises");
}

// ═══════ DIET CONSISTENCY ═══════
function calcDietConsistency(){const target=S.nutri.cal;const tolerance=0.15;const flog=S.flog;const today=new Date();today.setHours(0,0,0,0);
// Last 7 days
const weekData=[];const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const k=localDS(d);const items=flog[k]||[];const cal=items.reduce((a,m)=>a+m.cal,0);const isToday=i===0;weekData.push({key:k,name:dayNames[d.getDay()],cal,logged:items.length>0,isToday,withinTarget:cal>0&&cal<=target*(1+tolerance),over:cal>target*(1+tolerance)})}
// Calculate streak (consecutive days within target calorie range)
var streak=0;
for(var si=0;si<365;si++){var sd=new Date();sd.setDate(sd.getDate()-si);var sk=localDS(sd);var sitems=flog[sk]||[];var scal=sitems.reduce(function(a,m){return a+(m.cal||0)},0);if(scal>0&&scal<=target*(1+tolerance))streak++;else if(si>0)break;}
// Last 30 days stats
let daysLogged=0,daysOnTarget=0,daysOver=0,totalCal=0;
for(let i=0;i<30;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=localDS(d);const items=flog[k]||[];if(items.length>0){const cal=items.reduce((a,m)=>a+m.cal,0);daysLogged++;totalCal+=cal;if(cal<=target*(1+tolerance))daysOnTarget++;else daysOver++}}
const avgCal=daysLogged?Math.round(totalCal/daysLogged):0;
const consistencyPct=daysLogged?Math.round(daysOnTarget/daysLogged*100):0;
return{weekData,streak,daysLogged,daysOnTarget,daysOver,avgCal,consistencyPct,target}}
function renderDietConsistency(){const dc=calcDietConsistency();
return`<div class="diet-consist"><div class="dc-title">📅 Diet Consistency Tracker</div>`+
`<div class="dc-streak"><div class="dc-streak-num">${dc.streak}</div><div class="dc-streak-lbl"><strong>${dc.streak===1?'Day':'Days'}</strong> on target<br><span style="font-size:9px">Consecutive days within calorie goal</span></div></div>`+
`<div style="font-size:10px;color:var(--sub);margin-bottom:6px;font-weight:600">This Week</div><div class="dc-week">${dc.weekData.map(d=>`<div class="dc-day ${d.logged&&d.withinTarget?'logged':d.over?'over':''} ${d.isToday?'today':''}"><div class="dc-d-name">${d.name}</div><div class="dc-d-cal">${d.cal||'—'}</div>${d.logged?`<div style="font-size:10px;margin-top:1px">${d.withinTarget?'✓':'⚠'}</div>`:''}</div>`).join("")}</div>`+
`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span style="color:var(--sub)">Consistency score</span><span style="font-weight:700;color:${dc.consistencyPct>=80?'var(--grn)':dc.consistencyPct>=50?'var(--amb)':'var(--red)'}">${dc.consistencyPct}%</span></div><div class="apb"><div class="fill ${dc.consistencyPct>=80?'grn':dc.consistencyPct>=50?'amb':'red'}" style="width:${dc.consistencyPct}%"></div></div></div>`+
`<div class="dc-stats"><div class="dc-stat"><div class="dc-stat-val" style="color:var(--grn)">${dc.daysOnTarget}</div><div class="dc-stat-lbl">On Target</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--red)">${dc.daysOver}</div><div class="dc-stat-lbl">Over</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--amb)">${dc.avgCal}</div><div class="dc-stat-lbl">Avg kcal</div></div><div class="dc-stat"><div class="dc-stat-val" style="color:var(--cyn)">${dc.daysLogged}</div><div class="dc-stat-lbl">Days (30d)</div></div></div>`+
`<div style="font-size:9px;color:var(--sub);margin-top:8px;text-align:center;line-height:1.4">${dc.consistencyPct>=80?'🔥 Excellent consistency! Keep it up!':dc.consistencyPct>=50?'💪 Good progress! Stay on track.':'📝 Log your meals daily to build consistency.'} Target: ${dc.target} kcal/day (±15%)</div></div>`}

function normIngr(s){return(s||"").toLowerCase().replace(/\b(fresh|frozen|cooked|raw|grilled|baked|roasted|fried|boiled|steamed|sliced|diced|chopped|whole|organic|free[\s-]*range|wild|canned|smoked|stir[\s-]*fry|lean)\b/g,"").replace(/\s+/g," ").trim()}
function lookupIngredient(raw){
  const n=normIngr(raw);
  if(!n)return null;
  if(INGREDIENT_DB[n])return Object.assign({matched:n},INGREDIENT_DB[n]);
  // Longest-key substring match
  const keys=Object.keys(INGREDIENT_DB).sort(function(a,b){return b.length-a.length});
  for(const k of keys){if(n.indexOf(k)>=0)return Object.assign({matched:k},INGREDIENT_DB[k])}
  for(const k of keys){if(k.indexOf(n)>=0)return Object.assign({matched:k},INGREDIENT_DB[k])}
  // Word-level
  const words=n.split(/\s+/).filter(function(w){return w.length>2});
  for(const w of words){
    if(INGREDIENT_DB[w])return Object.assign({matched:w},INGREDIENT_DB[w]);
    for(const k of keys){if(k.indexOf(w)>=0||w.indexOf(k)>=0)return Object.assign({matched:k},INGREDIENT_DB[k])}
  }
  return null;
}
function _itemGrams(x){
  const i=x.info;
  if(i.unit==="egg")return 50*x.qty;
  if(i.unitWeight)return i.unitWeight*x.qty;
  return x.qty; // grams or ml (≈ g for milk-like)
}
function _totals(items){
  let cal=0,p=0,c=0,f=0;
  items.forEach(function(x){const g=_itemGrams(x);const fac=g/100;cal+=x.info.kcal*fac;p+=x.info.p*fac;c+=x.info.cb*fac;f+=x.info.f*fac});
  return {cal:Math.round(cal),p:Math.round(p),c:Math.round(c),f:Math.round(f)};
}
function _basePortion(cat,goal){
  if(cat==="prot_lean")return goal==="muscle_gain"?180:goal==="fat_loss"?200:150;
  if(cat==="prot_fat")return 150;
  if(cat==="prot_unit")return goal==="muscle_gain"?4:3;  // eggs
  if(cat==="prot_powder")return 1; // scoops
  if(cat==="carb_starch")return goal==="muscle_gain"?200:goal==="fat_loss"?120:160;
  if(cat==="carb_unit")return 2;
  if(cat==="fat"){return 30} // g; for tbsp items unitWeight handles conversion below
  if(cat==="veg")return 120;
  if(cat==="fruit")return 100;
  if(cat==="dairy")return 150;
  if(cat==="dairy_liquid")return 200;
  if(cat==="sweet")return 1;
  return 100;
}
function buildMealFromIngredients(mealName,rawIngredients,mealType){
  const prof=S.user?.profile||{};
  const goal=prof.goal||"general";
  const mealsPerDay=(typeof mealPlanMealsPerDay!=="undefined"?mealPlanMealsPerDay:null)||4;
  const dailyCal=S.nutri?.cal||2500;
  // Meal type share of daily calories
  const share={Breakfast:0.25,Lunch:0.30,Dinner:0.30,"Pre-Workout":0.12,"Evening Snack":0.10,Snack:0.10,"Mass Gainer Shake":0.25};
  const targetCal=Math.round(dailyCal*(share[mealType]||(1/mealsPerDay)));
  // Parse ingredients
  const parts=rawIngredients.split(/[\n,;]+/).map(function(s){return s.trim()}).filter(Boolean);
  const items=[];const unrec=[];
  parts.forEach(function(raw){
    const info=lookupIngredient(raw);
    if(!info){unrec.push(raw);return}
    // Handle unit-based vs gram-based
    let qty=_basePortion(info.c,goal);
    // For units, qty is count; for fat tbsp, convert to tbsp count (~2)
    if(info.unit==="tbsp")qty=info.c==="sweet"?1:2;
    items.push({raw:raw,info:info,qty:qty});
  });
  if(!items.length)return {error:"No recognisable ingredients. Try: chicken, rice, avocado, eggs, oats..."};
  // Ensure adequate protein: if no protein item, suggest adding
  const hasProtein=items.some(function(x){return /^prot_/.test(x.info.c)});
  // Compute totals and scale to target
  let totals=_totals(items);
  const diff=totals.cal-targetCal;
  if(Math.abs(diff)>targetCal*0.15){
    // Scale starch/fat items to close the gap. Preserve protein and veg minimums.
    const adj=items.filter(function(x){return x.info.c==="carb_starch"||x.info.c==="carb_unit"||x.info.c==="fat"});
    if(adj.length){
      // current calories from adjustable items
      let adjCal=0;adj.forEach(function(x){const g=_itemGrams(x);adjCal+=x.info.kcal*(g/100)});
      const newAdjCal=Math.max(adjCal-diff,adjCal*0.5);
      const sf=adjCal>0?newAdjCal/adjCal:1;
      adj.forEach(function(x){
        if(x.info.unit){x.qty=Math.max(1,Math.round(x.qty*sf))}
        else{x.qty=Math.max(30,Math.round(x.qty*sf/5)*5)} // round to 5g, min 30g
      });
      totals=_totals(items);
    }
  }
  // Format lines
  function capitalise(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s}
  function fmt(x){
    const i=x.info;const name=capitalise((x.raw||i.matched||"").trim());
    if(i.unit==="egg")return x.qty+" "+(x.qty===1?"Egg":"Eggs");
    if(i.unit==="scoop")return x.qty+" scoop"+(x.qty!==1?"s":"")+" "+name;
    if(i.unit==="slice")return x.qty+" slice"+(x.qty!==1?"s":"")+" "+name;
    if(i.unit==="wrap")return x.qty+" "+name+(x.qty!==1?"s":"");
    if(i.unit==="biscuit")return x.qty+" "+name;
    if(i.unit==="pancake")return x.qty+" Pancake"+(x.qty!==1?"s":"");
    if(i.unit==="piece")return x.qty+" "+name+(x.qty!==1?"s":"");
    if(i.unit==="tbsp")return x.qty+" tbsp "+name;
    if(i.c==="dairy_liquid")return x.qty+"ml "+name;
    return x.qty+"g "+name;
  }
  const lines=items.map(fmt);
  const desc=capitalise(mealName)+" — "+lines.join(", ");
  return {
    ok:true,mealName:capitalise(mealName),mealType:mealType||"Snack",
    description:desc,lines:lines,items:items,
    unrecognised:unrec,targetCal:targetCal,totals:totals,
    needsProtein:!hasProtein
  };
}

function getTrainingDays(){
const sched=S.plan.map(d=>d.sched);
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
return days.map(d=>sched.includes(d));
}
function pickRandom(arr,n){const s=[...arr];const r=[];for(let i=0;i<n&&s.length;i++){const idx=Math.floor(Math.random()*s.length);r.push(s.splice(idx,1)[0])}return r}
function scaleMeal(meal,factor){return{ml:meal.ml,cal:Math.round(meal.cal*factor),p:Math.round(meal.p*factor),c:Math.round(meal.c*factor),f:Math.round(meal.f*factor),origMl:meal.ml,factor}}
function generateDayMealPlan(isTraining,goal,calTarget,protTarget,mealsPerDay){
const bfOpts=MEALS.find(m=>m.nm==='Breakfast')?.opts||[];
const luOpts=MEALS.find(m=>m.nm==='Lunch')?.opts||[];
const diOpts=MEALS.find(m=>m.nm==='Dinner')?.opts||[];
const snOpts=(MEALS.find(m=>m.nm==='Evening Snack')?.opts||[]).concat(MEALS.find(m=>m.nm==='Pre-Workout')?.opts||[]);
// Adjust calorie target: training days get full, rest days get slight deficit
const dayCalTarget=isTraining?calTarget:Math.round(calTarget*0.88);
const dayProtTarget=isTraining?protTarget:Math.round(protTarget*0.95);
// Carb factor: training days get more carbs
const carbFactor=isTraining?1.0:0.8;
const plan=[];
// Decide meal structure based on mealsPerDay
const bf=pickRandom(bfOpts,1)[0];
const lu=pickRandom(luOpts,1)[0];
const di=pickRandom(diOpts,1)[0];
plan.push({type:'Breakfast',meal:bf});
plan.push({type:'Lunch',meal:lu});
plan.push({type:'Dinner',meal:di});
if(mealsPerDay>=4){const sn=pickRandom(snOpts,1)[0];plan.push({type:'Snack',meal:sn})}
if(mealsPerDay>=5){const sn2=pickRandom(snOpts.filter(s=>s!==plan[3]?.meal),1)[0]||snOpts[0];plan.push({type:'Snack 2',meal:sn2})}
if(mealsPerDay>=6){const pw=pickRandom(MEALS.find(m=>m.nm==='Pre-Workout')?.opts||snOpts,1)[0];plan.push({type:'Pre-Workout',meal:pw})}
// Scale portions to hit calorie target
const rawTotal=plan.reduce((a,p)=>a+p.meal.cal,0);
const globalScale=dayCalTarget/rawTotal;
// Apply per-meal scaling with carb adjustment
return plan.map(p=>{
let f=globalScale;
// On rest days, slightly lower carb-heavy items
if(!isTraining){const n=p.meal.ml.toLowerCase();const isCarby=n.includes('rice')||n.includes('oats')||n.includes('potato')||n.includes('pasta')||n.includes('plantain')||n.includes('bread')||n.includes('toast');if(isCarby)f*=carbFactor}
const scaled=scaleMeal(p.meal,f);
return{type:p.type,...scaled}
});
}

}));

function _scaleToMatch(meal,targetCal){if(!meal||!meal.cal||!targetCal)return{ml:meal.ml,cal:meal.cal,p:meal.p,c:meal.c,f:meal.f};const f=targetCal/meal.cal;return{ml:meal.ml,cal:Math.round(meal.cal*f),p:Math.round(meal.p*f),c:Math.round(meal.c*f),f:Math.round(meal.f*f)}}
function doSwapMeal(dayIdx,mealIdx,mealCat,optIdx){
  if(!cachedMealPlan||!cachedMealPlan[dayIdx])return;
  const existing=cachedMealPlan[dayIdx].meals[mealIdx];const targetCal=existing?existing.cal:null;
  let src;
  if(mealCat==="_custom"){const cm=S.customMeals[optIdx];if(!cm)return;src={ml:cm.name,cal:cm.cal,p:cm.p,c:cm.c,f:cm.f}}
  else{const pool=MEALS.find(m=>m.nm===mealCat);if(!pool||!pool.opts[optIdx])return;src=pool.opts[optIdx]}
  const scaled=targetCal?_scaleToMatch(src,targetCal):{ml:src.ml,cal:src.cal,p:src.p,c:src.c,f:src.f};
  cachedMealPlan[dayIdx].meals[mealIdx]=Object.assign({},existing||{},scaled,{type:existing?existing.type:mealCat});
  savMealPlan();mpSwap=null;rFood();
}
function doAddMeal(dayIdx,mealCat,optIdx){
  if(!cachedMealPlan||!cachedMealPlan[dayIdx])return;

  if(mealCat==="_custom"){const cm=S.customMeals[optIdx];if(!cm)return;src={ml:cm.name,cal:cm.cal,p:cm.p,c:cm.c,f:cm.f};typ=cm.mealType||"Snack"}
  else{const pool=MEALS.find(m=>m.nm===mealCat);if(!pool||!pool.opts[optIdx])return;src=pool.opts[optIdx];typ=mealCat}
  cachedMealPlan[dayIdx].meals.push(Object.assign({type:typ},src));
  savMealPlan();mpAdd=null;rFood();
}

    const pool=MEALS.find(m=>m.nm===cat);if(!pool)return;

    h+=`<div style="font-size:11px;font-weight:700;color:${isCurrent?'var(--amb)':'var(--sub)'};margin:10px 0 4px">${cat}${isCurrent?' (current)':''}</div>`;
    pool.opts.forEach(function(o,i){
      h+=`<div class="mp-pick-opt" onclick="event.stopPropagation();${handler}'${cat}',${i})"><div class="mp-pick-opt-name">${esc(o.ml)}</div><div class="mp-pick-opt-macros">${o.cal} kcal · ${o.p}P · ${o.c}C · ${o.f}F</div></div>`;
    });
  });
  if(S.customMeals&&S.customMeals.length){
    h+=`<div style="font-size:11px;font-weight:700;color:var(--sub);margin:10px 0 4px">⭐ My Saved Meals</div>`;
    S.customMeals.forEach(function(cm,i){
      h+=`<div class="mp-pick-opt" onclick="event.stopPropagation();${handler}'_custom',${i})"><div class="mp-pick-opt-name">${esc(cm.name)}</div><div class="mp-pick-opt-macros">${cm.cal} kcal · ${cm.p}P · ${cm.c}C · ${cm.f}F</div></div>`;
    });
  }
  h+=`<button class="s-btn out" style="margin-top:10px" onclick="event.stopPropagation();closeMealPicker()">Cancel</button></div>`;
  return h;
}

function getMealEmoji(name){const n=name.toLowerCase();for(const[k,v]of Object.entries(MEAL_EMOJI_MAP)){if(n.includes(k))return v}return MEAL_EMOJI_MAP.default}
function getMealGrad(mealType){const grads={Breakfast:'linear-gradient(135deg,#1a1508 0%,#2d250d 50%,#3d3012 100%)',Lunch:'linear-gradient(135deg,#081a0d 0%,#0d2d15 50%,#123d1a 100%)',Dinner:'linear-gradient(135deg,#0d0815 0%,#150d25 50%,#1d1235 100%)','Pre-Workout':'linear-gradient(135deg,#1a0d08 0%,#2d150d 50%,#3d1a12 100%)','Evening Snack':'linear-gradient(135deg,#08101a 0%,#0d1a2d 50%,#12223d 100%)','Mass Gainer Shake':'linear-gradient(135deg,#0a1a0a 0%,#152d15 50%,#1a3d1a 100%)'};return grads[mealType]||'linear-gradient(135deg,#111 0%,#1a1a1a 50%,#222 100%)'}
function parseIngredients(mealStr){return mealStr.split(/,\s*(?![^()]*\))/).map(s=>s.trim()).filter(Boolean).map(s=>{const qtyMatch=s.match(/^([\d½¼¾⅓⅔]+(?:\.\d+)?\s*(?:g|kg|ml|l|tbsp|tsp|cups?|pieces?|slices?|scoops?|cob|pack|packs)?)\s+(.+)/i);if(qtyMatch)return{qty:qtyMatch[1],name:qtyMatch[2]};const parenMatch=s.match(/(.+?)\s*\((\d+\s*(?:g|kg|ml|l|tbsp|tsp))\)/);if(parenMatch)return{qty:parenMatch[2],name:parenMatch[1]};return{qty:'',name:s}})}

function addSwipeDismiss(panel,closeFn){if(!panel)return;let startY=0,dist=0;panel.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dist=0},{passive:true});panel.addEventListener('touchmove',e=>{dist=e.touches[0].clientY-startY;if(dist>0&&panel.scrollTop<=0){panel.style.transform=`translateY(${Math.min(dist*.5,120)}px)`;panel.style.opacity=`${Math.max(0.4,1-dist/400)}`}},{passive:true});panel.addEventListener('touchend',()=>{if(dist>100&&panel.scrollTop<=0){closeFn()}else{panel.style.transform='';panel.style.opacity=''}},{passive:true})}

function generateGroceryList(){

if(!cachedMealPlan)return[];
const agg={};
// Split meal descriptions into individual ingredients
function splitIngredients(str){
// Remove leading title before — or : e.g. "Creamy Egg Pasta (200g cooked) — 3 Eggs..."
str=str.replace(/^[^—–]*[—–]\s*/,'');
// Split on ", ", " with ", " & " but not inside parentheses
let parts=str.split(/,\s*(?![^()]*\))/);
let result=[];
parts.forEach(p=>{
// Further split on " with " and " & "
let subs=p.split(/\s+with\s+|\s+&\s+/i);
subs.forEach(s=>result.push(s.trim()));
});
return result.filter(Boolean);
}
function parseQtyName(s){
s=s.trim();
// "3 Eggs" or "Milk (250ml)" or "½ Avocado" or "200g Chicken"
// Try: number + unit + name: "200g Chicken Breast"
let m=s.match(/^([\d½¼¾⅓⅔]+(?:\.\d+)?)\s*(g|kg|ml|l|tbsp|tsp|cups?|pieces?|slices?|scoops?|cob|packs?)\s+(.+)/i);
if(m)return{qty:m[1]+m[2],name:m[3]};
// Try: number + name: "3 Eggs", "½ Avocado", "1 Banana"
m=s.match(/^([\d½¼¾⅓⅔]+(?:\.\d+)?)\s+(.+)/);
if(m)return{qty:m[1],name:m[2]};
// Try: name (qty): "Milk (250ml)", "Chicken Breast (200g)"
m=s.match(/^(.+?)\s*\(([\d.]+\s*(?:g|kg|ml|l|tbsp|tsp))\)\s*(.*)$/i);
if(m){let name=m[1]+(m[3]?' '+m[3]:'');return{qty:m[2],name:name.trim()};}
// Whole item like "Garlic Butter" or "Side Salad"
return{qty:'1',name:s};
}
// Normalise common ingredient names
function normName(n){
n=n.replace(/^(fried|boiled|grilled|baked|steamed|roasted|scrambled|poached|sliced|diced|cooked|raw|fresh|frozen|mixed|stir-fry|stir\s*fry)\s+/i,'');
n=n.replace(/\s+(stir-fry|stir\s*fry)$/i,'');
n=n.replace(/\s*\(.*?\)\s*/g,' ').trim();
// Singularise simple plurals
const low=n.toLowerCase();
const sing={'eggs':'Egg','sausages':'Sausage','tomatoes':'Tomato','carrots':'Carrot','apples':'Apple','wraps':'Wrap','slices':'Slice','doughnuts':'Doughnut','tangerines':'Tangerine'};
if(low.includes('bacon'))return'Bacon';
if(low.includes('lamb chop'))return'Lamb Chops';
for(const[pl,si]of Object.entries(sing)){if(low===pl||low.endsWith(' '+pl))return n.replace(new RegExp(pl+'$','i'),si)}
return n;
}
function fracToNum(s){
const frac={'½':0.5,'¼':0.25,'¾':0.75,'⅓':0.33,'⅔':0.67};
return frac[s]!==undefined?frac[s]:parseFloat(s);
}
cachedMealPlan.forEach(d=>{d.meals.forEach(m=>{
const parts=splitIngredients(m.ml);
parts.forEach(raw=>{

if(!name||name.length<2)return;

if(/^(on|the|a|an|of|for|in)$/i.test(name))return;
