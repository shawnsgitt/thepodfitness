<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>ShawnsPod Fitness</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A1628;--c1:rgba(255,255,255,0.05);--c1-solid:#0F1D32;--glass:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.12);--glass-blur:20px;--bdr:rgba(255,255,255,0.1);--tx:#EDF2F7;--sub:rgba(255,255,255,0.55);--amb:#38BDF8;--amb2:#67D4FF;--grn:#22C55E;--red:#EF4444;--blu:#3B82F6;--pur:#A855F7;--cyn:#06B6D4;--pnk:#EC4899;--rad:18px;--rads:12px}
html{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden;font-feature-settings:'cv02','cv03','cv04','cv11';letter-spacing:-0.01em}
body{max-width:540px;margin:0 auto;min-height:100dvh;background:radial-gradient(ellipse at 20% 0%,rgba(56,189,248,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(6,182,212,0.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(15,29,50,0.5) 0%,transparent 70%),var(--bg)}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
button{font-family:'Inter',sans-serif;cursor:pointer}.hide{display:none!important}

/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#0A1628 0%,#0F2847 50%,#0A1628 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}#splash .ic{font-size:56px;animation:pulse 1.2s infinite}
#splash .nm{font-family:'Archivo Black';font-size:20px;letter-spacing:.08em;margin-top:16px}#splash .nm span{color:var(--amb)}

/* ONBOARDING - reuse from v3 */
.ob-wrap{min-height:100dvh;padding:24px;display:flex;flex-direction:column}
.ob-logo{text-align:center;margin-bottom:20px}.ob-logo .ic{font-size:44px}
.ob-logo h1{font-family:'Archivo Black';font-size:20px;letter-spacing:.04em;margin-top:6px}.ob-logo h1 span{color:var(--amb)}
.ob-logo p{font-size:11px;color:var(--sub);margin-top:4px}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.ob-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.1);transition:all .3s}.ob-dot.on{background:var(--amb);width:24px}
.ob-q{font-size:14px;font-weight:700;margin-bottom:8px}.ob-hint{font-size:11px;color:var(--sub);margin-bottom:12px}
.ob-grid{display:grid;gap:8px}.ob-grid.g2{grid-template-columns:1fr 1fr}.ob-grid.g3{grid-template-columns:1fr 1fr 1fr}
.ob-opt{padding:12px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid var(--glass-border);border-radius:12px;text-align:center;transition:all .2s;color:var(--tx);font-size:12px}
.ob-opt:active{transform:scale(.97)}.ob-opt.on{border-color:var(--amb);background:rgba(56,189,248,.1)}
.ob-opt .emoji{font-size:22px;display:block;margin-bottom:4px}.ob-opt .label{display:block;font-weight:600}.ob-opt .desc{font-size:9px;color:var(--sub);margin-top:2px;display:block}
.ob-inp-row{display:flex;gap:8px;margin-bottom:12px}.ob-inp-grp{flex:1}.ob-inp-grp label{font-size:10px;color:var(--sub);display:block;margin-bottom:4px}
.ob-inp{width:100%;padding:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--tx);font-size:16px;outline:none;font-family:'Inter';text-align:center}.ob-inp:focus{border-color:var(--amb)}
.ob-name{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--tx);font-size:16px;outline:none;font-family:'Inter';margin-bottom:16px}
.ob-nav{display:flex;gap:10px;margin-top:16px}.ob-nav button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;border:none;transition:all .15s}
.ob-nav button:active{transform:scale(.98)}.ob-back{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--tx)}.ob-next{background:var(--amb);color:#000}.ob-next:disabled{background:rgba(255,255,255,.06);color:var(--sub);cursor:not-allowed}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.av-btn{font-size:22px;background:rgba(255,255,255,.04);border:2px solid var(--bdr);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:all .2s}.av-btn.on{border-color:var(--amb);background:rgba(56,189,248,.12);transform:scale(1.05)}
.usr-card{width:100%;display:flex;align-items:center;gap:12px;padding:14px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;margin-bottom:8px;color:var(--tx);text-align:left;font-family:'Inter';transition:transform .15s}
.usr-card:active{transform:scale(.98)}
.link-btn{background:none;border:none;color:var(--amb);font-size:13px;font-weight:600}

/* APP SHELL */
#app{padding-bottom:80px}
.header{padding:env(safe-area-inset-top,16px) 18px 12px;background:linear-gradient(180deg,rgba(10,22,40,0.95),rgba(10,22,40,0.7));backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(56,189,248,0.1)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.brand{font-family:'Archivo Black';font-size:17px;letter-spacing:.04em}.brand span{color:var(--amb)}
.usr-row{display:flex;align-items:center;gap:5px;margin-top:4px;cursor:pointer}.usr-av{font-size:15px}.usr-nm{font-size:11px;font-weight:600}.sw-h{font-size:8px;color:rgba(255,255,255,.3)}
.wk-ctrl{display:flex;align-items:center;gap:5px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;padding:4px 10px;border:1px solid var(--glass-border)}
.wk-ctrl button{background:none;border:none;color:var(--tx);font-size:13px;padding:2px 3px}
.wk-lbl{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--amb);letter-spacing:.1em}
.stats-bar{display:flex;gap:14px;flex-wrap:wrap}
.st-v{font-family:'JetBrains Mono';font-size:15px;font-weight:700}.st-l{font-size:8px;color:var(--sub);margin-left:2px}

/* NAV */
.nav{display:flex;background:rgba(10,22,40,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(56,189,248,0.08);border-bottom:1px solid rgba(56,189,248,0.08);position:sticky;top:0;z-index:50}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);font-size:15px;transition:all .25s}
.nav button.on{color:var(--amb);border-bottom-color:var(--amb)}.nav .nl{font-size:7px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}

/* SHARED */
.tab-c{padding:16px 18px;display:none}.tab-c.active{display:block}
.intro{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:14px}
.card{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);margin-bottom:12px;border:1px solid rgba(56,189,248,0.1);padding:16px;animation:fadeUp .3s ease both;box-shadow:0 4px 30px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.05)}
.card:nth-child(2){animation-delay:.03s}.card:nth-child(3){animation-delay:.06s}.card:nth-child(4){animation-delay:.09s}

/* MOTIVATIONAL */
.motiv{background:linear-gradient(135deg,rgba(56,189,248,0.1),rgba(6,182,212,0.05));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(56,189,248,0.2);border-radius:var(--rad);padding:22px;margin-bottom:16px;text-align:center;animation:fadeUp .4s ease;box-shadow:0 4px 30px rgba(0,0,0,0.15),inset 0 1px 0 rgba(56,189,248,0.1)}
.motiv .mq{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;font-style:italic;line-height:1.6;margin-bottom:10px;color:#fff}.motiv .ma{font-size:11px;color:var(--amb);font-weight:600;letter-spacing:0.03em}
.motiv .mi{font-size:10px;color:var(--sub);margin-top:8px;line-height:1.5}

/* RECOMMENDATION */
.rec-card{background:linear-gradient(135deg,rgba(34,197,94,.04),rgba(34,197,94,.01));backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid rgba(34,197,94,.15);border-radius:var(--rad);padding:14px;margin-bottom:12px}
.rec-card .rt{font-size:12px;font-weight:700;color:var(--grn);margin-bottom:6px}.rec-card .rb{font-size:11px;color:var(--sub);line-height:1.5;margin-bottom:3px}

/* ANIMATED PROGRESS BAR */
.apb{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.apb .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.apb .fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.apb .fill.amb{background:linear-gradient(90deg,var(--amb),var(--amb2))}
.apb .fill.grn{background:linear-gradient(90deg,var(--grn),#4ADE80)}
.apb .fill.red{background:linear-gradient(90deg,var(--red),#F87171)}
.apb .fill.blu{background:linear-gradient(90deg,var(--blu),#60A5FA)}
.apb .fill.pur{background:linear-gradient(90deg,var(--pur),#C084FC)}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--amb)}
.toggle .knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on .knob{transform:translateX(20px)}
.toggle-label{font-size:12px;color:var(--sub)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:11px 11px 11px 36px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-size:13px;outline:none;font-family:'Inter';transition:border-color .2s}
.search-inp:focus{border-color:var(--amb)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}

/* FILTER PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--sub);transition:all .2s;flex-shrink:0}
.pill:active{transform:scale(.95)}
.pill.on{border-color:var(--amb);background:rgba(56,189,248,.12);color:var(--amb)}

/* EXERCISE CARD (library) */
.ex-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--glass-border);display:flex;gap:10px;align-items:flex-start;transition:all .2s;animation:fadeUp .25s ease both}
.ex-card:active{transform:scale(.99);border-color:rgba(255,255,255,.12)}
.ex-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ex-badge.chest{background:rgba(239,68,68,.12)}.ex-badge.back{background:rgba(59,130,246,.12)}
.ex-badge.shoulders{background:rgba(168,85,247,.12)}.ex-badge.arms{background:rgba(56,189,248,.12)}
.ex-badge.legs{background:rgba(34,197,94,.12)}.ex-badge.core{background:rgba(6,182,212,.12)}.ex-badge.glutes{background:rgba(244,114,182,.12)}
.ex-badge.cardio{background:rgba(236,72,153,.12)}.ex-badge.hiit{background:rgba(249,115,22,.12)}
.ex-badge.stretch{background:rgba(34,197,94,.12)}.ex-badge.plyo{background:rgba(139,92,246,.12)}
.ex-card .ex-info{flex:1}.ex-card .ex-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.ex-card .ex-meta{font-size:10px;color:var(--sub);margin-bottom:2px}.ex-card .ex-type{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.ex-card .ex-type.compound{background:rgba(56,189,248,.12);color:var(--amb)}.ex-card .ex-type.isolation{background:rgba(59,130,246,.12);color:var(--blu)}
.ex-card .ex-type.cardio{background:rgba(236,72,153,.12);color:var(--pnk)}.ex-card .ex-type.hiit{background:rgba(249,115,22,.12);color:#F97316}
.ex-card .ex-type.stretch{background:rgba(34,197,94,.12);color:var(--grn)}.ex-card .ex-type.plyo{background:rgba(139,92,246,.12);color:#8B5CF6}
.ex-add-btn{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:700;border:none;background:var(--amb);color:#000;flex-shrink:0;align-self:center;transition:transform .15s}
.ex-add-btn:active{transform:scale(.92)}

/* BODY COMP */
.bc-card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:16px;margin-bottom:12px;border:1px solid var(--glass-border)}
.bc-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}
.bc-row:last-child{border-bottom:none}
.bc-label{font-size:11px;color:var(--sub)}.bc-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono'}
.bc-bar-wrap{margin-top:6px}
.bc-bar-label{display:flex;justify-content:space-between;font-size:9px;color:var(--sub);margin-bottom:3px}
.bc-indicator{position:relative;height:10px;background:linear-gradient(90deg,var(--red),var(--amb),var(--grn),var(--amb),var(--red));border-radius:5px;margin-bottom:2px}
.bc-marker{position:absolute;top:-2px;width:4px;height:14px;background:#fff;border-radius:2px;box-shadow:0 0 4px rgba(0,0,0,.5);transition:left .6s cubic-bezier(.4,0,.2,1)}
.bc-status{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px}
.bc-status.good{background:rgba(34,197,94,.12);color:var(--grn)}
.bc-status.warn{background:rgba(56,189,248,.12);color:var(--amb)}
.bc-status.bad{background:rgba(239,68,68,.12);color:var(--red)}

/* DAY CARDS */
.day-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:-14px;padding:14px}
.day-t{font-weight:700;font-size:14px;margin-bottom:2px}.day-m{font-size:10px;color:var(--sub)}
.done-b{background:var(--grn);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.chv{color:var(--sub);font-size:12px;transition:transform .25s}
.day-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}.card.open .day-body{display:block}.card.open .chv{transform:rotate(90deg)}
.ib{font-size:11px;color:var(--sub);padding:6px 0;line-height:1.5}.ib strong{color:var(--tx)}
.ex-r{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}.ex-r:last-of-type{border-bottom:none}
.ex-n{width:24px;height:24px;background:var(--amb);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;font-family:'JetBrains Mono'}
.ex-nm{font-size:13px;font-weight:600;margin-bottom:1px}.ex-d{font-size:11px;color:var(--amb);font-family:'JetBrains Mono';margin-bottom:2px}.ex-nt{font-size:10px;color:var(--sub);line-height:1.4}
.s-btn{width:100%;padding:12px;border-radius:var(--rads);font-size:13px;font-weight:700;margin-top:8px;border:none;transition:all .15s}.s-btn:active{transform:scale(.98)}
.s-btn.pri{background:var(--amb);color:#000}.s-btn.out{background:transparent;color:var(--amb);border:1px solid var(--amb)}.s-btn.grn{background:var(--grn);color:#000}.s-btn.red{background:transparent;color:var(--red);border:1px solid var(--red)}.s-btn.blu{background:var(--blu);color:#fff}

/* FOOD */
.mac-bar{display:flex;justify-content:space-around;margin-bottom:6px;padding:6px 0}.mac-i{text-align:center}.mac-l{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.meal-o{padding:10px;border-radius:var(--rads);margin-bottom:5px;border:1px solid var(--bdr);transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.meal-o.logged{border-color:var(--grn);background:rgba(34,197,94,.05)}
.meal-tx{font-size:12px;line-height:1.3;flex:1}.meal-mc{font-size:10px;color:var(--amb);font-weight:600;font-family:'JetBrains Mono';white-space:nowrap}
.log-btn{padding:5px 8px;border-radius:6px;font-size:9px;font-weight:700;border:none;white-space:nowrap;flex-shrink:0;transition:transform .15s}.log-btn:active{transform:scale(.9)}
.log-btn.add{background:var(--grn);color:#000}.log-btn.rem{background:rgba(239,68,68,.15);color:var(--red)}
.daily-log{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:var(--rad);padding:14px;margin-bottom:10px;border:1px solid rgba(34,197,94,.2)}
.dl-title{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--grn)}
.dl-item{font-size:10px;color:var(--sub);padding:3px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}.dl-item:last-child{border-bottom:none}
.dl-total{display:flex;justify-content:space-around;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
.dl-tv{font-family:'JetBrains Mono';font-size:14px;font-weight:700}.dl-tl{font-size:8px;color:var(--sub)}

/* TRACKER */
.pb-out{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:5px}.pb-in{height:100%;background:linear-gradient(90deg,var(--amb),var(--amb2));border-radius:4px;transition:width .4s}
.pb-tx{font-size:11px;color:var(--sub);font-family:'JetBrains Mono'}
.s-hdr{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:5px;font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:5px}
.s-row{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:4px;transition:opacity .2s}.s-row.dn{opacity:.4}
.s-sn{text-align:center;font-size:12px;font-weight:600;color:var(--sub);font-family:'JetBrains Mono'}
.s-inp{background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:6px;padding:8px 3px;color:var(--tx);font-size:13px;text-align:center;outline:none;width:100%;font-family:'JetBrains Mono';transition:border-color .2s}.s-inp:focus{border-color:var(--amb)}
.chk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;border:2px solid var(--bdr);background:none;color:var(--sub)}.chk.dn{background:var(--grn);border-color:var(--grn);color:#000;font-weight:700;animation:popIn .25s ease}

function genPlan(p){const{goal,areas,days,level}=p;const inclCardio=p.cardio!==false;const g=GM[goal];const lv=level||"intermediate";const splits=mkSplit(areas,days);const dn=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];const sd={1:[0],2:[0,3],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,4,5],6:[0,1,2,3,4,5]}[days]||[0];
const sAdj=lv==="beginner"?{sm:3,sa:2,rm:"10-12",ri:"12-15",rstm:"2-3 min",rsti:"90s"}:lv==="veteran"?{sm:5,sa:4,rm:g.rm,ri:g.ri,rstm:"90s",rsti:"45s"}:{sm:4,sa:3,rm:g.rm,ri:g.ri,rstm:g.rstm,rsti:g.rsti};
const maxEx=lv==="beginner"?5:lv==="veteran"?8:7;
return splits.map((sp,i)=>{const exs=[];sp.groups.forEach(grp=>{let pool=EX_DB[grp]||[];
if(lv==="beginner")pool=pool.filter(e=>e.diff==="beg");else if(lv==="intermediate")pool=pool.filter(e=>e.diff==="beg"||e.diff==="inter");
const cp=pool.filter(e=>e.t==="compound");const ip=pool.filter(e=>e.t!=="compound"&&e.t!=="cardio"&&e.t!=="hiit"&&e.t!=="stretch"&&e.t!=="plyo");
if(sp.groups.length<=2){cp.slice(0,2).forEach(e=>exs.push({...e,s:sp.primary===grp?sAdj.sm:sAdj.sa,r:sAdj.rm,rest:sAdj.rstm}));ip.slice(0,2).forEach(e=>exs.push({...e,s:sAdj.sa,r:sAdj.ri,rest:sAdj.rsti}))}
else{cp.slice(0,1).forEach(e=>exs.push({...e,s:sp.primary===grp?sAdj.sm:sAdj.sa,r:sAdj.rm,rest:sAdj.rstm}));ip.slice(0,1).forEach(e=>exs.push({...e,s:sAdj.sa,r:sAdj.ri,rest:sAdj.rsti}))}});
const fe=exs.slice(0,maxEx);
// Add cardio to each day if enabled
if(inclCardio){const cardioPool=EX_DB.cardio||[];const filteredCardio=lv==="beginner"?cardioPool.filter(e=>e.diff==="beg"):lv==="intermediate"?cardioPool.filter(e=>e.diff==="beg"||e.diff==="inter"):cardioPool;
const numCardio=goal==="fat_loss"?2:1;const cardioExs=filteredCardio.slice(i%filteredCardio.length).concat(filteredCardio).slice(0,numCardio);
cardioExs.forEach(e=>fe.push({n:e.n,s:1,r:goal==="fat_loss"?"25-30 min":"15-20 min",rest:"—",note:e.nt}));}
return{day:`Day ${i+1} — ${sp.name}`,sub:sp.groups.map(g=>CAT_META[g]?.l||AM[g]?.l||g).join(" · ")+(inclCardio?" · Cardio":""),sched:dn[sd[i]]||`Day ${i+1}`,dur:`~${Math.round(fe.reduce((a,e)=>a+e.s*1.5+(parseFloat(e.rest)||1.5)*e.s/60,10)+(inclCardio?20:5))} min`,
warm:"5 min cardio · dynamic stretches",exs:fe.map(e=>({n:e.n,s:e.s,r:e.r,rest:e.rest,note:e.nt})),cool:"Full stretch · 5 min",prog:goal==="fat_loss"?"Maintain weights. Reduce rest.":"Hit top rep range → add 2.5 kg.",custom:false}});}
function mkSplit(a,d){
const areas=a.length?a:["chest","back","legs","shoulders"];
if(d===1)return[{name:"Full Body",groups:areas,primary:areas[0]}];
const tpl={
2:[{name:"Upper",groups:["chest","back","shoulders","arms"],primary:"chest"},{name:"Lower",groups:["legs","glutes","core"],primary:"legs"}],
3:[{name:"Push",groups:["chest","shoulders","arms"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs & Glutes",groups:["legs","glutes","core"],primary:"legs"}],
4:[{name:"Push",groups:["chest","shoulders","arms"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs & Glutes",groups:["legs","glutes","core"],primary:"legs"},{name:"Upper",groups:["chest","back","shoulders","arms"],primary:"chest"}],
5:[{name:"Push",groups:["chest","shoulders"],primary:"chest"},{name:"Pull",groups:["back","arms"],primary:"back"},{name:"Legs & Glutes",groups:["legs","glutes","core"],primary:"legs"},{name:"Upper Hyper",groups:["chest","back","shoulders"],primary:"shoulders"},{name:"Arms & Core",groups:["arms","core"],primary:"arms"}],
6:[{name:"Push A",groups:["chest","shoulders"],primary:"chest"},{name:"Pull A",groups:["back","arms"],primary:"back"},{name:"Legs A",groups:["legs","glutes","core"],primary:"legs"},{name:"Push B",groups:["chest","shoulders","arms"],primary:"shoulders"},{name:"Pull B",groups:["back","arms"],primary:"back"},{name:"Legs B",groups:["legs","glutes","core"],primary:"legs"}]
};
const template=tpl[d]||tpl[3];
const filtered=template.map(function(sp){
const g=sp.groups.filter(function(x){return areas.includes(x)});
const nm=g.length===0?sp.name:g.length===sp.groups.length?sp.name:g.map(function(x){return(AM[x]||CAT_META[x]||{l:x}).l}).join(" & ");
const pr=areas.includes(sp.primary)?sp.primary:(g[0]||areas[0]);
return{name:nm,groups:g,primary:pr};
}).filter(function(sp){return sp.groups.length>0});
var fi=0;
while(filtered.length<d){
var fa=areas[fi%areas.length];
filtered.push({name:(AM[fa]||{l:fa}).l+" Focus",groups:[fa],primary:fa});
fi++;
}
return filtered.slice(0,d);
}
function calcNutri(p){const bmr=10*p.weight+6.25*p.height-5*p.age+(p.gender==="female"?-161:5);const am={1:1.3,2:1.4,3:1.45,4:1.55,5:1.65,6:1.75}[p.days]||1.5;const tdee=Math.round(bmr*am);const cal=tdee+(GM[p.goal]?.ca||0);const protein=Math.round(p.weight*(p.goal==="fat_loss"?2.2:p.goal==="muscle_gain"?2.0:1.8));const fat=Math.round(p.weight*1.0);const carbs=Math.max(Math.round((cal-protein*4-fat*9)/4),100);return{cal,protein,carbs,fat,tdee}}

// ═══════ BODY COMPOSITION ANALYSIS ═══════
function calcBodyComp(profile,nutri,flog){
  const{age,height,weight}=profile;const hm=height/100;
  const bmi=+(weight/(hm*hm)).toFixed(1);
  let bmiCat="Normal",bmiStatus="good";
  if(bmi<18.5){bmiCat="Underweight";bmiStatus="warn"}else if(bmi<25){bmiCat="Normal";bmiStatus="good"}else if(bmi<30){bmiCat="Overweight";bmiStatus="warn"}else{bmiCat="Obese";bmiStatus="bad"}
  // Rough body fat estimate (gender-aware)
  const isFemale=profile.gender==="female";
  const bfEst=isFemale?+(1.2*bmi+0.23*age-5.4).toFixed(1):+(1.2*bmi+0.23*age-16.2).toFixed(1);
  let bfCat="Athletic",bfStatus="good";
  if(isFemale){if(bfEst<12){bfCat="Essential only";bfStatus="bad"}else if(bfEst<21){bfCat="Athletic";bfStatus="good"}else if(bfEst<25){bfCat="Fit";bfStatus="good"}else if(bfEst<32){bfCat="Average";bfStatus="warn"}else{bfCat="Above average";bfStatus="bad"}}
  else{if(bfEst<6){bfCat="Essential only";bfStatus="bad"}else if(bfEst<14){bfCat="Athletic";bfStatus="good"}else if(bfEst<18){bfCat="Fit";bfStatus="good"}else if(bfEst<25){bfCat="Average";bfStatus="warn"}else{bfCat="Above average";bfStatus="bad"}}
  // FFMI (Fat-Free Mass Index)
  const lbm=weight*(1-bfEst/100);const ffmi=+(lbm/(hm*hm)).toFixed(1);
  let ffmiCat="Average",ffmiStatus="good";
  if(ffmi<18){ffmiCat="Below average";ffmiStatus="warn"}else if(ffmi<20){ffmiCat="Average";ffmiStatus="good"}else if(ffmi<22){ffmiCat="Above average";ffmiStatus="good"}else if(ffmi<25){ffmiCat="Excellent";ffmiStatus="good"}else{ffmiCat="Exceptional";ffmiStatus="good"}
  // Caloric status
  const today=new Date().toISOString().slice(0,10);const todayLog=flog[today]||[];
  const todayCal=todayLog.reduce((a,m)=>a+m.cal,0);const todayP=todayLog.reduce((a,m)=>a+m.p,0);
  const calDiff=todayCal-nutri.cal;
  let calStatus="On track",calClass="good";
  if(todayCal===0){calStatus="Not logged yet";calClass="warn"}
  else if(calDiff<-200){calStatus="In deficit ("+calDiff+" kcal)";calClass=profile.goal==="fat_loss"?"good":"warn"}
  else if(calDiff>200){calStatus="In surplus (+"+calDiff+" kcal)";calClass=profile.goal==="muscle_gain"?"good":"warn"}
  else{calStatus="Near target ("+calDiff+" kcal)";calClass="good"}
  // Weekly avg
  const last7=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(flog[k])last7.push(flog[k].reduce((a,m)=>a+m.cal,0))}
  const weekAvgCal=last7.length?Math.round(last7.reduce((a,b)=>a+b,0)/last7.length):0;
  const proteinPct=todayCal?Math.round(todayP*4/todayCal*100):0;
  let proteinStatus="Good",proteinClass="good";
  if(todayP===0){proteinStatus="Not logged";proteinClass="warn"}
  else if(todayP<nutri.protein*0.8){proteinStatus="Below target";proteinClass="bad"}
  else if(todayP>nutri.protein*1.2){proteinStatus="Above target";proteinClass="good"}
  // Healthy weight range
  const hwLow=+(18.5*hm*hm).toFixed(1);const hwHigh=+(24.9*hm*hm).toFixed(1);
  let weightStatus="Healthy range",weightClass="good";
  if(weight<hwLow){weightStatus="Below healthy range";weightClass="warn"}
  else if(weight>hwHigh){weightStatus="Above healthy range";weightClass="warn"}
  return{bmi,bmiCat,bmiStatus,bfEst,bfCat,bfStatus,ffmi,ffmiCat,ffmiStatus,calDiff,calStatus,calClass,todayCal,todayP,weekAvgCal,proteinPct,proteinStatus,proteinClass,hwLow,hwHigh,weightStatus,weightClass,tdee:nutri.tdee||nutri.cal}
}

// ═══════ DIET CONSISTENCY ═══════
function calcDietConsistency(){const target=S.nutri.cal;const tolerance=0.15;const flog=S.flog;const today=new Date();today.setHours(0,0,0,0);
// Last 7 days
const weekData=[];const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const items=flog[k]||[];const cal=items.reduce((a,m)=>a+m.cal,0);const isToday=i===0;weekData.push({key:k,name:dayNames[d.getDay()],cal,logged:items.length>0,isToday,withinTarget:cal>0&&cal<=target*(1+tolerance),over:cal>target*(1+tolerance)})}
// Calculate streak (consecutive days within target calorie range)
let streak=0;const allDates=Object.keys(flog).sort().reverse();
for(const dk of allDates){const items=flog[dk]||[];const cal=items.reduce((a,m)=>a+m.cal,0);if(cal>0&&cal<=target*(1+tolerance)){streak++}else{break}}
// Last 30 days stats
let daysLogged=0,daysOnTarget=0,daysOver=0,totalCal=0;
for(let i=0;i<30;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const items=flog[k]||[];if(items.length>0){const cal=items.reduce((a,m)=>a+m.cal,0);daysLogged++;totalCal+=cal;if(cal<=target*(1+tolerance))daysOnTarget++;else daysOver++}}
const avgCal=daysLogged?Math.round(totalCal/daysLogged):0;
const consistencyPct=daysLogged?Math.round(daysOnTarget/daysLogged*100):0;
return{weekData,streak,daysLogged,daysOnTarget,daysOver,avgCal,consistencyPct,target}}
function renderDietConsistency(){const dc=calcDietConsistency();

`<div style="margin-top:16px;text-align:center"><div style="font-size:12px;font-weight:600;margin-bottom:8px">How did this session feel?</div><div style="display:flex;justify-content:center;gap:8px;margin-bottom:12px">${[1,2,3,4,5].map(r=>`<button class="r-btn ${S.rat===r?'on':''}" onclick="setRat(${r})">${EMO[r]}</button>`).join("")}</div><button class="fin-btn ${S.rat?'ok':'no'}" ${S.rat?'onclick="finWO()"':'disabled'}>Save & Finish Session</button></div>`}

function calcUserStats(userId){
const u=userId===S.user?.id?S.user:LS("sp-prof-"+userId);
if(!u)return null;
const logs=userId===S.user?.id?S.logs:(LS("sp-logs-"+userId)||{});
const sessions=Object.keys(logs).length;
const totalSets=Object.values(logs).reduce((a,l)=>a+Object.values(l.sets).reduce((b,s)=>b+s.filter(x=>x.done).length,0),0);
const rats=Object.values(logs).map(l=>l.rating).filter(Boolean);
const avgRating=rats.length?+(rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1):0;
const dates=Object.values(logs).map(l=>l.date).filter(Boolean).sort();
let streak=0;
if(dates.length){const logDates=new Set(dates.map(d=>new Date(d).toISOString().slice(0,10)));
const today=new Date();today.setHours(0,0,0,0);let checkDate=new Date(today);
for(let w=0;w<52;w++){const weekStart=new Date(checkDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay());
let hasWorkout=false;for(let d=0;d<7;d++){const day=new Date(weekStart);day.setDate(day.getDate()+d);if(logDates.has(day.toISOString().slice(0,10))){hasWorkout=true;break}}
if(hasWorkout){streak++}else if(w>0){break}checkDate.setDate(checkDate.getDate()-7)}}
const firstDate=dates[0]?new Date(dates[0]):null;
const weeksSinceStart=firstDate?Math.max(1,Math.ceil((Date.now()-firstDate.getTime())/(7*86400000))):1;
const consistency=sessions?+(sessions/weeksSinceStart).toFixed(1):0;
const targetDays=u.profile?.days||0;
const completionRate=targetDays?Math.min(100,Math.round(consistency/targetDays*100)):0;
const lastSession=Object.values(logs).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.date||null;
return{userId:u.id,name:u.name,avatar:u.avatar,sessions,streak,totalSets,avgRating,consistency,completionRate,targetDays,gender:u.profile?.gender||'',lastSession}}

function calcScoreLocal(s){
const sessionPts=(s.sessions||0)*10;const streakPts=(s.streak||0)*15;const setPts=(s.totalSets||0)*1;
const consistencyPts=Math.round(((s.completionRate||0)/100)*50);const raw=sessionPts+streakPts+setPts+consistencyPts;
const ratingMult=s.avgRating?Math.max(0.6,s.avgRating/5):0.8;return Math.round(raw*ratingMult)}

return `<form class="note-form" onsubmit="noteSubmit(event)" aria-label="${isEdit?'Edit note':'New note'}">

async function noteSubmit(e){
e.preventDefault();const id=document.getElementById("noteFormId").value;

const moodBtn=document.querySelector(".mood-btn.on");const mood=moodBtn?moodBtn.textContent.trim().split(" ").pop().toLowerCase():"good";
const moodKey=MOODS.find(m=>m.label.toLowerCase()===mood)?.key||"good";

if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.error||"Failed")}

async function execDeleteNote(id){
