// Merge aliases
const aliases={'bread toast':'Bread','wholemeal toast':'Wholemeal Bread','bread slices':'Bread','toast':'Bread','bread':'Bread','chicken breast wrap':'Chicken Breast','chicken wings':'Chicken Wings','salmon fillet':'Salmon','sirloin steak':'Steak','chicken sandwich':'Chicken','chicken wrap':'Chicken','salmon wrap':'Salmon','side salad':'Salad Leaves','garlic powder':'Garlic','garlic butter':'Butter','onion gravy':'Onion','pancake mix':'Pancake Mix','protein powder':'Protein Powder','mass gainer powder':'Mass Gainer','peanut butter':'Peanut Butter','salad cream':'Salad Cream','soy sauce':'Soy Sauce','baked beans':'Baked Beans','tomato stew':'Tomato Stew','pasta cream':'Cream','chilli flakes':'Chilli Flakes','suya spice':'Suya Spice','black pepper':'Black Pepper','olive oil':'Olive Oil','yoghurt sauce':'Yoghurt','eggs scrambled':'Egg','egg scrambled':'Egg','eggs':'Egg','shrimps':'Shrimps','avocado on 2 toast':'Avocado','sweet potato fries':'Sweet Potato','potato fries':'Potato','fries':'Potato','cherry tomato':'Tomato','tomato':'Tomato'};
const aliasKey=cleanName.toLowerCase();
if(aliases[aliasKey])cleanName=aliases[aliasKey];
const key=cleanName.toLowerCase().replace(/\s+/g,' ');
if(!agg[key])agg[key]={name:cleanName,qtys:[]};
agg[key].qtys.push(qty);
})})});
// Merge numeric quantities where units match
const merged=Object.values(agg).map(item=>{
const parsed=item.qtys.map(q=>{const m=q.match(/^([\d.½¼¾⅓⅔]+)\s*(g|kg|ml|l|tbsp|tsp|cups?|pieces?|slices?|scoops?|cob|packs?)?$/i);if(!m)return null;let num=fracToNum(m[1]);return{num,unit:(m[2]||'').toLowerCase()}});
const allParsed=parsed.every(p=>p!==null);
if(allParsed&&parsed.length>0){
const byUnit={};parsed.forEach(p=>{const u=p.unit||'×';if(!byUnit[u])byUnit[u]=0;byUnit[u]+=p.num});
const parts=Object.entries(byUnit).map(([u,n])=>{n=Math.round(n*10)/10;return u==='×'?`×${n}`:`${n}${u}`});
return{name:item.name,qty:parts.join(' + ')}
}
return{name:item.name,qty:`×${item.qtys.length}`}
});
// Categorise
const cats={'🥩 Protein':['chicken','steak','salmon','shrimp','lamb','sausage','bacon','egg','mince','protein powder','mass gainer'],'🥬 Vegetables & Fruits':['onion','tomato','pepper','carrot','peas','corn','avocado','banana','apple','berries','strawberry','mango','watermelon','tangerine','plantain','lettuce','salad','spring onion','kpakposhito','scotch bonnet','parsley','ginger','cherry tomato','grape'],'🌾 Carbs & Grains':['rice','oats','pasta','spaghetti','bread','toast','potato','sweet potato','fries','indomie','noodle','pancake','tortilla','wrap','weetabix','granola','jollof','baked beans'],'🧈 Dairy & Sauces':['milk','yoghurt','yogurt','cheese','cheddar','cream','butter','parmesan','cottage cheese','mayo','salad cream','ketchup','soy sauce','jam','honey','peanut butter','syrup','gravy','coleslaw'],'🧂 Other':[]};
const result={};
merged.forEach(item=>{

// ═══════ WEIGHT PROGRESSION & SMART RECOMMENDATIONS ═══════
function analyzeProgression(){
const logs=S.logs;const plan=S.plan;const profile=S.user?.profile;if(!profile||!plan.length)return[];
const goal=profile.goal||"general";const level=profile.level||"intermediate";
// Collect per-exercise weight history across all weeks
const exHistory={};
Object.entries(logs).forEach(([key,log])=>{
const wm=key.match(/^w(\d+)-d(\d+)$/);if(!wm)return;
const week=+wm[1];const dayIdx=+wm[2];const day=plan[dayIdx];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
const ex=day.exs[+ei];if(!ex)return;const name=ex.n;
if(!exHistory[name])exHistory[name]=[];
const weights=sets.filter(s=>s.done&&+s.weight>0).map(s=>+s.weight);
const reps=sets.filter(s=>s.done&&+s.reps>0).map(s=>+s.reps);
const completedSets=sets.filter(s=>s.done).length;const totalSets=sets.length;
if(weights.length)exHistory[name].push({week,date:log.date,avgWeight:+(weights.reduce((a,b)=>a+b,0)/weights.length).toFixed(1),maxWeight:Math.max(...weights),avgReps:reps.length?+(reps.reduce((a,b)=>a+b,0)/reps.length).toFixed(1):0,completedSets,totalSets})
})});
// Generate recommendations per exercise
const recs=[];
Object.entries(exHistory).forEach(([name,entries])=>{
if(entries.length<2){recs.push({name,status:"tracking",msg:"Keep logging — need at least 2 sessions to track progress.",icon:"📊",color:"var(--sub)"});return}
entries.sort((a,b)=>new Date(a.date)-new Date(b.date));
const recent=entries.slice(-2);const prev=recent[0];const curr=recent[1];
const weeksBetween=Math.max(1,curr.week-prev.week);
const weightChange=curr.avgWeight-prev.avgWeight;const repChange=curr.avgReps-prev.avgReps;
const completionRate=curr.completedSets/curr.totalSets;
// Determine increment based on exercise type and goal
const isCompound=["Bench Press","Squat","Deadlift","Row","Press","Thrust","Lunge"].some(w=>name.includes(w));
const increment=isCompound?2.5:1.25;
const goalMult=goal==="muscle_gain"?1:goal==="fat_loss"?0.5:0.75;
const recIncrement=+(increment*goalMult).toFixed(2);
if(completionRate>=0.9&&curr.avgReps>=10&&weightChange>=0){
recs.push({name,status:"increase",msg:`Great progress! Increase weight by ${recIncrement} kg next session. You've been hitting ${curr.avgReps} reps consistently at ${curr.avgWeight} kg.`,icon:"⬆️",color:"var(--grn)",change:`+${recIncrement} kg`,detail:`${prev.avgWeight} kg → ${curr.avgWeight} kg (${weightChange>=0?'+':''}${weightChange.toFixed(1)} kg over ${weeksBetween} wk${weeksBetween>1?'s':''})`})
}else if(completionRate>=0.8&&weightChange>0){
recs.push({name,status:"maintain",msg:`Good work! Maintain ${curr.avgWeight} kg and focus on hitting all reps cleanly before increasing.`,icon:"✊",color:"var(--amb)",change:"Maintain",detail:`${prev.avgWeight} kg → ${curr.avgWeight} kg · ${curr.avgReps} avg reps`})
}else if(completionRate<0.6||curr.avgReps<6){
const dropWeight=Math.max(0,+(curr.avgWeight-increment).toFixed(1));
recs.push({name,status:"reduce",msg:`Form check needed. Consider dropping to ${dropWeight} kg and building back up with solid form. You completed only ${Math.round(completionRate*100)}% of sets.`,icon:"⬇️",color:"var(--red)",change:`Drop to ${dropWeight} kg`,detail:`Completed ${curr.completedSets}/${curr.totalSets} sets · ${curr.avgReps} avg reps`})
}else if(weightChange===0&&repChange>0){
recs.push({name,status:"increase",msg:`Rep progress! You're getting stronger at ${curr.avgWeight} kg (${prev.avgReps} → ${curr.avgReps} reps). Ready to add ${recIncrement} kg.`,icon:"⬆️",color:"var(--grn)",change:`+${recIncrement} kg`,detail:`Same weight, more reps: ${prev.avgReps} → ${curr.avgReps}`})
}else if(weeksBetween>=2&&weightChange===0&&repChange<=0){
recs.push({name,status:"plateau",msg:`Plateau detected at ${curr.avgWeight} kg for ${weeksBetween} weeks. Try: change rep tempo, add a drop set, or switch to a variation.`,icon:"⚠️",color:"var(--amb)",change:"Change stimulus",detail:`Stuck at ${curr.avgWeight} kg for ${weeksBetween} weeks`})
}else{
recs.push({name,status:"maintain",msg:`Keep training at ${curr.avgWeight} kg. Focus on form and hitting your rep targets.`,icon:"✊",color:"var(--amb)",change:"Maintain",detail:`${curr.avgWeight} kg · ${curr.avgReps} reps · ${Math.round(completionRate*100)}% completion`})
}
});
return recs;
}

function getBodyGoalGuidance(){
const p=S.user?.profile;if(!p)return"";
const goal=p.goal||"general";const logs=S.logs;const totalSessions=Object.keys(logs).length;
const weeks=S.week;const sessionsPerWeek=weeks?+(totalSessions/weeks).toFixed(1):0;
const targetDays=p.days||4;const adherence=targetDays?Math.min(100,Math.round(sessionsPerWeek/targetDays*100)):0;
// Analyze weight trends
const recs=analyzeProgression();
const increasing=recs.filter(r=>r.status==="increase").length;
const plateaus=recs.filter(r=>r.status==="plateau").length;
const reducing=recs.filter(r=>r.status==="reduce").length;
const maintaining=recs.filter(r=>r.status==="maintain").length;
let guidance=[];
if(goal==="muscle_gain"){
guidance.push(`<div class="bg-section"><div class="bg-title">💪 Muscle Gain Progress Report</div>`);
if(totalSessions<4)guidance.push(`<div class="bg-tip">📅 Just getting started — focus on learning movements with good form. The first 2-3 weeks should be about technique, not max weights.</div>`);
else if(increasing>plateaus&&adherence>=70)guidance.push(`<div class="bg-tip good">🔥 Excellent! You're progressing on ${increasing} exercise${increasing>1?'s':''}. Keep your surplus at 200-400 kcal and sleep 7-9 hours for max recovery.</div>`);
else if(plateaus>1)guidance.push(`<div class="bg-tip warn">⚠️ Plateau on ${plateaus} exercise${plateaus>1?'s':''}. Try: deload for a week at 60% weight, increase calories by 100-200 kcal, or swap exercises for fresh stimulus.</div>`);
if(adherence<60)guidance.push(`<div class="bg-tip warn">📊 Training ${sessionsPerWeek} days/week vs your target of ${targetDays}. Consistency is the #1 driver of muscle growth — try to hit at least ${Math.ceil(targetDays*0.8)} sessions/week.</div>`);
else guidance.push(`<div class="bg-tip good">✅ Training adherence: ${adherence}% — great consistency!</div>`);
guidance.push(`<div class="bg-tip">📏 Aim to gain 0.25-0.5 kg bodyweight per week. If the scale isn't moving after 2 weeks, add 150-200 extra kcal per day.</div></div>`);
}else if(goal==="fat_loss"){
guidance.push(`<div class="bg-section"><div class="bg-title">🔥 Fat Loss Progress Report</div>`);
if(reducing>0)guidance.push(`<div class="bg-tip warn">⚠️ Strength dropping on ${reducing} exercise${reducing>1?'s':''}. In a deficit, maintaining weight on the bar is the goal. Don't cut calories too aggressively — max 500 kcal deficit.</div>`);
else if(maintaining+increasing>0)guidance.push(`<div class="bg-tip good">✅ Great — maintaining or increasing strength while in a deficit. You're preserving muscle effectively!</div>`);
if(adherence>=70)guidance.push(`<div class="bg-tip good">🏃 Good adherence (${adherence}%). Add 2-3 walks per week (20-30 min) for extra fat burning without affecting recovery.</div>`);
else guidance.push(`<div class="bg-tip warn">📊 Training ${sessionsPerWeek}x/week. Try to maintain ${targetDays}x to preserve muscle while cutting.</div>`);
guidance.push(`<div class="bg-tip">📏 Aim for 0.5-1% bodyweight loss per week (${(p.weight*0.005).toFixed(1)}-${(p.weight*0.01).toFixed(1)} kg/week). Faster = muscle loss risk.</div></div>`);
}else if(goal==="recomp"){
guidance.push(`<div class="bg-section"><div class="bg-title">⚡ Recomp Progress Report</div>`);
if(increasing>0)guidance.push(`<div class="bg-tip good">💪 Progressing on ${increasing} exercise${increasing>1?'s':''}! In a recomp, strength gains = muscle being built while fat comes off slowly.</div>`);
else if(totalSessions>6)guidance.push(`<div class="bg-tip warn">📊 No weight increases detected yet. Recomp is slow — be patient. Focus on getting stronger in the 8-12 rep range.</div>`);
guidance.push(`<div class="bg-tip">📏 Recomp success is measured by how clothes fit and strength gains, not the scale. Take progress photos monthly. Expect visible changes in 3-6 months.</div></div>`);
}else{
guidance.push(`<div class="bg-section"><div class="bg-title">🎯 Fitness Progress Report</div>`);
if(totalSessions>=4)guidance.push(`<div class="bg-tip good">✅ ${totalSessions} sessions completed. You're building a solid foundation!</div>`);
guidance.push(`<div class="bg-tip">📏 Focus on progressive overload — small, consistent weight increases over time. Even 1.25 kg more per week compounds over months.</div></div>`);
}
return guidance.join("");
}

let supersetGroups=[];
function toggleSuperset(ei){
if(ei===0&&!supersetGroups.some(function(g){return g.includes(ei)}))return;
const existing=supersetGroups.findIndex(g=>g.includes(ei));
if(existing>=0){
supersetGroups[existing]=supersetGroups[existing].filter(i=>i!==ei);
if(supersetGroups[existing].length<2)supersetGroups.splice(existing,1);
}else{
const prev=supersetGroups.findIndex(g=>g.includes(ei-1));
if(prev>=0)supersetGroups[prev].push(ei);
else supersetGroups.push([ei-1<0?ei:ei-1,ei]);
}
rTrack();
}
function getSupersetGroup(ei){return supersetGroups.find(g=>g.includes(ei))}

function calcUserStats(userId){
const u=userId===S.user?.id?S.user:LS("sp-prof-"+userId);
if(!u)return null;
const logs=userId===S.user?.id?S.logs:(LS("sp-logs-"+userId)||{});
const sessions=Object.keys(logs).length;
const totalSets=Object.values(logs).reduce((a,l)=>a+Object.values(l.sets).reduce((b,s)=>b+s.filter(x=>x.done).length,0),0);
const rats=Object.values(logs).map(l=>l.rating).filter(Boolean);
const avgRating=rats.length?+(rats.reduce((a,b)=>a+b,0)/rats.length).toFixed(1):0;
const dates=Object.values(logs).map(l=>l.date).filter(Boolean).sort();
let streak=0;
if(dates.length){const logDates=new Set(dates.map(d=>new Date(d).toISOString().slice(0,10)));
const today=new Date();today.setHours(0,0,0,0);let checkDate=new Date(today);
for(let w=0;w<52;w++){const weekStart=new Date(checkDate);weekStart.setDate(weekStart.getDate()-weekStart.getDay());
let hasWorkout=false;for(let d=0;d<7;d++){const day=new Date(weekStart);day.setDate(day.getDate()+d);if(logDates.has(day.toISOString().slice(0,10))){hasWorkout=true;break}}
if(hasWorkout){streak++}else if(w>0){break}checkDate.setDate(checkDate.getDate()-7)}}
const firstDate=dates[0]?new Date(dates[0]):null;
const weeksSinceStart=firstDate?Math.max(1,Math.ceil((Date.now()-firstDate.getTime())/(7*86400000))):1;
const consistency=sessions?+(sessions/weeksSinceStart).toFixed(1):0;
const targetDays=u.profile?.days||0;
const completionRate=targetDays?Math.min(100,Math.round(consistency/targetDays*100)):0;
const lastSession=Object.values(logs).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.date||null;
return{userId:u.id,name:u.name,avatar:u.avatar,sessions,streak,totalSets,avgRating,consistency,completionRate,targetDays,gender:u.profile?.gender||'',lastSession}}

function calcScoreLocal(s){
const sessionPts=(s.sessions||0)*10;const streakPts=(s.streak||0)*15;const setPts=(s.totalSets||0)*1;
const consistencyPts=Math.round(((s.completionRate||0)/100)*50);const raw=sessionPts+streakPts+setPts+consistencyPts;
const ratingMult=s.avgRating?Math.max(0.6,s.avgRating/5):0.8;return Math.round(raw*ratingMult)}

async function syncLeaderboard(){
if(!LS("sp-device-id")){SS("sp-device-id","d_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6))}
const deviceId=LS("sp-device-id");
const ids=LS("sp-user-ids")||[];
const localEntries=ids.map(id=>{const stats=calcUserStats(id);if(!stats)return null;stats.score=calcScoreLocal(stats);stats.device=deviceId;return stats}).filter(Boolean);
try{
const res=await fetch(LB_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"sync",device:deviceId,entries:localEntries})});
if(!res.ok)throw new Error();
const board=await res.json();
SS("sp-leaderboard",board);
}catch(e){

localEntries.sort((a,b)=>b.score-a.score||b.sessions-a.sessions||b.streak-a.streak);
localEntries.forEach((e,i)=>{e.rank=i+1});
SS("sp-leaderboard",localEntries);
}
}

// ═══════ 1RM CALCULATOR ═══════
function calc1RM(w,r){if(!w||!r||r<1)return 0;if(r===1)return w;return Math.round(w*(1+r/30)*10)/10}
function get1RMTable(w,r){const orm=calc1RM(w,r);if(!orm)return[];return[1,2,3,4,5,6,8,10,12,15].map(rep=>({reps:rep,weight:rep===1?orm:Math.round(orm/(1+rep/30)*10)/10,pct:rep===1?100:Math.round(1/(1+rep/30)*1000)/10}))}
function getBest1RM(exName){
let best={w:0,r:0,orm:0};
Object.values(S.logs).forEach(log=>{
Object.entries(log.sets).forEach(([ei,sets])=>{
const day=S.plan[log.dayIndex];
if(day&&day.exs[+ei]&&day.exs[+ei].n===exName){
sets.filter(s=>s.done&&+s.weight>0&&+s.reps>0).forEach(s=>{
const orm=calc1RM(+s.weight,+s.reps);
if(orm>best.orm){best={w:+s.weight,r:+s.reps,orm}}
})}
})});
return best.orm?best:null;
}

// ═══════ WEEKLY VOLUME PER MUSCLE GROUP ═══════
function calcWeeklyVolume(){
const vol={};const weekKey='w'+S.week;
Object.entries(S.logs).forEach(([key,log])=>{
if(!key.startsWith(weekKey+'-'))return;
const day=S.plan[log.dayIndex];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
const ex=day.exs[+ei];if(!ex)return;
const doneSets=sets.filter(s=>s.done).length;
const groups=findMuscleGroups(ex.n);
groups.forEach(g=>{vol[g]=(vol[g]||0)+doneSets});
})});
return vol;
}
function findMuscleGroups(exName){
const groups=[];
const EX=typeof EX_DB!=='undefined'?EX_DB:{};
Object.entries(EX).forEach(([group,exs])=>{
if(exs.some(e=>e.n===exName))groups.push(group);
});
return groups.length?groups:['other'];
}

function getOverloadAlerts(){
const alerts=[];
if(!S.plan||!S.plan.length)return alerts;
const allExNames=[...new Set(S.plan.flatMap(d=>d.exs.map(e=>e.n)))];
allExNames.forEach(exName=>{
const history=[];
Object.entries(S.logs).forEach(([key,log])=>{
const day=S.plan[log.dayIndex];if(!day)return;
Object.entries(log.sets).forEach(([ei,sets])=>{
if(day.exs[+ei]&&day.exs[+ei].n===exName){
const doneSets=sets.filter(s=>s.done&&+s.weight>0&&+s.reps>0);
if(doneSets.length){
const avgRPE=doneSets.filter(s=>+s.rpe>0).reduce((a,s,_,arr)=>a+(+s.rpe)/arr.length,0);
const maxW=Math.max(...doneSets.map(s=>+s.weight));
const allHitTarget=doneSets.every(s=>+s.reps>=doneSets[0].reps);
history.push({date:log.date,maxW,avgRPE,allHitTarget,reps:+doneSets[0].reps});
}}})});
history.sort((a,b)=>new Date(b.date)-new Date(a.date));
if(history.length>=2){
const recent=history.slice(0,2);
const readyToIncrease=recent.every(h=>h.allHitTarget&&(h.avgRPE>0?h.avgRPE<8:true));
if(readyToIncrease){
alerts.push({name:exName,currentW:recent[0].maxW,suggestedW:recent[0].maxW+2.5,reason:'Hit all reps at RPE<8 for 2 sessions'});
}}});
return alerts;
}

const available=[25,20,15,10,5,2.5,1.25];

available.forEach(p=>{while(remaining>=p){plates.push(p);remaining=Math.round((remaining-p)*100)/100}});
return{plates,perSide};
}

function applyPreset(name){
if(!PRESETS[name])return;
S.plan=PRESETS[name].map((d,i)=>({day:'Day '+(i+1)+' — '+d.day,sub:d.day,sched:'Flexible',dur:'~60 min',warm:'5 min cardio · dynamic stretches',exs:d.exs.map(e=>({...e,rest:e.rest||'90s',note:e.note||''})),cool:d.cooldown||'Full stretch · 5 min',prog:'Hit top rep range → add 2.5 kg next session',custom:false}));
if(S.user){SS('sp-plan-'+S.user.id,S.plan)}
rPlan();
}

// (rather than overwriting the whole plan like applyPreset).

];

function addPureGymDay(key){
  const proto=PRESETS[key];if(!proto||!proto[0])return;
  const d=proto[0];
  const idx=(S.plan||[]).length;
  S.plan.push({
    day:"Day "+(idx+1)+" — "+d.day,
    sub:d.day,
    sched:"Flexible",
    dur:"~"+(key==="pg_norwegian"?35:key==="pg_circuit30"?30:key.startsWith("pg_bw")?10:40)+" min",
    warm:"5 min cardio · dynamic stretches",
    exs:d.exs.map(function(e){return Object.assign({},e,{rest:e.rest||"60s",note:e.note||""})}),
    cool:d.cooldown||"Full stretch · 5 min",
    prog:"Add 1 rep or 1 round when the current version feels clean.",
    custom:false,
    source:"Pure Gym"
  });
  savPlan();pgPickerOpen=false;rPlan();
  if(typeof ftoast==="function")ftoast("➕ Added "+d.day);
  setTimeout(function(){document.getElementById("dc"+idx)?.classList.add("open")},30);
}

  if(!pgPickerOpen)return "";

  }).join("");
  return `<div class="pg-wrap"><div class="pg-head">Pick a Pure Gym routine to add as one extra day in your plan. Your other days are untouched.</div>${cards}<button class="s-btn out" style="margin-top:6px;font-size:11px" onclick="togPgPicker()">Close</button></div>`;
}

// Benchmark the user's weekly plan against Pure Gym-aligned volume targets
// (hypertrophy 10–20 sets/muscle/week · 150 min moderate cardio or 75 min
// vigorous per week · compound-first session structure).
let benchOpen=false;
function togBench(){benchOpen=!benchOpen;rPlan()}
function benchmarkReport(){
  if(!S.plan||!S.plan.length||!S.user)return null;
  const vol=weeklyVolume();
  const goal=S.user.profile?.goal||"general";
  // Weekly volume targets by muscle (Pure Gym / evidence-based hypertrophy ranges)
  const targets={chest:[10,20],back:[10,20],shoulders:[8,20],arms:[8,16],legs:[12,22],glutes:[8,16],core:[6,16]};
  const rows=[];
  Object.keys(targets).forEach(function(m){
    const cur=vol[m]||0;const[lo,hi]=targets[m];
    let status,col,advice;
    if(cur===0){status="missing";col="var(--red)";advice="No sets prescribed — consider adding one "+(CAT_META[m]||{l:m}).l.toLowerCase()+" day or exercise"}
    else if(cur<lo){status=`under (${cur}/${lo}-${hi})`;col="var(--amb)";advice=`Add ${Math.max(2,lo-cur)} more sets this week (≈ 1 extra exercise)`}
    else if(cur>hi){status=`over (${cur}/${lo}-${hi})`;col="var(--red)";advice="Trim "+(cur-hi)+" sets or deload — past the hypertrophy sweet spot"}
    else{status=`on target (${cur}/${lo}-${hi})`;col="var(--grn)";advice=""}
    rows.push({m:m,lbl:(CAT_META[m]||{l:m}).l,cur:cur,status:status,col:col,advice:advice});
  });
  // Compound-first check: at least one compound lift per day
  const missingCompound=[];
  S.plan.forEach(function(d,i){
    const hasCompound=(d.exs||[]).some(function(e){const db=findExInDB(e.n);return db&&db.t==="compound"});
    if(!hasCompound)missingCompound.push(i+1);
  });
  // Cardio check: count total cardio exercises per week
  let cardioSessions=0,cardioDays=0;
  S.plan.forEach(function(d){
    let any=false;
    (d.exs||[]).forEach(function(e){const db=findExInDB(e.n);if(db&&(db.t==="cardio"||db.t==="hiit")){cardioSessions++;any=true}});
    if(any)cardioDays++;
  });
  const cardioTargetNote = goal==="fat_loss"
    ?"Fat loss: Pure Gym recommends ≥150 min moderate cardio or 75 min vigorous HIIT per week."
    :goal==="muscle_gain"
    ?"Muscle gain: keep cardio light — 1-2 sessions of 20-30 min to preserve recovery."
    :"General health: NHS/Pure Gym guideline is 150 min moderate or 75 min vigorous cardio per week.";
  return {rows:rows,missingCompound:missingCompound,cardioSessions:cardioSessions,cardioDays:cardioDays,cardioNote:cardioTargetNote};
}
function rBench(){
  if(!benchOpen)return "";
  const r=benchmarkReport();
  if(!r)return `<div class="bench-wrap"><div class="bench-hint">Build a plan first to run the benchmark.</div></div>`;
  const mRows=r.rows.map(function(x){return `<div class="bench-row"><span class="bench-m">${x.lbl}</span><span class="bench-s" style="color:${x.col}">${x.status}</span></div>${x.advice?`<div class="bench-a">→ ${x.advice}</div>`:""}`}).join("");
  const compNote=r.missingCompound.length?`<div class="bench-warn">⚠️ Day(s) without a compound lift: ${r.missingCompound.join(", ")}. Pure Gym-style sessions open with a compound (squat / bench / row / OHP / deadlift) while you're fresh.</div>`:`<div class="bench-ok">✓ Every day opens with at least one compound lift.</div>`;
  const cardNote=`<div class="bench-row"><span class="bench-m">Cardio</span><span class="bench-s" style="color:var(--sub)">${r.cardioSessions} session${r.cardioSessions!==1?"s":""} across ${r.cardioDays} day${r.cardioDays!==1?"s":""}</span></div><div class="bench-a">${r.cardioNote}</div>`;
  return `<div class="bench-wrap"><div class="bench-head">🔍 Benchmark vs Pure Gym targets</div><div class="bench-sub">Weekly sets per muscle vs hypertrophy sweet spot (10-20) and compound-first session structure.</div>${mRows}${cardNote}${compNote}<div class="bench-foot">Sources: Pure Gym programme guides · Schoenfeld et al. hypertrophy volume research · NHS physical activity guidelines.</div></div>`;
}

// ═══════ OFFLINE QUEUE ═══════
const OFFLINE_QUEUE_KEY='sp-offline-queue';
function queueOfflineAction(action){
const q=LS(OFFLINE_QUEUE_KEY)||[];
q.push({...action,timestamp:Date.now()});
SS(OFFLINE_QUEUE_KEY,q);
}
function processOfflineQueue(){
const q=LS(OFFLINE_QUEUE_KEY)||[];
if(!q.length)return;
// Process queued saves
q.forEach(action=>{
if(action.type==='saveLogs'&&action.userId){
const existing=LS('sp-logs-'+action.userId)||{};
Object.assign(existing,action.data);
SS('sp-logs-'+action.userId,existing);
}
if(action.type==='saveFlog'&&action.userId){
const existing=LS('sp-flog-'+action.userId)||{};
Object.assign(existing,action.data);
SS('sp-flog-'+action.userId,existing);
}
});
SS(OFFLINE_QUEUE_KEY,[]);
}
window.addEventListener('online',()=>{processOfflineQueue();if(document.getElementById('offline-badge'))document.getElementById('offline-badge').remove()});
window.addEventListener('offline',()=>{
const badge=document.createElement('div');
badge.id='offline-badge';
badge.style.cssText='position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#EF4444;color:#fff;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;z-index:9999';
badge.textContent='OFFLINE - Data saved locally';
document.body.appendChild(badge);
});
